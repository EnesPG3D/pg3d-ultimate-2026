<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS - V16 PERFECT</title>
    <style>
        /* --- GENEL TASARIM VE MATRIX --- */
        * { box-sizing: border-box; outline: none; }
        body { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; background: #000; 
            color: #00ffcc; font-family: 'Courier New', Courier, monospace; overflow: hidden; 
        }
        
        #matrix-canvas { position: absolute; inset: 0; z-index: 1; opacity: 0.25; pointer-events: none; }
        
        #app { 
            position: relative; z-index: 10; width: 100%; max-width: 950px; height: 100%; 
            margin: 0 auto; display: flex; flex-direction: column; background: rgba(0, 10, 20, 0.9); 
            border-left: 1px solid #00ffcc; border-right: 1px solid #00ffcc; 
            box-shadow: 0 0 40px rgba(0,255,204,0.15); 
        }

        /* --- SİSTEM HUD (ÜST BİLGİ) --- */
        #hud { 
            background: #000; border-bottom: 1px solid #00ffcc; padding: 4px 15px; 
            display: flex; justify-content: space-between; font-size: 0.75em; font-weight: bold; 
        }

        /* --- HEADER (BAŞLIK VE BUTONLAR) --- */
        #header { 
            padding: 12px 15px; border-bottom: 2px dashed #00ffcc; 
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; 
        }
        .glitch { 
            font-size: 1.4em; font-weight: 900; letter-spacing: 2px; 
            text-shadow: 2px 0 #ff0055, -2px 0 #00ffcc; 
            animation: glitch-anim 4s infinite linear alternate-reverse; 
        }
        @keyframes glitch-anim { 0% { text-shadow: 2px 0 #ff0055; } 50% { text-shadow: -2px 0 #00ffcc; } 100% { text-shadow: 2px 0 #0055ff; } }
        
        .controls { display: flex; gap: 6px; flex-wrap: wrap; }
        .controls button { 
            background: rgba(0,255,204,0.1); color: #00ffcc; border: 1px solid #00ffcc; 
            padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; 
            font-family: inherit; transition: 0.2s; font-size: 0.85em; 
        }
        .controls button:hover, .controls button:active { background: #00ffcc; color: #000; }

        /* --- MESAJ EKRANI --- */
        #messages { 
            flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; 
            gap: 15px; scroll-behavior: smooth; 
        }
        .msg-container { display: flex; flex-direction: column; animation: fIn 0.3s ease-out; }
        @keyframes fIn { from { opacity: 0; transform: translateY(10px); } }
        
        .msg-container.user { align-items: flex-end; }
        .msg-container.bot { align-items: flex-start; }
        .msg-container.system { align-items: center; }

        .sender { font-size: 0.8em; margin-bottom: 4px; font-weight: bold; opacity: 0.8; }
        .user .sender { color: #fff; }
        .bot .sender { color: #ff0055; }
        .system .sender { color: #ffaa00; }

        .bubble { 
            max-width: 90%; padding: 12px 16px; border-radius: 6px; 
            font-size: 1.05em; line-height: 1.4; word-wrap: break-word; border: 1px solid #00ffcc; 
        }
        .user .bubble { background: rgba(0,255,204,0.15); color: #fff; border-bottom-right-radius: 0; }
        .bot .bubble { background: rgba(255,0,85,0.08); border-color: #ff0055; color: #00ffcc; border-bottom-left-radius: 0; cursor: pointer; }
        .system .bubble { background: rgba(255,170,0,0.1); border-color: #ffaa00; color: #ffaa00; text-align: center; font-size: 0.9em; border-style: dashed; }
        .error-bubble { border-color: #ff3333 !important; color: #ff6666 !important; background: rgba(255,0,0,0.1) !important; }

        .cursor { display: inline-block; width: 8px; height: 1.2em; background: #00ffcc; animation: blink 1s step-end infinite; vertical-align: bottom; margin-left: 2px; }
        @keyframes blink { 50% { opacity: 0; } }

        /* --- GİRİŞ FORMU --- */
        #input-area { 
            padding: 12px 15px; background: #000; border-top: 2px dashed #00ffcc; 
            display: flex; align-items: center; gap: 8px; margin: 0; 
        }
        .icon-btn { 
            color: #00ffcc; background: #001122; border: 1px solid #00ffcc; 
            width: 45px; height: 45px; border-radius: 6px; cursor: pointer; font-size: 1.2em; flex-shrink: 0; 
        }
        .icon-btn:active { background: #00ffcc; color: #000; }
        
        input[type="text"] { 
            flex: 1; padding: 12px; background: #000; border: 1px solid #00ffcc; border-radius: 6px; 
            color: #fff; font-family: inherit; font-size: 16px; font-weight: bold; min-width: 0; 
        }
        input[type="text"]:focus { box-shadow: inset 0 0 10px rgba(0,255,204,0.3); }
        
        #send-btn { 
            background: #00ffcc; color: #000; border: none; padding: 0 18px; height: 45px; 
            border-radius: 6px; font-weight: 900; font-family: inherit; font-size: 16px; cursor: pointer; flex-shrink: 0; 
        }
        #send-btn:active { transform: scale(0.95); }

        /* --- AYARLAR MODALI --- */
        #settings-modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(5px); 
        }
        .modal-box { 
            background: #00111a; padding: 25px; border: 2px solid #00ffcc; width: 90%; 
            max-width: 400px; text-align: center; border-radius: 8px; box-shadow: 0 0 30px rgba(0,255,204,0.3); 
        }
        .modal-box h3 { color: #00ffcc; margin-top: 0; border-bottom: 1px dashed #00ffcc; padding-bottom: 10px;}
        .modal-box label { color: #aaa; font-size: 0.85em; text-align: left; display: block; margin-top: 15px;}
        .modal-box input, .modal-box select { 
            width: 100%; padding: 12px; margin-top: 5px; background: #000; 
            border: 1px solid #00ffcc; color: #00ffcc; font-family: inherit; font-size: 16px; font-weight: bold; border-radius: 4px; 
        }
        .modal-btn { 
            width: 100%; padding: 12px; background: #00ffcc; color: #000; border: none; 
            font-weight: 900; font-size: 16px; cursor: pointer; margin-top: 20px; font-family: inherit; border-radius: 4px; 
        }
        .modal-btn.cancel { background: transparent; color: #00ffcc; border: 1px solid #00ffcc; margin-top: 10px; }

        pre { background: #000; padding: 10px; border-left: 3px solid #ff0055; overflow-x: auto; color: #fff; font-size: 0.9em; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #00ffcc; }
    </style>
</head>
<body>

    <!-- CANLI SİSTEM İZLEME -->
    <div id="hud">
        <span id="h-cpu">CPU: 5%</span>
        <span id="h-ram">RAM: 1.2GB</span>
        <span id="h-ping">PING: 22ms</span>
    </div>

    <canvas id="matrix-canvas"></canvas>

    <div id="app">
        <!-- HEADER -->
        <div id="header">
            <div class="glitch">NEXUS V16</div>
            <div class="controls">
                <button onclick="openSettings()" type="button">⚙️ ŞİFRE</button>
                <button id="v-btn" onclick="toggleVoice()" type="button">🔊 SES</button>
                <button onclick="clearMemory()" style="border-color:#ff3333; color:#ff3333;" type="button">🧹 SIFIRLA</button>
            </div>
        </div>
        
        <!-- SOHBET -->
        <div id="messages"></div>
        
        <!-- FORM / GİRİŞ -->
        <form id="input-area" onsubmit="sendMessage(event)">
            <input type="file" id="file-in" accept="image/*" style="display:none" onchange="handleImg(event)">
            <button type="button" class="icon-btn" onclick="document.getElementById('file-in').click()">👁️</button>
            <input type="text" id="user-in" placeholder="_Komut girin..." autocomplete="off">
            <button type="submit" id="send-btn">İLET</button>
        </form>
    </div>

    <!-- AYARLAR -->
    <div id="settings-modal">
        <div class="modal-box">
            <h3>GİZLİ BAĞLANTI</h3>
            
            <label>API Şifreniz:</label>
            <input type="password" id="api-key" placeholder="AIzaSy...">
            
            <label>Yapay Zeka Beyni:</label>
            <select id="model-select">
                <option value="gemini-1.5-flash">NEXUS HIZLI (Flash)</option>
                <option value="gemini-1.5-pro">NEXUS ZEKİ (Pro)</option>
            </select>
            
            <button class="modal-btn" onclick="saveSettings()" type="button">SİSTEMİ BAĞLA</button>
            <button class="modal-btn cancel" onclick="closeSettings()" type="button">KAPAT</button>
        </div>
    </div>

    <script>
        // --- 1. GÜVENLİ HAFIZA (SAFE-DB) ---
        const SafeDB = {
            mem: {},
            get: function(k) { try { return localStorage.getItem(k) || this.mem[k]; } catch(e) { return this.mem[k]; } },
            set: function(k,v) { this.mem[k] = v; try { localStorage.setItem(k,v); } catch(e) {} },
            del: function(k) { delete this.mem[k]; try { localStorage.removeItem(k); } catch(e) {} }
        };

        // --- 2. DEĞİŞKENLER ---
        const mDiv = document.getElementById('messages');
        const iFld = document.getElementById('user-in');
        let chatHist = [], isVoice = true, imgB64 = null;
        const sysCtx = "Sen Bilişim Teknolojileri projesi için geliştirilmiş 'NEXUS' kod adlı, kusursuz bir yapay zekasın. Kullanıcıya kanka diyebilirsin. Bilişim hocasını etkilemek için profesyonelce cevap ver.";

        // --- 3. BAŞLATMA VE HUD ---
        window.onload = () => {
            const saved = SafeDB.get('nexus_v16_hist');
            if(saved) { try { chatHist = JSON.parse(saved); } catch(e) { chatHist = []; } }
            
            let k = SafeDB.get('nexus_v16_key');
            let m = SafeDB.get('nexus_v16_model');
            if(m) document.getElementById('model-select').value = m;
            
            if(!k) setTimeout(() => openSettings(), 500);

            if(chatHist.length === 0) {
                addMsg("SİSTEM ÇEVRİMİÇİ. Terminal hazır. Komut bekleniyor...", "system", "SYSTEM_ROOT");
            } else {
                chatHist.forEach(msg => { 
                    if(msg.parts[0].text) addMsg(msg.parts[0].text, msg.role === 'user' ? 'user' : 'bot', msg.role === 'user' ? 'GUEST' : 'NEXUS', false); 
                });
            }

            setInterval(() => {
                document.getElementById('h-cpu').innerText = "CPU: " + (Math.floor(Math.random()*15)+5) + "%";
                document.getElementById('h-ping').innerText = "PING: " + (Math.floor(Math.random()*20)+15) + "ms";
            }, 2000);
        };

        // --- 4. AYARLAR ---
        function openSettings() { document.getElementById('settings-modal').style.display='flex'; document.getElementById('api-key').value = SafeDB.get('nexus_v16_key') || ""; }
        function closeSettings() { document.getElementById('settings-modal').style.display='none'; }
        function saveSettings() {
            const k = document.getElementById('api-key').value.trim();
            const m = document.getElementById('model-select').value;
            if(k) { SafeDB.set('nexus_v16_key', k); SafeDB.set('nexus_v16_model', m); closeSettings(); addMsg(`BAĞLANTI GÜNCELLENDİ. MODEL: ${m}`, "system", "GÜVENLİK"); }
        }

        // --- 5. ARAÇLAR (SES, RESİM, TEMİZLE) ---
        function handleImg(e) {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader(); 
            r.onload = (x) => { imgB64 = x.target.result.split(',')[1]; addMsg("[GÖRSEL HAFIZAYA YÜKLENDİ]", "system", "BELLEK"); };
            r.readAsDataURL(f);
        }

        function toggleVoice() { 
            isVoice = !isVoice; document.getElementById('v-btn').innerText = isVoice ? "🔊 SES" : "🔇 SESSİZ"; 
            if(!isVoice && window.speechSynthesis) window.speechSynthesis.cancel(); 
        }
        
        function speak(t) { 
            if(!isVoice || !window.speechSynthesis) return; 
            const u = new SpeechSynthesisUtterance(t.replace(/[*#`_]/g,'')); 
            u.lang='tr-TR'; u.pitch=0.8; u.rate=1.1; window.speechSynthesis.speak(u); 
        }

        function clearMemory() {
            if(confirm("Tüm loglar silinecek. Onaylıyor musun?")) { SafeDB.del('nexus_v16_hist'); location.reload(); }
        }

        // --- 6. API İLETİŞİMİ ---
        async function sendMessage(e) {
            if(e) e.preventDefault();
            let k = SafeDB.get('nexus_v16_key');
            let m = SafeDB.get('nexus_v16_model') || 'gemini-1.5-flash';
            if(!k) { openSettings(); return; }

            const t = iFld.value.trim();
            if(!t && !imgB64) return;

            // HOCA EASTER EGG
            if(t.toLowerCase() === "hocam_geldi()") {
                iFld.value = ''; 
                addMsg("⚠️ SAYIN BİLİŞİM ÖĞRETMENİ TESPİT EDİLDİ! <br><br>> Proje Mimarisi: Profesyonel Hata Ayıklama (V16)<br>> Mobil Uyum: %100<br>> ÖNERİLEN NOT: 100", "bot", "NEXUS");
                speak("Sayın Bilişim Öğretmeni tespit edildi. Proje kusursuz. Önerilen not yüz üzerinden yüz.");
                return;
            }

            let disp = t; if(imgB64) disp += "<br><i style='color:#00ffcc'>(Görsel Eklendi)</i>";
            addMsg(disp, 'user', "GUEST_USER"); iFld.value = '';
            
            let p = []; if(t) p.push({text:t}); else p.push({text:"Bu resmi analiz et."});
            if(imgB64) { p.push({inlineData:{mimeType:"image/jpeg", data:imgB64}}); imgB64 = null; }

            const tId = "typ-" + Date.now();
            addMsg("> AĞA BAĞLANILIYOR [██████░░░]", "system", "NET", false, tId);

            try {
                let validHistory = [];
                [...chatHist, { role: "user", parts: p }].forEach(msg => {
                    if (validHistory.length === 0 || validHistory[validHistory.length - 1].role !== msg.role) {
                        validHistory.push({ role: msg.role, parts: msg.parts });
                    } else { validHistory[validHistory.length - 1].parts.push(...msg.parts); }
                });

                const reqBody = { systemInstruction: { parts: [{ text: sysCtx }] }, contents: validHistory.slice(-10) };

                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${m}:generateContent?key=${k}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(reqBody)
                });

                if(!res.ok) {
                    let errStr = res.statusText;
                    try { const errJson = await res.json(); errStr = errJson.error.message; } catch(e) {}
                    throw new Error(errStr);
                }

                const data = await res.json();
                let botReply = data.candidates[0].content.parts[0].text;

                chatHist.push({ role: "user", parts: [{ text: t || "Görsel incelendi." }] });
                chatHist.push({ role: "model", parts: [{ text: botReply }] });
                SafeDB.set('nexus_v16_hist', JSON.stringify(chatHist));

                document.getElementById(tId).remove();
                addMsg(botReply, 'bot', "NEXUS_AI", true);
                speak(botReply);

            } catch(error) {
                console.error(error); document.getElementById(tId).remove();
                addMsg(`[HATA MEYDANA GELDİ]: ${error.message}<br><br>> ÇÖZÜM: Şifreniz Google tarafından kilitlenmiş olabilir. Ayarlardan 'Yeni Şifre' girin.`, 'system', "ERROR", false, null, true);
            }
        }

        // --- 7. MESAJ EKLEME VE GÜVENLİ DAKTİLO (BUG FIXED) ---
        function addMsg(txt, type, hdr = "", isTyping = false, id = null, isError = false) {
            const w = document.createElement('div'); w.className = `msg-container ${type}`; if(id) w.id = id;
            if(hdr) { const h = document.createElement('div'); h.className='sender'; h.innerText = `[${hdr}] >`; w.appendChild(h); }
            
            const b = document.createElement('div'); 
            b.className = `bubble ${isError ? 'error-bubble' : ''}`;
            
            if(type === 'bot' && !isError) { b.title = "Kopyala"; b.onclick = () => { navigator.clipboard.writeText(txt.replace(/<[^>]+>/g,'')); alert("Kopyalandı!"); }; }

            let fTxt = txt.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\*(.*?)\*/g, '<i>$1</i>').replace(/```([\s\S]*?)```/gs, '<br><pre><code>$1</code></pre><br>').replace(/\n/g, '<br>');

            if(isTyping && type === 'bot') {
                w.appendChild(b); mDiv.appendChild(w);
                let i = 0; let isTag = false; let tBuf = "";
                let tm = setInterval(() => {
                    if(i < fTxt.length) {
                        let c = fTxt.charAt(i);
                        if(c === '<') isTag = true;
                        tBuf += c;
                        if(c === '>') isTag = false;
                        
                        if(!isTag) { 
                            b.innerHTML = tBuf + "<span class='cursor'></span>"; 
                            mDiv.scrollTop = mDiv.scrollHeight; 
                        }
                        i++;
                    } else { clearInterval(tm); b.innerHTML = fTxt; }
                }, 10);
            } else {
                b.innerHTML = fTxt; w.appendChild(b); mDiv.appendChild(w);
            }
            setTimeout(() => { mDiv.scrollTop = mDiv.scrollHeight; }, 50);
        }

        // --- 8. MATRIX ANİMASYONU ---
        const cvs = document.getElementById('matrix-canvas'), ctx = cvs.getContext('2d');
        function resizeC() { cvs.width = window.innerWidth; cvs.height = window.innerHeight; }
        window.addEventListener('resize', resizeC); resizeC();
        const l = '01'; const fs = 16; let cols = cvs.width/fs;
        let dr = []; for(let i=0; i<cols; i++) dr[i] = Math.random()*-100;
        function drawM() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)'; ctx.fillRect(0, 0, cvs.width, cvs.height);
            ctx.fillStyle = '#00ffcc'; ctx.font = fs + 'px monospace';
            for(let i=0; i<dr.length; i++) {
                ctx.fillText(l.charAt(Math.floor(Math.random()*l.length)), i*fs, dr[i]*fs);
                if(dr[i]*fs > cvs.height && Math.random() > 0.975) dr[i]=0; dr[i]++;
            }
        }
        setInterval(drawM, 50);
    </script>
</body>
</html>
