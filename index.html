<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS AI V8 - GHOST MODE</title>
    <style>
        /* --- GERÇEK HACKER TERMINALI TASARIMI --- */
        body { 
            margin: 0; background-color: #050505; color: #00ff00; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; justify-content: center; align-items: center; height: 100vh;
            overflow: hidden; user-select: none; text-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
        }
        
        #bg-canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; opacity: 0.3; }
        
        #chat-app { 
            width: 95%; max-width: 1100px; height: 92vh; 
            background: rgba(0, 5, 0, 0.9); border-radius: 5px; 
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.2), inset 0 0 15px rgba(0, 255, 0, 0.1); 
            display: flex; flex-direction: column; overflow: hidden;
            border: 2px solid #00ff00; position: relative;
        }
        
        /* CRT Tarama Efekti */
        #chat-app::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            z-index: 100; background-size: 100% 3px; pointer-events: none;
        }

        #header { 
            background: #000; border-bottom: 2px dashed #00ff00; padding: 15px 25px; 
            display: flex; justify-content: space-between; align-items: center; z-index: 101;
        }
        
        .header-title { font-size: 1.6em; font-weight: bold; color: #00ff00; letter-spacing: 2px; }
        .header-title span { color: #000; font-size: 0.6em; background: #00ff00; padding: 2px 8px; margin-left: 10px; font-weight: 900; animation: blink 1s infinite;}
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .controls button {
            background: #000; color: #00ff00; border: 1px solid #00ff00; 
            padding: 8px 12px; cursor: pointer; margin-left: 10px; font-weight: bold; font-family: inherit; font-size: 0.9em; transition: 0.2s;
        }
        .controls button:hover { background: #00ff00; color: #000; }

        /* Terminal Stili Mesaj Alanı */
        #messages { 
            flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; 
            z-index: 101; scroll-behavior: smooth;
        }
        
        .msg-container { display: flex; width: 100%; flex-direction: column; margin-bottom: 10px;}
        
        .msg-header { font-size: 0.8em; color: #00aa00; margin-bottom: 2px; font-weight: bold; }
        .msg-header.user-hdr { color: #00ffcc; }
        .msg-header.bot-hdr { color: #ff0055; }
        .msg-header.sys-hdr { color: #ffaa00; }

        .msg { 
            width: 100%; line-height: 1.4; font-size: 1.1em; word-wrap: break-word;
        }
        
        /* HATA MESAJI BÖLÜMÜ */
        .system-error { border-left: 4px solid #ff0000; padding-left: 15px; background: rgba(255,0,0,0.1); color: #ff5555; font-size: 0.95em; }
        .system-success { border-left: 4px solid #00ff00; padding-left: 15px; color: #00ff00; }

        #input-area { 
            padding: 20px; background: #000; border-top: 2px dashed #00ff00; 
            display: flex; align-items: center; gap: 10px; z-index: 101; 
        }
        
        .icon-btn { background: transparent; color: #00ff00; border: none; font-size: 1.5em; cursor: pointer; transition: 0.2s; }
        .icon-btn:hover { text-shadow: 0 0 10px #00ff00; transform: scale(1.1); }
        
        .terminal-prefix { color: #00ff00; font-weight: bold; font-size: 1.2em; margin-right: 10px; }
        
        input[type="text"] { 
            flex: 1; padding: 10px; border: none; background: transparent; color: #00ff00; 
            font-size: 1.2em; outline: none; font-family: inherit; font-weight: bold;
        }
        input[type="text"]::placeholder { color: rgba(0, 255, 0, 0.3); }
        
        #send-btn { 
            background: #00ff00; color: #000; border: none; padding: 10px 20px; font-weight: 900; 
            font-size: 1.1em; cursor: pointer; transition: 0.2s; font-family: inherit;
        }
        #send-btn:hover { background: #fff; }

        /* GÜVENLİK AYARLARI */
        #settings-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.95); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #000; padding: 40px; border: 2px solid #00ff00; width: 90%; max-width: 500px; text-align: center;
        }
        .modal-content input {
            width: 90%; padding: 15px; margin: 20px 0; border: 1px dashed #00ff00;
            background: #001100; color: #00ff00; font-family: monospace; outline: none; font-size: 1.2em; text-align: center;
            letter-spacing: 5px; /* Şifre yazarken aralıklı ve gizli görünür */
        }
        .modal-content button { background: #00ff00; color: #000; border: none; padding: 15px 20px; font-weight: bold; cursor: pointer; width: 45%; font-size: 1.1em; font-family: inherit; margin: 5px;}
        .modal-content button:hover { background: #fff;}

        pre { background: #001100; padding: 15px; border-left: 3px solid #00ff00; overflow-x: auto; color: #00ffcc;}
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #00ff00; }
        
        /* Hoca Geldi Efekti İçin Sınıf */
        .easter-egg-mode { border-color: #ff0055 !important; color: #ff0055 !important; text-shadow: 0 0 10px rgba(255, 0, 85, 0.8) !important; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <!-- GÜVENLİK (ŞİFREYİ SAKIN BANA GÖSTERME, SADECE BURAYA YAZ) -->
    <div id="settings-modal">
        <div class="modal-content">
            <h2 style="color:#00ff00; margin-top:0; border-bottom: 1px dashed #00ff00; padding-bottom: 10px;">ROOT ERİŞİMİ GEREKLİ</h2>
            <p style="color:#00aa00; font-size:0.9em; text-align: left;">> SİSTEM UYARISI: Google'dan aldığınız GİZLİ V8 API Anahtarını giriniz.<br>> DİKKAT: Bu şifreyi asla başkasıyla paylaşmayın.</p>
            <input type="password" id="api-key-input" placeholder="AIzaSy...">
            <div>
                <button onclick="saveApiKey()">ONAYLA</button>
                <button onclick="closeSettings()" style="background:#000; color:#00ff00; border:1px solid #00ff00;">İPTAL</button>
            </div>
        </div>
    </div>

    <div id="chat-app">
        <div id="header">
            <div class="header-title" id="main-title">NEXUS_OS <span>V8_GHOST</span></div>
            <div class="controls">
                <button onclick="openSettings()">⚙️ ŞİFRE GİR</button>
                <button id="voice-toggle" onclick="toggleVoice()">🔊 SES: AÇIK</button>
                <button onclick="clearMemory()" style="color: #ff5555; border-color: #ff5555;">🧹 HAFIZA SİL</button>
            </div>
        </div>
        
        <div id="messages"></div>
        
        <div id="input-area">
            <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
            <button class="icon-btn" onclick="document.getElementById('file-input').click()" title="Görsel Yükle">👁️</button>
            <button class="icon-btn" id="mic-btn" onclick="startDictation()" title="Sesle Komut">🎙️</button>
            <span class="terminal-prefix">root@nexus:~#</span>
            <input type="text" id="userInput" placeholder="_" autocomplete="off" autofocus>
            <button id="send-btn" onclick="sendMessage()">[EXECUTE]</button>
        </div>
    </div>

    <script>
        // --- SES EFEKTLERİ ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if(type === 'type') {
                osc.type = 'square'; osc.frequency.setValueAtTime(400 + Math.random()*200, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.02, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
                osc.start(); osc.stop(audioCtx.currentTime + 0.05);
            } else if (type === 'error') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            }
        }

        // --- MATRIX ARKA PLAN ---
        const canvas = document.getElementById('bg-canvas'); const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const letters = '01'; const fontSize = 16; const columns = canvas.width / fontSize;
        const drops = []; for(let x = 0; x < columns; x++) drops[x] = Math.random() * -100;
        let matrixColor = '#00ff00';

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = matrixColor; ctx.font = fontSize + 'px monospace';
            for(let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 40);

        // --- SİSTEM DEĞİŞKENLERİ ---
        const messagesDiv = document.getElementById('messages');
        const inputField = document.getElementById('userInput');
        let chatHistory = JSON.parse(localStorage.getItem('nexusHafiza_v8')) || [];
        let isVoiceEnabled = true; let selectedImageBase64 = null;

        const systemContext = `Sen Bilişim Teknolojileri projesi için geliştirilmiş 'NEXUS' adında, yetkisiz erişimi engelleyen, aşırı zeki bir yapay zekasın. Bir hacker terminali gibi düşün. Kullanıcıya 'kanka' veya 'sistem yöneticisi' diyebilirsin. Kodlama ve hack jargonuyla havalı ve çok kısa olmayan cevaplar ver. Asla gerçek dışı bilgi verme.`;

        window.onload = () => {
            let key = localStorage.getItem('nexusApiKey');
            if(!key) setTimeout(() => openSettings(), 800);

            if (chatHistory.length === 0) {
                addMsg("Sistem çevrimiçi. Veritabanı bağlantısı başarılı. Komut bekleniyor...", "system", "SYSTEM_DAEMON");
            } else {
                chatHistory.forEach(msg => { if(msg.parts[0].text) addMsg(msg.parts[0].text, msg.role === 'user' ? 'user' : 'bot', msg.role === 'user' ? "GUEST_USER" : "NEXUS_AI", false); });
            }
        };

        function openSettings() { playSound('click'); document.getElementById('settings-modal').style.display = 'flex'; document.getElementById('api-key-input').value = localStorage.getItem('nexusApiKey') || ""; }
        function closeSettings() { playSound('click'); document.getElementById('settings-modal').style.display = 'none'; }
        function saveApiKey() {
            const key = document.getElementById('api-key-input').value.trim();
            if(key) { localStorage.setItem('nexusApiKey', key); closeSettings(); addMsg("YENİ GİZLİ ERİŞİM ANAHTARI KABUL EDİLDİ.", "system", "SECURITY", false, "system-success"); }
        }

        // --- GÖRSEL VE SES ---
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                selectedImageBase64 = e.target.result.split(',')[1]; 
                addMsg("[GÖRSEL VERİSİ HAFIZAYA ALINDI. ANALİZ İÇİN KOMUT BEKLENİYOR]", "system", "MEMORY", false, "system-success");
            };
            reader.readAsDataURL(file);
        }

        function toggleVoice() { playSound('click'); isVoiceEnabled = !isVoiceEnabled; document.getElementById('voice-toggle').innerText = isVoiceEnabled ? "🔊 SES: AÇIK" : "🔇 SES: KAPALI"; if(!isVoiceEnabled) window.speechSynthesis.cancel(); }
        function speakText(text) {
            if (!isVoiceEnabled || !window.speechSynthesis) return;
            const utterance = new SpeechSynthesisUtterance(text.replace(/[*#`_]/g, '')); utterance.lang = 'tr-TR'; utterance.pitch = 0.5; utterance.rate = 1.3; window.speechSynthesis.speak(utterance);
        }

        // --- HATA DÜZELTME HAFIZASI ---
        function sanitizeHistory(newMsgPart) {
            let validContents = []; let rawContents = [...chatHistory, { role: "user", parts: newMsgPart }];
            for(let msg of rawContents) {
                if (validContents.length === 0 || validContents[validContents.length - 1].role !== msg.role) {
                    validContents.push(JSON.parse(JSON.stringify(msg)));
                } else {
                    validContents[validContents.length - 1].parts.push(...msg.parts);
                }
            }
            return validContents;
        }

        // --- API İLETİŞİMİ ---
        async function sendMessage() {
            let apiKey = localStorage.getItem('nexusApiKey');
            if(!apiKey) { openSettings(); return; }

            const text = inputField.value.trim();
            if(!text && !selectedImageBase64) return;

            // EASTER EGG (HOCA GELDİ KOMUTU)
            if(text.toLowerCase() === "hocam_geldi()") {
                playSound('error');
                inputField.value = '';
                document.body.classList.add('easter-egg-mode');
                document.getElementById('chat-app').classList.add('easter-egg-mode');
                document.getElementById('main-title').innerHTML = "NEXUS_OS <span>BİLİŞİM_PROJESİ_MODU</span>";
                matrixColor = '#ff0055';
                addMsg("⚠️ DİKKAT! SAYIN BİLİŞİM TEKNOLOJİLERİ ÖĞRETMENİ TESPİT EDİLDİ. <br><br>PROJE ANALİZİ: KUSURSUZ.<br>ÖNERİLEN NOT: 100.<br>SİSTEM GÜVENLİĞİ: MAKSİMUM SEVİYEDE.", "bot", "NEXUS_AI", true);
                speakText("Dikkat. Sayın Bilişim Öğretmeni tespit edildi. Proje kusursuz. Önerilen not yüz.");
                return;
            }

            playSound('click');
            let userDisplay = text;
            if (selectedImageBase64) userDisplay += " [EKLİ GÖRSEL VERİSİ]";
            addMsg(userDisplay, 'user', "GUEST_USER", false);
            inputField.value = '';
            
            let userPart = [];
            if (text) userPart.push({ text: text }); else userPart.push({ text: "Bu görsel verisini analiz et." });
            if (selectedImageBase64) { userPart.push({ inlineData: { mimeType: "image/jpeg", data: selectedImageBase64 } }); selectedImageBase64 = null; }

            const typingId = "typing-" + Date.now();
            addMsg("SİSTEM AĞA BAĞLANIYOR...", 'system', "NEXUS_DAEMON", false, "", typingId);

            try {
                const safeContents = sanitizeHistory(userPart);
                const requestBody = { systemInstruction: { parts: [{ text: systemContext }] }, contents: safeContents.slice(-10) };

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(requestBody)
                });

                // V8 YENİLİK: OTOMATİK HATA RAPORLAYICI VE ÇÖZÜCÜ
                if (!response.ok) {
                    let realError = ""; let errorJson = {};
                    try { errorJson = await response.json(); realError = errorJson.error.message; } catch(e) { realError = response.statusText; }
                    
                    let aiAdvice = "Bilinmeyen Ağ Hatası.";
                    if(realError.includes("API key not valid")) aiAdvice = "KANKA, GİRDİĞİN ŞİFRE YANLIŞ VEYA GOOGLE TARAFINDAN İPTAL EDİLMİŞ. LÜTFEN BANA ASLA GÖSTERMEDİĞİN YEPYENİ BİR ŞİFRE AL VE AYARLARDAN ONU GİR.";
                    else if(realError.includes("quota")) aiAdvice = "KANKA API KOTAN DOLMUŞ. YARIN TEKRAR DENEMELİSİN.";
                    
                    throw new Error(`[SİBER HATA CODE: ${response.status}]<br>Asıl Hata: ${realError}<br><br>> NEXUS ÇÖZÜMÜ: ${aiAdvice}`);
                }

                const data = await response.json();
                const botReply = data.candidates[0].content.parts[0].text;

                chatHistory.push({ role: "user", parts: [{ text: text || "Görsel incelendi." }] });
                chatHistory.push({ role: "model", parts: [{ text: botReply }] });
                localStorage.setItem('nexusHafiza_v8', JSON.stringify(chatHistory));

                document.getElementById(typingId).remove();
                addMsg(botReply, 'bot', "NEXUS_AI", true);
                speakText(botReply);

            } catch (error) {
                console.error(error);
                document.getElementById(typingId).remove();
                playSound('error');
                addMsg(`${error.message}`, 'system', "ERROR_DAEMON", false, "system-error");
            }
        }

        function clearMemory() {
            if(confirm("Tüm veri tabanını silmek istediğine emin misin? (Hataları kökünden çözer)")) {
                playSound('click'); localStorage.removeItem('nexusHafiza_v8'); chatHistory = []; messagesDiv.innerHTML = '';
                addMsg("TÜM HAFIZA VERİLERİ SİLİNDİ.", "system", "SYSTEM_DAEMON", false, "system-success");
                // Easter egg reset
                document.body.classList.remove('easter-egg-mode'); document.getElementById('chat-app').classList.remove('easter-egg-mode');
                document.getElementById('main-title').innerHTML = "NEXUS_OS <span>V8_GHOST</span>"; matrixColor = '#00ff00';
            }
        }

        // --- TERMINAL TARZI MESAJ EKLEME ---
        function addMsg(text, type, headerText, useTypingEffect = false, extraClass = "", id = null) {
            const wrapper = document.createElement('div'); wrapper.className = `msg-container ${type}`; if(id) wrapper.id = id;
            
            // Başlık Ekleme (Kim Konuşuyor?)
            const hdr = document.createElement('div');
            let hdrClass = type === 'user' ? 'user-hdr' : (type === 'bot' ? 'bot-hdr' : 'sys-hdr');
            hdr.className = `msg-header ${hdrClass}`;
            hdr.innerText = `[${headerText}] >`;
            wrapper.appendChild(hdr);

            // İçerik Ekleme
            const div = document.createElement('div'); div.className = `msg ${extraClass}`;
            let formattedText = text.replace(/\*\*(.*?)\*\*/g, '<b style="color:#fff;">$1</b>').replace(/\*(.*?)\*/g, '<i>$1</i>').replace(/```(.*?)```/gs, '<pre><code>$1</code></pre>').replace(/\n/g, '<br>'); 
            
            if (useTypingEffect && type === 'bot') {
                wrapper.appendChild(div); messagesDiv.appendChild(wrapper);
                let charIndex = 0; let cleanText = formattedText.replace(/<[^>]*
