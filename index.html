<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS AI V11 - OMEGA</title>
    <style>
        /* --- KUSURSUZ MOBİL UYUM VE SİBER TASARIM --- */
        * { box-sizing: border-box; }
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; background: #000; 
            overflow: hidden; font-family: 'Courier New', Courier, monospace; color: #00ffcc; 
        }
        
        #bg-canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; opacity: 0.25; pointer-events: none; }
        
        #chat-app { 
            position: relative; z-index: 10; width: 100%; max-width: 950px; height: 100%; margin: 0 auto; 
            display: flex; flex-direction: column; background: rgba(0, 5, 10, 0.95);
            border-left: 2px solid #00ffcc; border-right: 2px solid #00ffcc;
        }

        /* --- ÜST BÖLÜM --- */
        #header { 
            background: #001122; border-bottom: 2px dashed #00ffcc; padding: 12px 15px; 
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; 
        }
        .header-title { font-size: 1.4em; font-weight: bold; margin: 0; text-shadow: 0 0 10px rgba(0,255,204,0.8); }
        .header-title span { color: #000; font-size: 0.5em; background: #00ffcc; padding: 3px 6px; border-radius: 4px; vertical-align: middle; margin-left: 5px; animation: pulse 2s infinite;}
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .controls { display: flex; gap: 5px; flex-wrap: wrap; }
        .controls button { 
            background: rgba(0,255,204,0.1); color: #00ffcc; border: 1px solid #00ffcc; 
            padding: 8px 10px; border-radius: 4px; font-weight: bold; font-family: inherit; 
            font-size: 0.85em; cursor: pointer; transition: 0.2s;
        }
        .controls button:active { background: #00ffcc; color: #000; }
        
        #btn-reset { color: #ff3366; border-color: #ff3366; background: rgba(255,51,102,0.1); }
        #btn-reset:active { background: #ff3366; color: #fff; }

        /* --- SOHBET EKRANI --- */
        #messages { 
            flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; 
        }
        
        .msg-container { display: flex; flex-direction: column; width: 100%; }
        .msg-container.user { align-items: flex-end; }
        .msg-container.bot { align-items: flex-start; }
        .msg-container.system { align-items: center; }
        
        .msg-header { font-size: 0.75em; font-weight: bold; margin-bottom: 4px; opacity: 0.8; }
        .user .msg-header { color: #00ffcc; }
        .bot .msg-header { color: #ff0055; }
        .system .msg-header { color: #ffaa00; }

        .msg { max-width: 90%; padding: 12px 16px; border-radius: 6px; font-size: 1.05em; line-height: 1.4; word-wrap: break-word; }
        .user .msg { background: rgba(0, 255, 204, 0.15); border: 1px solid #00ffcc; color: #fff; border-bottom-right-radius: 0; box-shadow: 0 0 10px rgba(0,255,204,0.2);}
        .bot .msg { background: rgba(255, 0, 85, 0.1); border: 1px solid #ff0055; color: #00ffcc; border-bottom-left-radius: 0; box-shadow: 0 0 10px rgba(255,0,85,0.2); }
        .system .msg { border: 1px dashed #ffaa00; color: #ffaa00; background: rgba(255,170,0,0.1); text-align: center; font-size: 0.95em; }
        .error-msg { border-color: #ff3333 !important; color: #ff6666 !important; background: rgba(255,0,0,0.15) !important; text-align: left !important; }

        /* --- MOBİL YAZI GİRİŞİ ALANI (FORM) --- */
        #input-area { background: #000; border-top: 2px dashed #00ffcc; padding: 12px 15px; display: flex; align-items: center; gap: 8px; margin: 0;}
        .icon-btn { background: #001122; color: #00ffcc; border: 1px solid #00ffcc; width: 45px; height: 45px; border-radius: 6px; font-size: 1.2em; display: flex; justify-content: center; align-items: center; cursor: pointer; flex-shrink: 0;}
        
        input[type="text"] { flex: 1; padding: 12px; background: #000; border: 1px solid #00ffcc; color: #fff; font-family: inherit; font-size: 1.1em; border-radius: 6px; outline: none; min-width: 0;}
        input[type="text"]:focus { box-shadow: inset 0 0 15px rgba(0,255,204,0.4); }
        
        #send-btn { background: #00ffcc; color: #000; border: none; font-weight: bold; font-family: inherit; font-size: 1.1em; height: 45px; padding: 0 20px; border-radius: 6px; cursor: pointer; flex-shrink: 0;}
        
        /* --- AYARLAR MODALI --- */
        #settings-modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: #001122; padding: 25px; border: 2px solid #00ffcc; width: 90%; max-width: 400px; text-align: center; border-radius: 8px; box-shadow: 0 0 40px rgba(0,255,204,0.3);}
        .modal-content input, .modal-content select { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #00ffcc; color: #00ffcc; font-family: inherit; outline: none; border-radius: 4px; }
        .modal-content button { width: 100%; padding: 12px; background: #00ffcc; border: none; color: #000; font-weight: bold; font-family: inherit; font-size: 1.1em; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        .modal-content button.cancel { background: transparent; color: #00ffcc; border: 1px solid #00ffcc; }

        pre { background: #000; padding: 10px; border-left: 3px solid #00ffcc; overflow-x: auto; color: #00ffcc; font-size: 0.9em; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #00ffcc; }
        
        /* Easter Egg Rengi */
        .hack-mode { border-color: #ff0055 !important; color: #ff0055 !important; text-shadow: 0 0 10px #ff0055 !important;}
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div id="chat-app">
        <!-- HEADER -->
        <div id="header">
            <h1 class="header-title" id="main-title">NEXUS_OS <span>V11 OMEGA</span></h1>
            <div class="controls">
                <button onclick="openSettings()" type="button">⚙️ AYARLAR</button>
                <button id="voice-toggle" onclick="toggleVoice()" type="button">🔊 SES</button>
                <button id="btn-reset" onclick="clearMemory()" type="button">🧹 SIFIRLA</button>
            </div>
        </div>
        
        <!-- SOHBET EKRANI -->
        <div id="messages"></div>
        
        <!-- V11 YENİLİK: MOBİL KLAVYELER İÇİN FORM ALTYAPISI -->
        <form id="input-area" onsubmit="sendMessage(event)">
            <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
            <button type="button" class="icon-btn" onclick="document.getElementById('file-input').click()">👁️</button>
            <button type="button" class="icon-btn" id="mic-btn" onclick="startDictation()">🎙️</button>
            <input type="text" id="userInput" placeholder="_Komut girin..." autocomplete="off">
            <button type="submit" id="send-btn">[İLET]</button>
        </form>

        <!-- ŞİFRE VE MODEL EKRANI -->
        <div id="settings-modal">
            <div class="modal-content">
                <h2 style="color:#00ffcc; margin-top:0;">GİZLİ BAĞLANTI PROTOKOLÜ</h2>
                <label style="color:#aaa; font-size: 0.85em; text-align: left; display: block;">1. API Anahtarınız:</label>
                <input type="password" id="api-key-input" placeholder="AIzaSy...">
                
                <label style="color:#aaa; font-size: 0.85em; text-align: left; display: block; margin-top: 10px;">2. Yapay Zeka Modeli:</label>
                <select id="model-select">
                    <option value="gemini-1.5-flash-latest">NEXUS HIZLI (Flash-Latest) - Önerilen</option>
                    <option value="gemini-1.5-pro-latest">NEXUS ZEKİ (Pro-Latest)</option>
                    <option value="gemini-2.0-flash">NEXUS YENİ NESİL (2.0 Flash)</option>
                </select>

                <button onclick="saveSettings()" type="button">SİSTEMİ GÜNCELLE</button>
                <button class="cancel" onclick="closeSettings()" type="button">İPTAL</button>
            </div>
        </div>
    </div>

    <script>
        // --- MATRIX ARKA PLAN ---
        const canvas = document.getElementById('bg-canvas'); const ctx = canvas.getContext('2d');
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();
        const letters = '01'; const fontSize = 16; let columns = canvas.width / fontSize;
        let drops = []; for(let x = 0; x < columns; x++) drops[x] = Math.random() * -100;
        let matrixColor = '#00ffcc';
        
        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = matrixColor; ctx.font = fontSize + 'px monospace';
            for(let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        // --- ZAMAN DAMGASI ---
        function getTime() { const now = new Date(); return `[${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}]`; }

        // --- KURŞUN GEÇİRMEZ HAFIZA ALTYAPISI ---
        const messagesDiv = document.getElementById('messages');
        const inputField = document.getElementById('userInput');
        let chatHistory = [];
        let isVoiceEnabled = true; let selectedImageBase64 = null;

        const systemContext = `Sen Bilişim Teknolojileri projesi için geliştirilmiş 'NEXUS' adında zeki bir yapay zekasın. Kullanıcıya 'kanka' diyebilirsin. Bilişim hocasını etkilemek için teknolojik ve hacker jargonu kullanarak yardımcı ol.`;

        window.onload = () => {
            try {
                const savedData = localStorage.getItem('nexusHafiza_v11');
                if(savedData) chatHistory = JSON.parse(savedData);
            } catch(e) { chatHistory = []; localStorage.removeItem('nexusHafiza_v11'); }

            let key = localStorage.getItem('nexusApiKey');
            let model = localStorage.getItem('nexusModel');
            if(model) document.getElementById('model-select').value = model;
            
            if(!key) setTimeout(() => openSettings(), 500);

            if (chatHistory.length === 0) {
                addMsg("SİSTEM ÇEVRİMİÇİ. Tüm güvenlik duvarları aktif. Bilişim projesi sunumu için komut bekliyorum.", "bot", "NEXUS_CORE", false, getTime());
            } else {
                chatHistory.forEach(msg => { 
                    if(msg.parts && msg.parts[0] && msg.parts[0].text) {
                        addMsg(msg.parts[0].text, msg.role === 'user' ? 'user' : 'bot', msg.role === 'user' ? 'GUEST_USER' : 'NEXUS_AI', false, msg.time || getTime()); 
                    }
                });
            }
        };

        // --- GÜVENLİK VE MODEL AYARLARI ---
        function openSettings() { 
            document.getElementById('settings-modal').style.display = 'flex'; 
            document.getElementById('api-key-input').value = localStorage.getItem('nexusApiKey') || ""; 
            let model = localStorage.getItem('nexusModel');
            if(model) document.getElementById('model-select').value = model;
        }
        function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }
        
        function saveSettings() {
            const key = document.getElementById('api-key-input').value.trim();
            const model = document.getElementById('model-select').value;
            if(key) { 
                localStorage.setItem('nexusApiKey', key); 
                localStorage.setItem('nexusModel', model); 
                closeSettings(); 
                addMsg(`SİSTEM GÜNCELLENDİ. KULLANILAN BEYİN: ${model}`, "system", "SECURITY", false, getTime()); 
            }
        }

        // --- GÖRSEL VE SES ---
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                selectedImageBase64 = e.target.result.split(',')[1]; 
                addMsg("[GÖRSEL HAFIZAYA ALINDI] Lütfen bu görselle ilgili komut giriniz.", "system", "MEMORY", false, getTime());
            };
            reader.readAsDataURL(file);
        }

        function toggleVoice() { isVoiceEnabled = !isVoiceEnabled; document.getElementById('voice-toggle').innerText = isVoiceEnabled ? "🔊 SES: AÇIK" : "🔇 SES: KAPALI"; if(!isVoiceEnabled) window.speechSynthesis.cancel(); }
        function speakText(text) {
            if (!isVoiceEnabled || !window.speechSynthesis) return;
            const utterance = new SpeechSynthesisUtterance(text.replace(/[*#`_]/g, '')); utterance.lang = 'tr-TR'; utterance.pitch = 0.8; utterance.rate = 1.1; window.speechSynthesis.speak(utterance);
        }

        function startDictation() {
            if ('webkitSpeechRecognition' in window) {
                const micBtn = document.getElementById('mic-btn'); const recognition = new webkitSpeechRecognition(); recognition.lang = "tr-TR"; 
                recognition.onstart = () => { micBtn.style.background = "#ff0055"; inputField.placeholder = "Seni dinliyorum..."; };
                recognition.onresult = (e) => { inputField.value = e.results[0][0].transcript; micBtn.style.background = "#001122"; inputField.placeholder = "_Komut girin..."; sendMessage(new Event('submit')); };
                recognition.onerror = () => { micBtn.style.background = "#001122"; inputField.placeholder = "Anlaşılamadı..."; };
                recognition.start();
            } else { alert("Tarayıcınız ses sistemini desteklemiyor."); }
        }

        function sanitizeHistory(newMsgPart) {
            let validContents = []; let rawContents = [...chatHistory, { role: "user", parts: newMsgPart }];
            for(let msg of rawContents) {
                let cleanMsg = { role: msg.role, parts: msg.parts };
                if (validContents.length === 0 || validContents[validContents.length - 1].role !== cleanMsg.role) {
                    validContents.push(cleanMsg);
                } else { validContents[validContents.length - 1].parts.push(...cleanMsg.parts); }
            }
            return validContents;
        }

        // --- V11 KUSURSUZ API İLETİŞİMİ ---
        async function sendMessage(event) {
            if(event) event.preventDefault(); // Sayfanın yenilenmesini engeller (Mobil form için çok kritik)

            let apiKey = localStorage.getItem('nexusApiKey');
            let selectedModel = localStorage.getItem('nexusModel') || 'gemini-1.5-flash-latest';
            if(!apiKey) { openSettings(); return; }

            const text = inputField.value.trim();
            if(!text && !selectedImageBase64) return;

            // --- EASTER EGGS (GİZLİ KOMUTLAR) ---
            if(text.toLowerCase() === "hocam_geldi()") {
                inputField.value = '';
                addMsg("⚠️ DİKKAT! SAYIN BİLİŞİM ÖĞRETMENİ TESPİT EDİLDİ! <br><br>ANALİZ: Proje kusursuz kodlanmış ve yüksek güvenlikli şifreleme altyapısına sahip.<br>ÖNERİLEN NOT: 100 ÜZERİNDEN 100", "bot", "NEXUS_AI", false, getTime());
                speakText("Dikkat. Sayın Bilişim Öğretmeni tespit edildi. Proje kusursuz. Önerilen not yüz.");
                return;
            }
            if(text.toLowerCase() === "sudo_hack()") {
                inputField.value = '';
                matrixColor = '#ff0055';
                document.getElementById('header').classList.add('hack-mode');
                addMsg("[İHLAL TESPİT EDİLDİ] GÜVENLİK DUVARLARI AŞILIYOR... SİSTEM ELE GEÇİRİLDİ.", "system", "HACK_MODE", true, getTime());
                speakText("Sistem ele geçirildi. Güvenlik duvarları aşıldı.");
                return;
            }

            let userDisplay = text;
            if (selectedImageBase64) userDisplay += "<br><i>(Görsel yüklendi)</i>";
            let currentTime = getTime();
            addMsg(userDisplay, 'user', "GUEST_USER", false, currentTime);
            inputField.value = '';
            
            let userPart = [];
            if (text) userPart.push({ text: text }); else userPart.push({ text: "Veritabanındaki bu resmi analiz et." });
            if (selectedImageBase64) { userPart.push({ inlineData: { mimeType: "image/jpeg", data: selectedImageBase64 } }); selectedImageBase64 = null; }

            const typingId = "typing-" + Date.now();
            addMsg("Sistem ağa bağlanıyor...", 'system', "NEXUS_DAEMON", false, getTime(), typingId);

            try {
                const safeContents = sanitizeHistory(userPart);
                const requestBody = { systemInstruction: { parts: [{ text: systemContext }] }, contents: safeContents.slice(-10) };

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    let realError = ""; try { const errJson = await response.json(); realError = errJson.error.message; } catch(e) { realError = response.statusText; }
                    throw new Error(realError);
                }

                const data = await response.json();
                const botReply = data.candidates[0].content.parts[0].text;
                let botTime = getTime();

                chatHistory.push({ role: "user", parts: [{ text: text || "Görsel incelendi." }], time: currentTime });
                chatHistory.push({ role: "model", parts: [{ text: botReply }], time: botTime });
                localStorage.setItem('nexusHafiza_v11', JSON.stringify(chatHistory));

                document.getElementById(typingId).remove();
                addMsg(botReply, 'bot', "NEXUS_AI", false, botTime);
                speakText(botReply);

            } catch (error) {
                console.error(error);
                document.getElementById(typingId).remove();
                addMsg(`🚨 [SİBER HATA]: ${error.message}<br><br>> ÇÖZÜM: Ayarlardan modelin 'NEXUS HIZLI (Flash-Latest)' olduğundan emin ol. Hata 'API key not valid' ise, Google sana attığın şifreyi yine engellemiş demektir!`, 'system', "ERROR", true, getTime());
            }
        }

        function clearMemory() {
            if(confirm("Tüm veri tabanını silmek istediğinize emin misiniz?")) {
                localStorage.removeItem('nexusHafiza_v11'); chatHistory = []; messagesDiv.innerHTML = '';
                matrixColor = '#00ffcc'; document.getElementById('header').classList.remove('hack-mode');
                addMsg("TÜM HAFIZA TEMİZLENDİ. SİSTEM SIFIRLANDI.", "system", "SYSTEM", false, getTime());
            }
        }

        function addMsg(text, type, headerText = "", isError = false, time = "", typingId = null) {
            const wrapper = document.createElement('div'); wrapper.className = `msg-container ${type}`; 
            if(typingId) wrappe
