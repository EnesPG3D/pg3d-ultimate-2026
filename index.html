.card { background: var(--glass); border: 1px solid var(--brd); border-radius: 10px; padding: 20px; transition: 0.2s; cursor: pointer; position: relative; }
.card:hover { transform: translateY(-5px); border-color: var(--p); box-shadow: 0 5px 20px rgba(0,255,204,0.3); }

function col(s){
    let l=s.toLowerCase();
    if(l.includes('ateş')||l.includes('lav')) return 'e-fire';
    if(l.includes('su')||l.includes('buz')) return 'e-water';
    if(l.includes('karanlık')||l.includes('zehir')) return 'e-dark';
    if(l.includes('ışık')||l.includes('kutsal')) return 'e-light';
    if(l.includes('toprak')||l.includes('doğa')) return 'e-earth';
    return '';
}

function copy(n){
    navigator.clipboard.writeText(n);
    let t=document.getElementById("toast"); t.innerText=`[${n}] Kopyalandı!`; 
    t.className="show"; setTimeout(()=>t.className="", 2000);
}

function render(arr){
    c.innerHTML='';
    if(arr.length===0){ c.innerHTML=`<div style="grid-column:1/-1;text-align:center;color:#ff4d4d;font-size:1.5em;padding:40px;font-weight:bold;">KAYIT BULUNAMADI</div>`; return; }
    let h='';
    for(let i=0; i<arr.length; i++){
        let it=arr[i]; let cls=col(it.s);
        h+=`<div class="card" onclick="copy('${it.n}')">
            <div class="type">${it.t}</div><h2>${it.n}</h2>
            <div class="stats ${cls}">⚡ ${it.s}</div><p>${it.d}</p></div>`;
    }
    c.innerHTML=h;
}

function loadCat(cat){
    cur=cat; document.querySelectorAll('.nav-tabs button').forEach(b=>b.classList.remove('active'));
    document.getElementById('btn-'+cat).classList.add('active');
    document.getElementById('searchInput').value=''; render(db[cur]);
}

function filterItems(){
    let t=document.getElementById('searchInput').value.toLowerCase();
    render(db[cur].filter(i=>i.n.toLowerCase().includes(t)||i.s.toLowerCase().includes(t)||i.d.toLowerCase().includes(t)||i.t.toLowerCase().includes(t)));
}

// SIFIR GECİKME: YÜKLEME EKRANINI ANINDA YOK ET VE VERİYİ ÇİZ
render(db[cur]);
document.getElementById('loader').style.opacity='0';
setTimeout(()=>document.getElementById('loader').style.display='none', 400);
</script>
