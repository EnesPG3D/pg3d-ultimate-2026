<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS_OS - V13 SUPREME</title>
    <style>
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #00ff00; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        #matrix-canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; opacity: 0.3; pointer-events: none; }
        #app-container { position: relative; z-index: 10; width: 100%; max-width: 900px; height: 100%; margin: 0 auto; display: flex; flex-direction: column; background: rgba(0, 10, 0, 0.85); border-left: 2px solid #00ff00; border-right: 2px solid #00ff00; box-shadow: 0 0 50px rgba(0, 255, 0, 0.1); }
        #boot-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; padding: 20px; color: #00ff00; font-size: 1.2em; font-weight: bold; text-shadow: 0 0 5px #00ff00; }
        #header { background: rgba(0, 20, 0, 0.9); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px dashed #00ff00; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 1.4em; font-weight: 900; margin: 0; text-shadow: 0 0 10px #00ff00; letter-spacing: 1px;}
        .logo span { font-size: 0.5em; background: #00ff00; color: #000; padding: 3px 6px; border-radius: 3px; vertical-align: middle; margin-left: 5px; }
        .controls { display: flex; gap: 8px; flex-wrap: wrap; }
        .top-btn { background: rgba(0, 255, 0, 0.1); color: #00ff00; border: 1px solid #00ff00; padding: 8px 12px; border-radius: 4px; font-weight: bold; font-family: inherit; cursor: pointer; transition: 0.2s; font-size: 0.9em; text-transform: uppercase; }
        .top-btn:active { background: #00ff00; color: #000; }
        .btn-danger { color: #ff3333 !important; border-color: #ff3333 !important; background: rgba(255,51,51,0.1) !important;}
        .btn-danger:active { background: #ff3333 !important; color: #fff !important; }
        #messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .msg-container { display: flex; flex-direction: column; width: 100%; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .msg-container.user { align-items: flex-end; }
        .msg-container.bot { align-items: flex-start; }
        .msg-container.system { align-items: center; }
        .sender { font-size: 0.8em; margin-bottom: 4px; font-weight: bold; opacity: 0.8; }
        .user .sender { color: #00ffcc; }
        .bot .sender { color: #ff0055; }
        .bubble { max-width: 90%; padding: 12px 16px; border-radius: 6px; font-size: 1.05em; line-height: 1.4; word-wrap: break-word; }
        .user .bubble { background: rgba(0, 255, 204, 0.15); border: 1px solid #00ffcc; color: #fff; border-bottom-right-radius: 0; }
        .bot .bubble { background: rgba(255, 0, 85, 0.1); border: 1px solid #ff0055; color: #00ff00; border-bottom-left-radius: 0; cursor: pointer; }
        .bot .bubble:active { opacity: 0.5; }
        .system .bubble { background: rgba(255, 170, 0, 0.1); border: 1px dashed #ffaa00; color: #ffaa00; text-align: center; font-size: 0.9em; }
        #input-form { background: #000; padding: 12px 15px; display: flex; align-items: center; gap: 8px; border-top: 2px dashed #00ff00; margin: 0; }
        .icon-btn { background: #001a00; color: #00ff00; border: 1px solid #00ff00; width: 45px; height: 45px; border-radius: 6px; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 1.3em; flex-shrink: 0; }
        .icon-btn:active { background: #00ff00; color: #000; }
        input[type="text"] { flex: 1; padding: 12px; background: #000; border: 1px solid #00ff00; color: #00ff00; font-family: inherit; font-size: 16px; border-radius: 6px; outline: none; min-width: 0; font-weight: bold; }
        input[type="text"]:focus { box-shadow: inset 0 0 15px rgba(0,255,0,0.3); }
        .send-btn { background: #00ff00; color: #000; border: none; font-weight: 900; font-family: inherit; font-size: 16px; height: 45px; padding: 0 20px; border-radius: 6px; cursor: pointer; flex-shrink: 0; }
        .send-btn:active { transform: scale(0.95); }
        #settings-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; }
        .modal-box { background: #001a00; padding: 25px; border: 2px solid #00ff00; width: 90%; max-width: 400px; text-align: center; border-radius: 8px; box-shadow: 0 0 30px rgba(0,255,0,0.4); }
        .modal-box h3 { color: #00ff00; margin-top: 0; }
        .modal-box input, .modal-box select { width: 100%; padding: 12px; margin-bottom: 15px; background: #000; border: 1px dashed #00ff00; color: #00ff00; outline: none; font-family: inherit; font-size: 16px; font-weight: bold; }
        .modal-btn { width: 100%; padding: 12px; background: #00ff00; border: none; color: #000; font-weight: 900; font-size: 16px; cursor: pointer; margin-bottom: 10px; font-family: inherit; border-radius: 4px; }
        .modal-btn.cancel { background: #000; color: #00ff00; border: 1px solid #00ff00; margin-bottom: 0; }
        pre { background: #000; padding: 10px; border-left: 3px solid #00ff00; overflow-x: auto; color: #00ff00; }
    </style>
</head>
<body>
    <div id="boot-screen" id="boot"><div id="boot-text"></div></div>
    <canvas id="matrix-canvas"></canvas>
    <div id="app-container">
        <div id="header">
            <h1 class="logo">NEXUS_OS <span>V13</span></h1>
            <div class="controls">
                <button class="top-btn" onclick="openSettings()" type="button">⚙️ ŞİFRE</button>
                <button class="top-btn" onclick="toggleVoice()" id="voice-btn" type="button">🔊 SES</button>
                <button class="top-btn btn-danger" onclick="clearMemory()" type="button">🧹 SIFIRLA</button>
            </div>
        </div>
        <div id="messages"></div>
        <form id="input-form">
            <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
            <button type="button" class="icon-btn" onclick="document.getElementById('file-input').click()">👁️</button>
            <input type="text" id="userInput" placeholder="> Komut girin_" autocomplete="off">
            <button type="submit" class="send-btn">[İLET]</button>
        </form>
    </div>
    <div id="settings-modal">
        <div class="modal-box">
            <h3>ROOT ERİŞİMİ</h3>
            <p style="color:#aaa; font-size:0.9em; margin-bottom:15px;">Bağlantı için şifrenizi girin.</p>
            <input type="password" id="api-key-input" placeholder="AIzaSy...">
            <select id="model-select">
                <option value="gemini-1.5-flash">NEXUS HIZLI BEYİN (Flash)</option>
                <option value="gemini-1.5-pro">NEXUS DERİN ZEKÂ (Pro)</option>
            </select>
            <button class="modal-btn" onclick="saveSettings()" type="button">ONAYLA VE BAĞLAN</button>
            <button class="modal-btn cancel" onclick="closeSettings()" type="button">İPTAL</button>
        </div>
    </div>
    <script>
        const SafeDB = {
            mem: {},
            get: function(k) { try { return window.localStorage.getItem(k) || this.mem[k] || ""; } catch(e) { return this.mem[k] || ""; } },
            set: function(k, v) { this.mem[k] = v; try { window.localStorage.setItem(k, v); } catch(e) {} },
            del: function(k) { delete this.mem[k]; try { window.localStorage.removeItem(k); } catch(e) {} }
        };
        const messagesDiv = document.getElementById('messages');
        const inputField = document.getElementById('userInput');
        const inputForm = document.getElementById('input-form');
        let chatHistory = []; let isVoiceEnabled = true; let selectedImageBase64 = null;
        const systemContext = `Sen Bilişim Teknolojileri projesi için geliştirilmiş 'NEXUS' adında üst düzey bir hacker yapay zekasın. Kullanıcıya 'kanka' diyebilirsin. Bilişim hocasını etkilemek için teknolojik ve hacker jargonu kullan.`;
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();
        const letters = '01NEXUS10HACK10'; const fontSize = 16; let columns = canvas.width / fontSize;
        let drops = []; for(let x = 0; x < columns; x++) drops[x] = Math.random() * -100;
        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff00'; ctx.font = fontSize + 'px monospace';
            for(let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);
        function runBootSequence() {
            const bootText = document.getElementById('boot-text');
            const lines = ["> NEXUS_OS YÜKLENİYOR...", "> GÜVENLİK PROTOKOLLERİ AKTİF...", "> BİLİŞİM PROJESİ AĞINA BAĞLANILIYOR...", "> ERİŞİM SAĞLANDI."];
            let delay = 0;
            lines.forEach((line) => { setTimeout(() => { bootText.innerHTML += line + "<br>"; }, delay); delay += 600; });
            setTimeout(() => { document.getElementById('boot-screen').style.display = 'none'; initApp(); }, delay + 500);
        }
        function initApp() {
            const savedData = SafeDB.get('nexus_v13_history');
            if(savedData) { try { chatHistory = JSON.parse(savedData); } catch(e) { chatHistory = []; } }
            let key = SafeDB.get('nexus_v13_key'); let model = SafeDB.get('nexus_v13_model');
            if(model) document.getElementById('model-select').value = model;
            if(!key) setTimeout(() => openSettings(), 500);
            if (chatHistory.length === 0) { addMsg("SİSTEM ÇEVRİMİÇİ. Tüm güvenlik duvarları aktif. Komut bekleniyor...", "system", "SİSTEM"); } 
            else { chatHistory.forEach(msg => { if(msg.parts && msg.parts[0]) addMsg(msg.parts[0].text, msg.role === 'user' ? 'user' : 'bot', msg.role === 'user' ? 'GUEST_USER' : 'NEXUS_AI'); }); }
        }
        function openSettings() { document.getElementById('settings-modal').style.display = 'flex'; document.getElementById('api-key-input').value = SafeDB.get('nexus_v13_key') || ""; }
        function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }
        function saveSettings() {
            const key = document.getElementById('api-key-input').value.trim(); const model = document.getElementById('model-select').value;
            if(key) { SafeDB.set('nexus_v13_key', key); SafeDB.set('nexus_v13_model', model); closeSettings(); addMsg(`SİSTEM GÜNCELLENDİ. BEYİN: ${model}`, "system", "GÜVENLİK"); }
        }
        function handleImageUpload(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) { selectedImageBase64 = e.target.result.split(',')[1]; addMsg("[GÖRSEL VERİSİ HAFIZAYA ALINDI] Komut bekleniyor.", "system", "BELLEK"); };
            reader.readAsDataURL(file);
        }
        function toggleVoice() { isVoiceEnabled = !isVoiceEnabled; document.getElementById('voice-btn').innerText = isVoiceEnabled ? "🔊 SES" : "🔇 SESSİZ"; if(!isVoiceEnabled && window.speechSynthesis) window.speechSynthesis.cancel(); }
        function speakText(text) {
            if (!isVoiceEnabled || !window.speechSynthesis) return;
            const utterance = new SpeechSynthesisUtterance(text.replace(/[*#`_]/g, '')); utterance.lang = 'tr-TR'; utterance.pitch = 0.8; utterance.rate = 1.1; window.speechSynthesis.speak(utterance);
        }
        function copyText(text) {
            const cleanText = text.replace(/<br>/g, '\n').replace(/<[^>]+>/g, '');
            navigator.clipboard.writeText(cleanText).then(() => alert("Mesaj Kopyalandı!")).catch(e => console.log(e));
        }
        function clearMemory() {
            if(confirm("Tüm sohbet silinecek onaylıyor musun?")) { SafeDB.del('nexus_v13_history'); location.reload(); }
        }
        async function handleFormSubmit(event) {
            if(event) event.preventDefault(); 
            let apiKey = SafeDB.get('nexus_v13_key'); let selectedModel = SafeDB.get('nexus_v13_model') || 'gemini-1.5-flash';
            if(!apiKey) { openSettings(); return; }
            const text = inputField.value.trim();
            if(!text && !selectedImageBase64) return;
            if(text.toLowerCase() === "hocam_geldi()") {
                inputField.value = ''; addMsg("⚠️ SAYIN BİLİŞİM ÖĞRETMENİ TESPİT EDİLDİ! <br><br>> Proje Mimarisi: Profesyonel<br>> Mobil Uyum: %100<br>> ÖNERİLEN NOT: 100", "bot", "NEXUS_AI");
                speakText("Sayın Bilişim Öğretmeni tespit edildi. Proje kusursuz. Önerilen not yüz."); return;
            }
            let userDisplay = text; if (selectedImageBase64) userDisplay += "<br><i style='color:#00ffcc;'>(Görsel Eklendi)</i>";
            addMsg(userDisplay, 'user', "GUEST_USER"); inputField.value = '';
            let userPart = []; if (text) userPart.push({ text: text }); else userPart.push({ text: "Bu resmi incele." });
            if (selectedImageBase64) { userPart.push({ inlineData: { mimeType: "image/jpeg", data: selectedImageBase64 } }); selectedImageBase64 = null; }
            const typingId = "typing-" + Date.now(); addMsg("> AĞA BAĞLANILIYOR [██████░░░]", 'system', 'AĞ_PROTOKOLÜ', typingId);
            try {
                let validHistory = [];
                [...chatHistory, { role: "user", parts: userPart }].forEach(msg => {
                    if (validHistory.length === 0 || validHistory[validHistory.length - 1].role !== msg.role) { validHistory.push({ role: msg.role, parts: msg.parts }); } 
                    else { validHistory[validHistory.length - 1].parts.push(...msg.parts); }
                });
                const requestBody = { systemInstruction: { parts: [{ text: systemContext }] }, contents: validHistory.slice(-10) };
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(requestBody)
                });
                if (!response.ok) {
                    let errStr = response.statusText; try { const errJson = await response.json(); errStr = errJson.error.message; } catch(e) {}
                    throw new Error(errStr);
                }
                const data = await response.json(); let botReply = data.candidates[0].content.parts[0].text;
                chatHistory.push({ role: "user", parts: [{ text: text || "Görsel incelendi." }] }); chatHistory.push({ role: "model", parts: [{ text: botReply }] });
                SafeDB.set('nexus_v13_history', JSON.stringify(chatHistory));
                document.getElementById(typingId).remove(); addMsg(botReply, 'bot', "NEXUS_AI"); speakText(botReply);
            } catch (error) {
                console.error(error); document.getElementById(typingId).remove();
                addMsg(`[BAĞLANTI HATASI]: ${error.message}<br><br>> Şifreniz iptal olmuş olabilir. Ayarlardan yeni şifre girin.`, 'system', "HATA");
            }
        }
        inputForm.addEventListener('submit', handleFormSubmit);
        function addMsg(text, type, senderName = "", id = null) {
            const wrapper = document.createElement('div'); wrapper.className = `msg-container ${type}`; if(id) wrapper.id = id; 
            if(senderName !== "") { const hdr = document.createElement('div'); hdr.className = 'sender'; hdr.innerText = `[${senderName}]`; wrapper.appendChild(hdr); }
            const div = document.createElement('div'); div.className = 'bubble';
            if(type === 'bot') { div.title = "Kopyalamak için tıklayın"; div.onclick = () => copyText(text); }
            div.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\*(.*?)\*/g, '<i>$1</i>').replace(/```([\s\S]*?)```/gs, '<pre><code>$1</code></pre>').replace(/\n/g, '<br>'); 
            wrapper.appendChild(div); messagesDiv.appendChild(wrapper);
            setTimeout(() => { messagesDiv.scrollTop = messagesDiv.scrollHeight; }, 50);
        }
        window.onload = runBootSequence;
    </script>
</body>
                </html>
