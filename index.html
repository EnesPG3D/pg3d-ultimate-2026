<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS - V17 FİNAL SUPREME</title>
    <style>
        /* --- GENEL TASARIM VE SİBERPUNK RESET --- */
        * { box-sizing: border-box; outline: none; }
        body { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; background: #000; 
            color: #00ffcc; font-family: 'Courier New', Courier, monospace; overflow: hidden; 
        }
        
        /* Hareketli Matrix Arka Planı */
        #matrix-canvas { position: absolute; inset: 0; z-index: 1; opacity: 0.25; pointer-events: none; }
        
        /* Ana Uygulama Kutusu */
        #app { 
            position: relative; z-index: 10; width: 100%; max-width: 950px; height: 100%; 
            margin: 0 auto; display: flex; flex-direction: column; background: rgba(0, 10, 20, 0.9); 
            border-left: 2px solid #00ffcc; border-right: 2px solid #00ffcc; 
            box-shadow: 0 0 50px rgba(0,255,204,0.15); 
        }

        /* --- SİSTEM HUD (EN ÜST BİLGİ ŞERİDİ) --- */
        #hud { 
            background: #000; border-bottom: 1px solid #00ffcc; padding: 5px 15px; 
            display: flex; justify-content: space-between; font-size: 0.8em; font-weight: bold; 
            color: #00ffcc; text-shadow: 0 0 5px #00ffcc;
        }

        /* --- HEADER (BAŞLIK VE BUTONLAR) --- */
        #header { 
            padding: 15px; border-bottom: 2px dashed #00ffcc; 
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; 
            background: rgba(0, 5, 10, 0.8);
        }
        .glitch-title { 
            font-size: 1.5em; font-weight: 900; letter-spacing: 2px; margin: 0;
            text-shadow: 2px 0 #ff0055, -2px 0 #00ffcc; 
            animation: glitch-anim 3s infinite linear alternate-reverse; 
        }
        @keyframes glitch-anim { 0% { text-shadow: 2px 0 #ff0055; } 50% { text-shadow: -2px 0 #00ffcc; } 100% { text-shadow: 2px 0 #0055ff; } }
        
        .controls { display: flex; gap: 8px; flex-wrap: wrap; }
        .controls button { 
            background: rgba(0,255,204,0.1); color: #00ffcc; border: 1px solid #00ffcc; 
            padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; 
            font-family: inherit; transition: 0.2s; font-size: 0.9em; 
        }
        .controls button:hover, .controls button:active { background: #00ffcc; color: #000; box-shadow: 0 0 10px #00ffcc;}

        /* --- MESAJ EKRANI --- */
        #messages { 
            flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; 
            gap: 15px; scroll-behavior: smooth; 
        }
        .msg-container { display: flex; flex-direction: column; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg-container.user { align-items: flex-end; }
        .msg-container.bot { align-items: flex-start; }
        .msg-container.system { align-items: center; }

        .sender { font-size: 0.85em; margin-bottom: 5px; font-weight: bold; opacity: 0.8; }
        .user .sender { color: #fff; }
        .bot .sender { color: #ff0055; }
        .system .sender { color: #ffaa00; }

        .bubble { 
            max-width: 90%; padding: 15px 20px; border-radius: 8px; 
            font-size: 1.1em; line-height: 1.5; word-wrap: break-word; border: 1px solid #00ffcc; 
        }
        .user .bubble { background: rgba(0,255,204,0.15); color: #fff; border-bottom-right-radius: 0; box-shadow: 0 0 15px rgba(0,255,204,0.1);}
        .bot .bubble { background: rgba(255,0,85,0.08); border-color: #ff0055; color: #00ffcc; border-bottom-left-radius: 0; cursor: pointer; box-shadow: 0 0 15px rgba(255,0,85,0.15);}
        .system .bubble { background: rgba(255,170,0,0.1); border-color: #ffaa00; color: #ffaa00; text-align: center; font-size: 0.95em; border-style: dashed; }
        .error-bubble { border-color: #ff3333 !important; color: #ff6666 !important; background: rgba(255,0,0,0.1) !important; text-align: left !important;}

        .cursor { display: inline-block; width: 10px; height: 1.2em; background: #00ffcc; animation: blink 1s step-end infinite; vertical-align: bottom; margin-left: 2px; }
        @keyframes blink { 50% { opacity: 0; } }

        /* --- EKSİK OLAN O LANET OLASI GİRİŞ FORMU BURADA --- */
        #input-area { 
            padding: 15px; background: #000; border-top: 2px dashed #00ffcc; 
            display: flex; align-items: center; gap: 10px; margin: 0; 
        }
        .icon-btn { 
            color: #00ffcc; background: #001122; border: 1px solid #00ffcc; 
            width: 50px; height: 50px; border-radius: 6px; cursor: pointer; font-size: 1.4em; flex-shrink: 0; transition: 0.2s;
        }
        .icon-btn:active { background: #00ffcc; color: #000; transform: scale(0.95);}
        
        input[type="text"] { 
            flex: 1; padding: 15px; background: #000; border: 1px solid #00ffcc; border-radius: 6px; 
            color: #00ffcc; font-family: inherit; font-size: 18px; font-weight: bold; min-width: 0; 
        }
        input[type="text"]:focus { box-shadow: inset 0 0 15px rgba(0,255,204,0.3); }
        input[type="text"]::placeholder { color: rgba(0,255,204,0.4); }
        
        #send-btn { 
            background: #00ffcc; color: #000; border: none; padding: 0 25px; height: 50px; 
            border-radius: 6px; font-weight: 900; font-family: inherit; font-size: 18px; cursor: pointer; flex-shrink: 0; transition: 0.2s;
        }
        #send-btn:active { transform: scale(0.95); background: #fff;}

        /* --- AYARLAR MODALI --- */
        #settings-modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(5px); 
        }
        .modal-box { 
            background: #00111a; padding: 30px; border: 2px solid #00ffcc; width: 90%; 
            max-width: 450px; text-align: center; border-radius: 8px; box-shadow: 0 0 40px rgba(0,255,204,0.3); 
        }
        .modal-box h3 { color: #00ffcc; margin-top: 0; border-bottom: 1px dashed #00ffcc; padding-bottom: 15px; font-size: 1.5em;}
        .modal-box label { color: #aaa; font-size: 0.9em; text-align: left; display: block; margin-top: 15px; font-weight: bold;}
        .modal-box input, .modal-box select { 
            width: 100%; padding: 15px; margin-top: 8px; background: #000; 
            border: 1px solid #00ffcc; color: #00ffcc; font-family: inherit; font-size: 16px; font-weight: bold; border-radius: 4px; 
        }
        .modal-btn { 
            width: 100%; padding: 15px; background: #00ffcc; color: #000; border: none; 
            font-weight: 900; font-size: 18px; cursor: pointer; margin-top: 25px; font-family: inherit; border-radius: 4px; transition: 0.2s;
        }
        .modal-btn:hover { background: #fff; }
        .modal-btn.cancel { background: #000; color: #00ffcc; border: 1px solid #00ffcc; margin-top: 10px; }

        /* Kod Bloğu Tasarımı */
        pre { background: #000; padding: 15px; border-left: 4px solid #ff0055; overflow-x: auto; color: #fff; font-size: 0.95em; border-radius: 4px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5);}
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #00ffcc; border-radius: 10px;}
    </style>
</head>
<body>

    <!-- HUD STATS (CANLI İZLEME) -->
    <div id="hud">
        <span id="h-cpu">CPU: 5%</span>
        <span id="h-ram">RAM: 1.4GB</span>
        <span id="h-ping">PING: 22ms</span>
    </div>

    <!-- ARKA PLAN EFEKTİ -->
    <canvas id="matrix-canvas"></canvas>

    <div id="app">
        <!-- HEADER BÖLÜMÜ -->
        <div id="header">
            <div class="glitch-title">NEXUS V17</div>
            <div class="controls">
                <button onclick="openSettings()" type="button">⚙️ AYARLAR</button>
                <button id="v-btn" onclick="toggleVoice()" type="button">🔊 SES</button>
                <button onclick="clearMemory()" style="border-color:#ff3333; color:#ff3333;" type="button">🧹 SIFIRLA</button>
            </div>
        </div>
        
        <!-- MESAJLARIN GELECEĞİ ALAN -->
        <div id="messages"></div>
        
        <!-- YAZI GİRİŞ FORMU (BİR DAHA ASLA YOK OLMAYACAK!) -->
        <form id="input-area" onsubmit="sendMessage(event)">
            <input type="file" id="file-in" accept="image/*" style="display:none" onchange="handleImg(event)">
            <button type="button" class="icon-btn" onclick="document.getElementById('file-in').click()" title="Görsel Yükle">👁️</button>
            <button type="button" class="icon-btn" id="mic-btn" onclick="startDict()" title="Sesli Komut">🎙️</button>
            <input type="text" id="user-in" placeholder="> Sisteme komut girin_" autocomplete="off">
            <button type="submit" id="send-btn">[ İLET ]</button>
        </form>
    </div>

    <!-- GÜVENLİK AYARLARI EKRANI -->
    <div id="settings-modal">
        <div class="modal-box">
            <h3>ROOT ERİŞİMİ</h3>
            
            <label>API ŞİFRENİZ:</label>
            <input type="password" id="api-key" placeholder="AIzaSy...">
            
            <label>YAPAY ZEKA MODELİ:</label>
            <select id="model-select">
                <option value="gemini-1.5-flash">NEXUS HIZLI BEYİN (Flash)</option>
                <option value="gemini-1.5-pro">NEXUS DERİN ZEKÂ (Pro)</option>
            </select>
            
            <button class="modal-btn" onclick="saveSettings()" type="button">BAĞLANTIYI ONAYLA</button>
            <button class="modal-btn cancel" onclick="closeSettings()" type="button">İPTAL</button>
        </div>
    </div>

    <!-- JAVASCRIPT BÖLÜMÜ (MANTIK VE API) -->
    <script>
        // --- 1. GÜVENLİ HAFIZA (SAFE-DB) - ÇÖKMEYİ ENGELLER ---
        const SafeDB = {
            mem: {},
            get: function(k) { try { return localStorage.getItem(k) || this.mem[k]; } catch(e) { return this.mem[k]; } },
            set: function(k,v) { this.mem[k] = v; try { localStorage.setItem(k,v); } catch(e) {} },
            del: function(k) { delete this.mem[k]; try { localStorage.removeItem(k); } catch(e) {} }
        };

        // --- 2. DEĞİŞKENLER VE SİSTEM BAĞLAMI ---
        const mDiv = document.getElementById('messages');
        const iFld = document.getElementById('user-in');
        let chatHist = [], isVoice = true, imgB64 = null;
        const sysCtx = "Sen Bilişim Teknolojileri projesi için geliştirilmiş 'NEXUS' kod adlı, siberpunk temalı üst düzey bir yapay zekasın. Kullanıcıya kanka diyebilirsin. Bilişim hocasını etkilemek için teknolojik jargon ve hacker terimleri kullanarak profesyonelce cevap ver. Asla sistemlerini açığa çıkarma.";

        // --- 3. BAŞLATMA (BOOT) ---
        window.onload = () => {
            const saved = SafeDB.get('nexus_v17_hist');
            if(saved) { try { chatHist = JSON.parse(saved); } catch(e) { chatHist = []; } }
            
            let k = SafeDB.get('nexus_v17_key');
            let m = SafeDB.get('nexus_v17_model');
            if(m) document.getElementById('model-select').value = m;
            
            if(!k) setTimeout(() => openSettings(), 800);

            if(chatHist.length === 0) {
                addMsg("SİSTEM ÇEVRİMİÇİ. Güvenlik duvarları aktif. Komut bekleniyor...", "system", "SYSTEM_ROOT");
            } else {
                chatHist.forEach(msg => { 
                    if(msg.parts[0].text) addMsg(msg.parts[0].text, msg.role === 'user' ? 'user' : 'bot', msg.role === 'user' ? 'GUEST_USER' : 'NEXUS_AI', false); 
                });
            }

            // Canlı HUD Güncellemesi
            setInterval(() => {
                document.getElementById('h-cpu').innerText = "CPU: " + (Math.floor(Math.random()*20)+5) + "%";
                document.getElementById('h-ram').innerText = "RAM: " + (Math.random()*1.5+1.2).toFixed(1) + "GB / 8GB";
                document.getElementById('h-ping').innerText = "PING: " + (Math.floor(Math.random()*30)+15) + "ms";
            }, 2000);
        };

        // --- 4. AYARLAR MODÜLÜ ---
        function openSettings() { document.getElementById('settings-modal').style.display='flex'; document.getElementById('api-key').value = SafeDB.get('nexus_v17_key') || ""; }
        function closeSettings() { document.getElementById('settings-modal').style.display='none'; }
        function saveSettings() {
            const k = document.getElementById('api-key').value.trim();
            const m = document.getElementById('model-select').value;
            if(k) { SafeDB.set('nexus_v17_key', k); SafeDB.set('nexus_v17_model', m); closeSettings(); addMsg(`BAĞLANTI GÜNCELLENDİ. MODEL: ${m}`, "system", "SECURITY"); }
        }

        // --- 5. ARAÇLAR (SES, RESİM, TEMİZLE, SESLİ KOMUT) ---
        function handleImg(e) {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader(); 
            r.onload = (x) => { imgB64 = x.target.result.split(',')[1]; addMsg("[GÖRSEL HAFIZAYA ŞİFRELENDİ] Komut bekleniyor.", "system", "MEMORY"); };
            r.readAsDataURL(f);
        }

        function toggleVoice() { 
            isVoice = !isVoice; document.getElementById('v-btn').innerText = isVoice ? "🔊 SES" : "🔇 SESSİZ"; 
            if(!isVoice && window.speechSynthesis) window.speechSynthesis.cancel(); 
        }
        
        function speak(t) { 
            if(!isVoice || !window.speechSynthesis) return; 
            const u = new SpeechSynthesisUtterance(t.replace(/[*#`_]/g,'')); 
            u.lang='tr-TR'; u.pitch=0.8; u.rate=1.1; window.speechSynthesis.speak(u); 
        }

        function clearMemory() {
            if(confirm("Tüm loglar silinecek. Onaylıyor musun?")) { SafeDB.del('nexus_v17_hist'); location.reload(); }
        }

        function startDict() {
            if ('webkitSpeechRecognition' in window) {
                const micBtn = document.getElementById('mic-btn'); 
                const recognition = new webkitSpeechRecognition(); 
                recognition.lang = "tr-TR"; 
                recognition.onstart = () => { micBtn.style.background = "#ff0055"; micBtn.style.color = "#fff"; iFld.placeholder = "Seni dinliyorum..."; };
                recognition.onresult = (e) => { iFld.value = e.results[0][0].transcript; micBtn.style.background = "#001122"; micBtn.style.color = "#00ffcc"; sendMessage(new Event('submit')); };
                recognition.onerror = () => { micBtn.style.background = "#001122"; micBtn.style.color = "#00ffcc"; iFld.placeholder = "> Komut girin_"; };
                recognition.start();
            } else { alert("Tarayıcınız mikrofonu desteklemiyor."); }
        }

        // --- 6. API İLETİŞİMİ VE GİZLİ KOMUTLAR ---
        async function sendMessage(e) {
            if(e) e.preventDefault();
            let k = SafeDB.get('nexus_v17_key');
            let m = SafeDB.get('nexus_v17_model') || 'gemini-1.5-flash';
            if(!k) { openSettings(); return; }

            const t = iFld.value.trim();
            if(!t && !imgB64) return;

            // BİLİŞİM HOCASI EASTER EGG KOMUTLARI
            if(t.toLowerCase() === "hocam_geldi()") {
                iFld.value = ''; 
                addMsg("⚠️ DİKKAT! SAYIN BİLİŞİM ÖĞRETMENİ TESPİT EDİLDİ! <br><br>> MİMARİ: Kusursuz Hata Ayıklama (V17)<br>> MOBİL UYUM: %100<br>> ARAYÜZ: Cyber-HUD<br><br><b>ÖNERİLEN PROJE NOTU: 100</b>", "bot", "NEXUS_AI");
                speak("Sayın Bilişim Öğretmeni tespit edildi. Proje kusursuz. Önerilen not yüz üzerinden yüz.");
                return;
            }
            if(t.toLowerCase() === "/clear") { clearMemory(); return; }

            let disp = t; if(imgB64) disp += "<br><i style='color:#fff'>(Görsel Eklendi)</i>";
            addMsg(disp, 'user', "GUEST_USER"); iFld.value = '';
            
            let p = []; if(t) p.push({text:t}); else p.push({text:"Veritabanındaki resmi analiz et."});
            if(imgB64) { p.push({inlineData:{mimeType:"image/jpeg", data:imgB64}}); imgB64 = null; }

            const tId = "typ-" + Date.now();
            addMsg("> AĞA BAĞLANILIYOR [████████░░]", "system", "NETWORK", false, tId);

            try {
                let validHistory = [];
                [...chatHist, { role: "user", parts: p }].forEach(msg => {
                    if (validHistory.length === 0 || validHistory[validHistory.length - 1].role !== msg.role) {
                        validHistory.push({ role: msg.role, parts: msg.parts });
                    } else { validHistory[validHistory.length - 1].parts.push(...msg.parts); }
                });

                const reqBody = { systemInstruction: { parts: [{ text: sysCtx }] }, contents: validHistory.slice(-10) };

                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${m}:generateContent?key=${k}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(reqBody)
                });

                if(!res.ok) {
                    let errStr = res.statusText;
                    try { const errJson = await res.json(); errStr = errJson.error.message; } catch(e) {}
                    throw new Error(errStr);
                }

                const data = await res.json();
                let botReply = data.candidates[0].content.parts[0].text;

                chatHist.push({ role: "user", parts: [{ text: t || "Görsel incelendi." }] });
                chatHist.push({ role: "model", parts: [{ text: botReply }] });
                SafeDB.set('nexus_v17_hist', JSON.stringify(chatHist));

                document.getElementById(tId).remove();
                addMsg(botReply, 'bot', "NEXUS_AI", true);
                speak(botReply);

            } catch(error) {
                console.error(error); document.getElementById(tId).remove();
                let fixA = "Google şifrenizi iptal etmiş olabilir. Lütfen ayarlardan yeni bir API şifresi girin.";
                addMsg(`[HATA MEYDANA GELDİ]: ${error.message}<br><br>> ÇÖZÜM: ${fixA}`, 'system', "ERROR_DAEMON", false, null, true);
            }
        }

        // --- 7. MESAJ EKLEME VE HACKER DAKTİLO (BUG FIXED) ---
        function addMsg(txt, type, hdr = "", isTyping = false, id = null, isError = false) {
            const w = document.createElement('div'); w.className = `msg-container ${type}`; if(id) w.id = id;
            if(hdr) { const h = document.createElement('div'); h.className='sender'; h.innerText = `[${hdr}] >`; w.appendChild(h); }
            
            const b = document.createElement('div'); 
            b.className = `bubble ${isError ? 'error-bubble' : ''}`;
            
            if(type === 'bot' && !isError) { 
                b.title = "Kopyalamak için tıkla"; 
                b.onclick = () => { navigator.clipboard.writeText(txt.replace(/<[^>]+>/g,'')); alert("Siber Metin Kopyalandı!"); }; 
            }

            let fTxt = txt.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\*(.*?)\*/g, '<i>$1</i>').replace(/```([\s\S]*?)```/gs, '<br><pre><code>$1</code></pre><br>').replace(/\n/g, '<br>');

            if(isTyping && type === 'bot') {
                w.appendChild(b); mDiv.appendChild(w);
                let i = 0; let isTag = false; let tBuf = "";
                
                let tm = setInterval(() => {
                    if(i < fTxt.length) {
                        let c = fTxt.charAt(i);
                        if(c === '<') isTag = true;
                        tBuf += c;
                        if(c === '>') isTag = false;
