<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS AI V9 - SİBER ASİSTAN</title>
    <style>
        /* --- MOBİL UYUMLU VE SADE SİBERPUNK TASARIM --- */
        body { 
            margin: 0; background-color: #050a0f; color: #00ffcc; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; height: -webkit-fill-available;
            overflow: hidden; 
        }
        
        #bg-canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; opacity: 0.4; }
        
        #chat-app { 
            width: 100%; max-width: 900px; height: 100%; 
            background: rgba(3, 7, 12, 0.9); 
            display: flex; flex-direction: column; overflow: hidden;
            position: relative;
        }

        /* Bilgisayarda kenarlıkları olsun */
        @media (min-width: 768px) {
            #chat-app { height: 95vh; border-radius: 12px; border: 1px solid #00ffcc; box-shadow: 0 0 30px rgba(0, 255, 204, 0.2); }
        }

        /* --- ÜST BÖLÜM (HEADER) --- */
        #header { 
            background: #000; border-bottom: 2px solid #00ffcc; padding: 15px; 
            display: flex; justify-content: space-between; align-items: center; z-index: 10;
        }
        
        .header-title { font-size: 1.4em; font-weight: 900; color: #00ffcc; letter-spacing: 1px; margin: 0;}
        .header-title span { color: #000; font-size: 0.5em; background: #00ffcc; padding: 3px 6px; margin-left: 5px; border-radius: 4px; vertical-align: middle;}
        
        /* Mobil uyumlu butonlar */
        .controls { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
        .controls button {
            background: rgba(0, 255, 204, 0.1); color: #00ffcc; border: 1px solid #00ffcc; 
            padding: 6px 10px; border-radius: 6px; cursor: pointer; 
            font-weight: bold; font-size: 0.85em; transition: 0.2s;
        }
        .controls button:active, .controls button:hover { background: #00ffcc; color: #000; }
        #btn-reset { color: #ff5555; border-color: #ff5555; background: rgba(255, 85, 85, 0.1); }
        #btn-reset:active, #btn-reset:hover { background: #ff5555; color: #fff; }

        /* --- SOHBET ALANI --- */
        #messages { 
            flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; 
            z-index: 10; scroll-behavior: smooth;
        }
        
        .msg-container { display: flex; width: 100%; flex-direction: column; }
        .msg-container.user { align-items: flex-end; }
        .msg-container.bot { align-items: flex-start; }
        .msg-container.system { align-items: center; }
        
        .msg { 
            max-width: 85%; padding: 12px 16px; border-radius: 12px; 
            line-height: 1.5; font-size: 1.05em; word-wrap: break-word; font-family: monospace;
        }
        
        .user .msg { background: rgba(0, 153, 102, 0.3); border: 1px solid #00ffcc; border-bottom-right-radius: 2px; color: #fff; }
        .bot .msg { background: rgba(0, 0, 0, 0.8); border: 1px solid #00aa66; border-bottom-left-radius: 2px; color: #00ffcc; }
        .system .msg { border: 1px dashed #ffaa00; color: #ffaa00; text-align: center; font-size: 0.9em; background: rgba(255, 170, 0, 0.1); border-radius: 5px; }
        
        /* Hata Mesajı */
        .error-msg { border-color: #ff3333 !important; color: #ff6666 !important; background: rgba(255, 0, 0, 0.1) !important; }

        /* --- ALT BÖLÜM (YAZI YAZMA ALANI) --- */
        #input-area { 
            padding: 15px; background: #000; border-top: 2px solid #00ffcc; 
            display: flex; align-items: center; gap: 8px; z-index: 10; 
        }
        
        .icon-btn { 
            background: #05101a; color: #00ffcc; border: 1px solid #00ffcc; 
            width: 45px; height: 45px; border-radius: 8px; display: flex; justify-content: center; align-items: center; 
            cursor: pointer; font-size: 1.2em; flex-shrink: 0;
        }
        
        input[type="text"] { 
            flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #00ffcc; 
            background: #020508; color: #fff; font-size: 1.1em; outline: none; 
            min-width: 0; /* Mobil taşmayı engeller */
        }
        input[type="text"]:focus { box-shadow: 0 0 10px rgba(0,255,204,0.3); }
        
        #send-btn { 
            background: #00ffcc; color: #000; border: none; padding: 0 20px; height: 45px; 
            border-radius: 8px; font-weight: 900; font-size: 1.1em; cursor: pointer; flex-shrink: 0;
        }

        /* --- ŞİFRE / GÜVENLİK MENÜSÜ --- */
        #settings-modal {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); z-index: 100; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #020508; padding: 25px; border: 2px solid #00ffcc; width: 85%; max-width: 400px; 
            text-align: center; border-radius: 12px; box-shadow: 0 0 30px rgba(0,255,204,0.3);
        }
        .modal-content input {
            width: 100%; padding: 12px; margin: 15px 0; border: 1px dashed #00ffcc; border-radius: 8px;
            background: #000; color: #00ffcc; outline: none; font-size: 1em; text-align: center; box-sizing: border-box;
        }
        .modal-content button { 
            background: #00ffcc; color: #000; border: none; padding: 12px; border-radius: 8px; 
            font-weight: bold; cursor: pointer; width: 100%; font-size: 1.1em; margin-bottom: 10px;
        }
        .modal-content button.cancel { background: transparent; color: #00ffcc; border: 1px solid #00ffcc; margin-bottom: 0;}

        /* Formatlamalar */
        pre { background: #000; padding: 10px; border-radius: 5px; border-left: 3px solid #00ffcc; overflow-x: auto; color: #00ffcc; font-size: 0.9em;}
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #00ffcc; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div id="chat-app">
        <!-- HEADER -->
        <div id="header">
            <h1 class="header-title">NEXUS <span>V9</span></h1>
            <div class="controls">
                <button onclick="openSettings()">⚙️ Şifre</button>
                <button id="voice-toggle" onclick="toggleVoice()">🔊 Ses</button>
                <button id="btn-reset" onclick="clearMemory()">🧹 Sıfırla</button>
            </div>
        </div>
        
        <!-- SOHBET EKRANI -->
        <div id="messages"></div>
        
        <!-- YAZI ALANI -->
        <div id="input-area">
            <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
            <button class="icon-btn" onclick="document.getElementById('file-input').click()">👁️</button>
            <button class="icon-btn" id="mic-btn" onclick="startDictation()">🎙️</button>
            
            <input type="text" id="userInput" placeholder="Komut girin..." autocomplete="off">
            <button id="send-btn" onclick="sendMessage()">İLET</button>
        </div>

        <!-- ŞİFRE EKRANI (MODAL) -->
        <div id="settings-modal">
            <div class="modal-content">
                <h3 style="color:#00ffcc; margin-top:0;">GİZLİ BAĞLANTI</h3>
                <p style="color:#aaa; font-size:0.9em;">API Anahtarınızı (AIzaSy...) buraya yapıştırın. Bu şifre telefonunuzda gizli kalacaktır.</p>
                <input type="password" id="api-key-input" placeholder="Şifrenizi buraya yapıştırın...">
                <button onclick="saveApiKey()">BAĞLAN</button>
                <button class="cancel" onclick="closeSettings()">İPTAL</button>
            </div>
        </div>
    </div>

    <script>
        // --- MATRIX ARKA PLAN ---
        const canvas = document.getElementById('bg-canvas'); const ctx = canvas.getContext('2d');
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();
        const letters = '01'; const fontSize = 14; let columns = canvas.width / fontSize;
        let drops = []; for(let x = 0; x < columns; x++) drops[x] = Math.random() * -100;
        
        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ffcc'; ctx.font = fontSize + 'px monospace';
            for(let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        // --- DEĞİŞKENLER VE SİSTEM ---
        const messagesDiv = document.getElementById('messages');
        const inputField = document.getElementById('userInput');
        let chatHistory = JSON.parse(localStorage.getItem('nexusHafiza_v9')) || [];
        let isVoiceEnabled = true; let selectedImageBase64 = null;

        const systemContext = `Sen Bilişim Teknolojileri projesi için geliştirilmiş 'NEXUS' adında zeki bir yapay zekasın. Kullanıcıya 'kanka' diyebilirsin. Bilişim hocasını etkilemek için teknolojik ve siber terimler kullanarak yardımcı ol.`;

        // --- BAŞLANGIÇ ---
        window.onload = () => {
            let key = localStorage.getItem('nexusApiKey');
            if(!key) setTimeout(() => openSettings(), 500);

            if (chatHistory.length === 0) {
                addMsg("Sistem çevrimiçi. Veritabanı bağlantısı kuruldu. Bilişim projesi sunumu için hazırım kanka.", "bot");
            } else {
                chatHistory.forEach(msg => { if(msg.parts[0].text) addMsg(msg.parts[0].text, msg.role === 'user' ? 'user' : 'bot'); });
            }
        };

        // --- GÜVENLİK AYARLARI ---
        function openSettings() { document.getElementById('settings-modal').style.display = 'flex'; document.getElementById('api-key-input').value = localStorage.getItem('nexusApiKey') || ""; }
        function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }
        function saveApiKey() {
            const key = document.getElementById('api-key-input').value.trim();
            if(key) { localStorage.setItem('nexusApiKey', key); closeSettings(); addMsg("API ŞİFRESİ CİHAZA KAYDEDİLDİ. BAĞLANTI HAZIR.", "system"); }
        }

        // --- GÖRSEL VE SES ---
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                selectedImageBase64 = e.target.result.split(',')[1]; 
                addMsg("[GÖRSEL EKLENDİ] Lütfen bana bu resimle ne yapmam gerektiğini yaz.", "system");
            };
            reader.readAsDataURL(file);
        }

        function toggleVoice() { isVoiceEnabled = !isVoiceEnabled; document.getElementById('voice-toggle').innerText = isVoiceEnabled ? "🔊 Ses: Açık" : "🔇 Ses: Kapalı"; if(!isVoiceEnabled) window.speechSynthesis.cancel(); }
        function speakText(text) {
            if (!isVoiceEnabled || !window.speechSynthesis) return;
            const utterance = new SpeechSynthesisUtterance(text.replace(/[*#`_]/g, '')); utterance.lang = 'tr-TR'; utterance.pitch = 0.8; window.speechSynthesis.speak(utterance);
        }

        function startDictation() {
            if (window.hasOwnProperty('webkitSpeechRecognition')) {
                const micBtn = document.getElementById('mic-btn'); const recognition = new webkitSpeechRecognition(); recognition.lang = "tr-TR"; 
                recognition.onstart = () => { micBtn.style.background = "#ff3333"; inputField.placeholder = "Seni dinliyorum..."; };
                recognition.onresult = (e) => { inputField.value = e.results[0][0].transcript; micBtn.style.background = "#05101a"; inputField.placeholder = "Komut girin..."; sendMessage(); };
                recognition.onerror = () => { micBtn.style.background = "#05101a"; inputField.placeholder = "Ses anlaşılamadı..."; };
                recognition.start();
            } else { alert("Ses özelliği desteklenmiyor."); }
        }

        // --- HAFIZA TEMİZLEME (BUG ENGELLEYİCİ) ---
        function sanitizeHistory(newMsgPart) {
            let validContents = []; let rawContents = [...chatHistory, { role: "user", parts: newMsgPart }];
            for(let msg of rawContents) {
                if (validContents.length === 0 || validContents[validContents.length - 1].role !== msg.role) {
                    validContents.push(JSON.parse(JSON.stringify(msg)));
                } else { validContents[validContents.length - 1].parts.push(...msg.parts); }
            }
            return validContents;
        }

        // --- API İLETİŞİMİ ---
        async function sendMessage() {
            let apiKey = localStorage.getItem('nexusApiKey');
            if(!apiKey) { openSettings(); return; }

            const text = inputField.value.trim();
            if(!text && !selectedImageBase64) return;

            // Hoca Geldi Komutu
            if(text.toLowerCase() === "hocam_geldi()") {
                inputField.value = '';
                addMsg("⚠️ SAYIN BİLİŞİM ÖĞRETMENİ TESPİT EDİLDİ! PROJE KUSURSUZ ÇALIŞIYOR. ÖNERİLEN NOT: 100", "bot");
                speakText("Sayın Bilişim Öğretmeni tespit edildi. Proje kusursuz çalışıyor. Önerilen not yüz.");
                return;
            }

            let userDisplay = text;
            if (selectedImageBase64) userDisplay += "<br><i>(Görsel yüklendi)</i>";
            addMsg(userDisplay, 'user');
            inputField.value = '';
            
            let userPart = [];
            if (text) userPart.push({ text: text }); else userPart.push({ text: "Bu resmi analiz et." });
            if (selectedImageBase64) { userPart.push({ inlineData: { mimeType: "image/jpeg", data: selectedImageBase64 } }); selectedImageBase64 = null; }

            const typingId = "typing-" + Date.now();
            addMsg("Sistem analiz ediyor...", 'system', typingId);

            try {
                const safeContents = sanitizeHistory(userPart);
                const requestBody = { systemInstruction: { parts: [{ text: systemContext }] }, contents: safeContents.slice(-10) };

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    let realError = ""; try { const errJson = await response.json(); realError = errJson.error.message; } catch(e) { realError = response.statusText; }
                    throw new Error(realError);
                }

                const data = await response.json();
                const botReply = data.candidates[0].content.parts[0].text;

                chatHistory.push({ role: "user", parts: [{ text: text || "Görsel incelendi." }] });
                chatHistory.push({ role: "model", parts: [{ text: botReply }] });
                localStorage.setItem('nexusHafiza_v9', JSON.stringify(chatHistory));

                document.getElementById(typingId).remove();
                addMsg(botReply, 'bot');
                speakText(botReply);

            } catch (error) {
                console.error(error);
                document.getElementById(typingId).remove();
                addMsg(`[AĞ HATASI]: ${error.message}<br>ÇÖZÜM: Şifreniz Google tarafından kilitlenmiş olabilir. Yeni bir şifre alıp Ayarlar menüsünden girmeyi deneyin.`, 'system', null, true);
            }
        }

        function clearMemory() {
            if(confirm("Tüm mesaj geçmişini silmek istediğine emin misin? (Hataları düzeltir)")) {
                localStorage.removeItem('nexusHafiza_v9'); chatHistory = []; messagesDiv.innerHTML = '';
                addMsg("Hafıza temizlendi. Sorunsuz başlangıç yapıldı.", "system");
            }
        }

        function addMsg(text, type, id = null, isError = false) {
            const wrapper = document.createElement('div'); wrapper.className = `msg-container ${type}`; if(id) wrapper.id = id;
            const div = document.createElement('div'); div.className = `msg ${isError ? 'error-msg' : ''}`;
            
            div.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\*(.*?)\*/g, '<i>$1</i>').replace(/```(.*?)```/gs, '<pre><code>$1</code></pre>').replace(/\n/g, '<br>'); 
            
            wrapper.appendChild(div); messagesDiv.appendChild(wrapper);
            setTimeout(() => { messagesDiv.scrollTop = messagesDiv.scrollHeight; }, 50);
        }
        
        inputField.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
