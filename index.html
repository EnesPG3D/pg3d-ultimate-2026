<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Özel Oyun Öğeleri Veritabanı ve Bilgi Platformu">
    <title>Sistem Veritabanı | Kurumsal Wiki</title>
    <style>
        /* --- TEMEL DEĞİŞKENLER (TEMA SİSTEMİ) --- */
        :root[data-theme="dark"] {
            --bg-color: #0b0c10;
            --surface-color: rgba(31, 40, 51, 0.85);
            --surface-border: #45a29e;
            --text-primary: #c5c6c7;
            --text-accent: #66fcf1;
            --hover-bg: rgba(102, 252, 241, 0.15);
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            --modal-bg: rgba(11, 12, 16, 0.98);
            --star-color: #ffffff;
        }

        :root[data-theme="light"] {
            --bg-color: #f4f4f9;
            --surface-color: rgba(255, 255, 255, 0.9);
            --surface-border: #cccccc;
            --text-primary: #333333;
            --text-accent: #005b96;
            --hover-bg: rgba(0, 91, 150, 0.1);
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            --modal-bg: rgba(255, 255, 255, 0.98);
            --star-color: #444444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden;
        }

        /* --- SCROLL PROGRESS & CANVAS --- */
        #scroll-progress {
            position: fixed; top: 0; left: 0; height: 3px; background: var(--text-accent);
            width: 0%; z-index: 1000; transition: width 0.1s;
        }

        #star-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
        }

        /* --- SABİT ÜST MENÜ --- */
        .navbar {
            position: sticky; top: 0; display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px; background: var(--surface-color); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--surface-border); z-index: 100;
        }

        .logo { font-size: 1.5rem; font-weight: bold; letter-spacing: 1px; color: var(--text-primary); }
        .logo span { color: var(--text-accent); }

        .nav-controls { display: flex; gap: 15px; align-items: center; }

        #live-search {
            padding: 8px 15px; border-radius: 20px; border: 1px solid var(--surface-border);
            background: transparent; color: var(--text-primary); outline: none; transition: 0.3s;
        }
        #live-search:focus { box-shadow: 0 0 10px var(--hover-bg); border-color: var(--text-accent); }

        .action-btn {
            background: transparent; border: 1px solid var(--surface-border); color: var(--text-primary);
            padding: 8px 15px; border-radius: 5px; cursor: pointer; transition: 0.3s;
        }
        .action-btn:hover { background: var(--hover-bg); border-color: var(--text-accent); }

        .mobile-only { display: none; }

        /* --- ANA YAPI (GRID VE SIDEBAR) --- */
        .container { display: flex; min-height: calc(100vh - 70px); }

        .sidebar {
            width: 280px; padding: 25px; background: var(--surface-color);
            border-right: 1px solid var(--surface-border); transition: transform 0.3s ease;
        }

        .filter-group { margin-bottom: 25px; }
        .filter-group h3 { font-size: 1rem; margin-bottom: 10px; color: var(--text-accent); text-transform: uppercase; letter-spacing: 1px; }
        .filter-group select {
            width: 100%; padding: 10px; background: var(--bg-color); color: var(--text-primary);
            border: 1px solid var(--surface-border); border-radius: 5px; outline: none; cursor: pointer;
        }

        .full-btn {
            width: 100%; padding: 12px; margin-bottom: 10px; border: none; border-radius: 5px;
            background: var(--text-accent); color: var(--bg-color); font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .full-btn:hover { opacity: 0.8; transform: translateY(-2px); }
        .full-btn.outline { background: transparent; border: 1px solid var(--text-accent); color: var(--text-accent); }

        .content { flex-grow: 1; padding: 30px; overflow-y: auto; }

        /* --- KART TASARIMI --- */
        .grid-layout {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px;
        }

        .item-card {
            background: var(--surface-color); border: 1px solid var(--surface-border);
            border-radius: 12px; padding: 20px; text-align: center; position: relative;
            cursor: pointer; transition: transform 0.3s, box-shadow 0.3s, opacity 0.5s;
            box-shadow: var(--shadow); opacity: 0; transform: translateY(20px);
        }
        .item-card.visible { opacity: 1; transform: translateY(0); }
        .item-card:hover { transform: translateY(-8px); border-color: var(--text-accent); box-shadow: 0 8px 25px var(--hover-bg); }

        .fav-btn {
            position: absolute; top: 15px; right: 15px; background: none; border: none;
            font-size: 1.5rem; cursor: pointer; color: #555; transition: 0.3s; z-index: 2;
        }
        .fav-btn.active { color: #ffd700; text-shadow: 0 0 10px #ffd700; }

        .item-cat { font-size: 0.8rem; color: var(--text-accent); text-transform: uppercase; margin-bottom: 10px; display: block; }
        .item-name { font-size: 1.3rem; margin-bottom: 15px; font-weight: bold; }
        .item-stats { display: flex; justify-content: space-around; font-size: 0.9rem; color: #888; border-top: 1px solid var(--surface-border); padding-top: 15px; }
        .stat-val { font-weight: bold; color: var(--text-primary); }

        /* --- MODAL (DETAY VE KARŞILAŞTIRMA PENCERELERİ) --- */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8);
            display: none; justify-content: center; align-items: center; z-index: 1000;
            backdrop-filter: blur(5px); opacity: 0; transition: opacity 0.3s;
        }
        .modal.show { display: flex; opacity: 1; }

        .modal-content {
            background: var(--modal-bg); border: 1px solid var(--text-accent); border-radius: 15px;
            width: 90%; max-width: 900px; max-height: 90vh; overflow-y: auto; padding: 40px; position: relative;
            box-shadow: 0 0 30px var(--hover-bg);
        }

        .close-btn { position: absolute; top: 20px; right: 30px; font-size: 2.5rem; color: var(--text-accent); cursor: pointer; line-height: 1; }

        .modal-body { display: flex; gap: 40px; flex-wrap: wrap; }
        .modal-image-area { flex: 1; min-width: 300px; display: flex; flex-direction: column; align-items: center; }
        .image-placeholder { width: 100%; height: 300px; background: rgba(255,255,255,0.05); border: 2px dashed var(--surface-border); border-radius: 10px; display: flex; justify-content: center; align-items: center; color: #666; font-size: 1.2rem; letter-spacing: 2px; }
        .modal-info { flex: 2; min-width: 300px; }

        .badge-row { margin: 15px 0; display: flex; gap: 10px; }
        .badge { background: var(--hover-bg); padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; border: 1px solid var(--text-accent); }
        .desc { margin-bottom: 25px; line-height: 1.6; color: #aaa; font-style: italic; }

        .stat-bar-container { margin-bottom: 15px; }
        .stat-bar-container label { display: block; margin-bottom: 5px; font-size: 0.9rem; }
        .stat-bg { width: 100%; height: 12px; background: rgba(255,255,255,0.1); border-radius: 6px; overflow: hidden; }
        .stat-fill { height: 100%; border-radius: 6px; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }

        .tech-specs { margin-top: 30px; padding-top: 20px; border-top: 1px dashed var(--surface-border); font-size: 0.9rem; line-height: 1.8; }
        .m-top { margin-top: 20px; width: 100%; }

        .compare-layout { max-width: 1200px; }
        .compare-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }

        /* --- RESPONSIVE TASARIM --- */
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -100%; height: 100%; z-index: 90; }
            .sidebar.open { left: 0; box-shadow: 5px 0 20px rgba(0,0,0,0.5); }
            .mobile-only { display: block; }
        }
    </style>
</head>

            </div>

            <div class="filter-group">

                <select id="sort-items">
                    <option value="default">Varsayılan</option>
                    <option value="name-asc">İsim (A-Z)</option>

                    <option value="power-desc">Güç (En Yüksek)</option>
                    <option value="date-desc">En Yeni Eklenenler</option>

            <div class="filter-group">

                <button id="btn-favorites" class="full-btn outline">⭐ Favorilerimi Göster</button>
            </div>
        </aside>

        <!-- Sağ Dinamik Kart Izgarası -->
        <section class="content">
            <div id="item-grid" class="grid-layout">
                <!-- JavaScript verileri buraya basacak -->
            </div>
        </section>
    </main>

            <div class="modal-body">

                    <button id="btn-add-compare" class="action-btn m-top">⚖️ Karşılaştırmaya Ekle</button>
                </div>
                <div class="modal-info">
                    <h2 id="modal-name">Öğe Adı</h2>

                    <h3>İstatistik Grafiği</h3>

                    </div>
                    <div class="stat-bar-container">
                        <label>Savunma (<span id="val-defense">0</span>)</label>
                        <div class="stat-bg"><div class="stat-fill" id="bar-defense" style="width: 0%; background: #1e90ff;"></div></div>
                    </div>

                    <div class="tech-specs">
                        <p><strong>Özel Nitelik:</strong> <span id="modal-special">Yok</span></p>
                        <p><strong>Seviye Gereksinimi:</strong> <span id="modal-level">1</span></p>
                        <p><strong>Sürüm / Tarih:</strong> <span id="modal-version">v1.0</span> | <span id="modal-date">00-00-0000</span></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Karşılaştırma Modal -->

                <!-- JS ile doldurulacak -->
            </div>
            <button id="btn-clear-compare" class="full-btn outline m-top">Listeyi Temizle</button>
        </div>
    </div>
