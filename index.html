<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS AI - V12 AEGIS</title>
    <style>
        /* --- PREMIUM YENİ NESİL TASARIM (DARK SİBERPUNK) --- */
        * { box-sizing: border-box; }
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #0a192f; color: #ccd6f6; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            overflow: hidden; 
        }
        
        /* Şık Hareketli Arka Plan */
        .space-bg {
            position: absolute; top: 0; left: 0; width: 200%; height: 200%; z-index: 0;
            background: radial-gradient(circle at 50% 50%, rgba(100, 255, 218, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 100% 0%, rgba(100, 255, 218, 0.08) 0%, transparent 40%);
            animation: drift 20s linear infinite alternate; pointer-events: none;
        }
        @keyframes drift { 0% { transform: translate(0, 0); } 100% { transform: translate(-10%, -10%); } }

        /* Arka Plan Izgarası */
        .grid-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none;
            background-image: linear-gradient(rgba(100, 255, 218, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(100, 255, 218, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        #app-container { 
            position: relative; z-index: 10; width: 100%; max-width: 900px; height: 100dvh; margin: 0 auto; 
            display: flex; flex-direction: column; background: rgba(11, 25, 44, 0.85);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            border-left: 1px solid rgba(100, 255, 218, 0.1); border-right: 1px solid rgba(100, 255, 218, 0.1);
        }

        /* --- ÜST KISIM (HEADER) --- */
        #header { 
            background: rgba(2, 12, 27, 0.9); padding: 15px 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid rgba(100, 255, 218, 0.3);
        }
        .logo { font-size: 1.5em; font-weight: 800; color: #64ffda; letter-spacing: 1px; margin: 0; display: flex; align-items: center; gap: 10px;}
        .logo span { font-size: 0.45em; background: #64ffda; color: #0a192f; padding: 4px 8px; border-radius: 20px; font-weight: bold; letter-spacing: 0;}

        .top-btn { 
            background: transparent; color: #64ffda; border: 1px solid rgba(100,255,218,0.5); 
            padding: 8px 12px; border-radius: 8px; font-size: 0.85em; font-weight: 600; 
            cursor: pointer; transition: all 0.3s ease; margin-left: 8px;
        }
        .top-btn:active, .top-btn:hover { background: rgba(100, 255, 218, 0.15); border-color: #64ffda; }
        .btn-danger { color: #ff6b6b !important; border-color: rgba(255,107,107,0.5) !important; }
        .btn-danger:active, .btn-danger:hover { background: rgba(255,107,107,0.15) !important; border-color: #ff6b6b !important; }

        /* --- SOHBET EKRANI --- */
        #messages { 
            flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 18px; scroll-behavior: smooth;
        }
        
        .bubble-wrapper { display: flex; flex-direction: column; width: 100%; animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .bubble-wrapper.user { align-items: flex-end; }
        .bubble-wrapper.bot { align-items: flex-start; }
        .bubble-wrapper.system { align-items: center; }

        .sender-name { font-size: 0.75em; color: #8892b0; margin-bottom: 5px; font-weight: 600; letter-spacing: 0.5px; }

        .bubble { 
            max-width: 85%; padding: 14px 18px; border-radius: 14px; 
            font-size: 1.05em; line-height: 1.5; word-wrap: break-word; position: relative;
        }
        
        .user .bubble { background: rgba(100, 255, 218, 0.1); border: 1px solid rgba(100, 255, 218, 0.3); color: #e6f1ff; border-bottom-right-radius: 4px; }
        .bot .bubble { background: rgba(17, 34, 64, 0.9); border: 1px solid rgba(136, 146, 176, 0.2); color: #64ffda; border-bottom-left-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); cursor: pointer;}
        .bot .bubble:active { opacity: 0.8; } /* Kopyalama hissi */
        .system .bubble { background: rgba(255, 170, 0, 0.1); color: #ffb84d; border: 1px dashed rgba(255, 170, 0, 0.4); text-align: center; font-size: 0.9em; }
        
        .typing-indicator { font-style: italic; color: #8892b0; display: flex; gap: 5px; align-items: center;}
        .dot { width: 6px; height: 6px; background: #64ffda; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; } .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        /* --- ALT YAZI ALANI --- */
        #input-form { 
            background: #020c1b; padding: 15px; display: flex; align-items: center; gap: 10px; 
            border-top: 1px solid rgba(100, 255, 218, 0.2); margin: 0;
        }
        
        .action-btn { 
            background: #112240; color: #64ffda; border: 1px solid rgba(100,255,218,0.3); 
            width: 48px; height: 48px; border-radius: 10px; font-size: 1.3em; 
            display: flex; justify-content: center; align-items: center; cursor: pointer; flex-shrink: 0; transition: 0.2s;
        }
        .action-btn:active { transform: scale(0.9); background: rgba(100, 255, 218, 0.2); }
        .mic-active { background: #ff6b6b !important; color: #fff !important; border-color: #ff6b6b !important; animation: pulseRed 1.5s infinite; }
        @keyframes pulseRed { 0% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(255, 107, 107, 0); } }
        
        /* Font-size 16px zorunlu! Yoksa iPhone otomatik zoom yapar ekranı bozar */
        input[type="text"] { 
            flex: 1; padding: 14px; background: #0a192f; border: 1px solid rgba(100, 255, 218, 0.3); 
            color: #e6f1ff; font-size: 16px; border-radius: 10px; outline: none; min-width: 0; font-family: inherit;
        }
        input[type="text"]:focus { border-color: #64ffda; box-shadow: inset 0 0 10px rgba(100,255,218,0.1); }
        
        .send-btn { 
            background: #64ffda; color: #0a192f; border: none; font-weight: 800; font-family: inherit; 
            font-size: 16px; height: 48px; padding: 0 22px; border-radius: 10px; cursor: pointer; flex-shrink: 0; transition: 0.2s;
        }
        .send-btn:active { transform: scale(0.95); background: #52e0c4; }

        /* --- AYARLAR MODALI --- */
        #settings-modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(2, 12, 27, 0.85); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(8px); 
        }
        .modal-box { 
            background: #112240; padding: 30px; border: 1px solid rgba(100, 255, 218, 0.4); 
            width: 90%; max-width: 400px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .modal-box h3 { color: #e6f1ff; margin-top: 0; text-align: center; font-size: 1.4em;}
        .modal-box p { color: #8892b0; font-size: 0.9em; text-align: center; margin-bottom: 20px;}
        .modal-box input, .modal-box select { 
            width: 100%; padding: 14px; margin-bottom: 15px; background: #0a192f; 
            border: 1px solid rgba(100, 255, 218, 0.3); color: #64ffda; outline: none; border-radius: 8px; font-size: 16px;
        }
        .modal-btn { 
            width: 100%; padding: 14px; background: #64ffda; border: none; color: #0a192f; 
            font-weight: 800; font-size: 16px; border-radius: 8px; cursor: pointer; margin-bottom: 10px;
        }
        .modal-btn.cancel { background: transparent; color: #8892b0; border: 1px solid #8892b0; margin-bottom: 0;}

        /* Formatlamalar */
        pre { background: #020c1b; padding: 12px; border-radius: 8px; overflow-x: auto; color: #e6f1ff; font-size: 0.9em; border: 1px solid rgba(136, 146, 176, 0.2); }
        code { font-family: 'Courier New', Courier, monospace; color: #64ffda; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #0a192f; }
        ::-webkit-scrollbar-thumb { background: rgba(100, 255, 218, 0.5); border-radius: 5px; }
    </style>
</head>
<body>

    <div class="space-bg"></div>
    <div class="grid-overlay"></div>

    <div id="app-container">
        
        <!-- ÜST MENÜ -->
        <div id="header">
            <h1 class="logo">AEGIS <span>V12</span></h1>
            <div>
                <button class="top-btn" onclick="openSettings()" type="button">⚙️ Şifre</button>
                <button class="top-btn" onclick="toggleVoice()" id="voice-btn" type="button">🔊 Ses</button>
                <button class="top-btn btn-danger" onclick="clearMemory()" type="button">🧹 Temizle</button>
            </div>
        </div>
        
        <!-- SOHBET EKRANI -->
        <div id="messages"></div>
        
        <!-- GİRİŞ FORMU -->
        <form id="input-form">
            <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
            <button type="button" class="action-btn" onclick="document.getElementById('file-input').click()">📎</button>
            <button type="button" class="action-btn" id="mic-btn" onclick="startDictation()">🎙️</button>
            <input type="text" id="userInput" placeholder="Yapay zekaya yazın..." autocomplete="off">
            <button type="submit" class="send-btn">GÖNDER</button>
        </form>
    </div>

    <!-- AYARLAR MODALI -->
    <div id="settings-modal">
        <div class="modal-box">
            <h3>Güvenlik Ağı</h3>
            <p>Sisteme bağlanmak için şifrenizi girin.</p>
            <input type="password" id="api-key-input" placeholder="AIzaSy...">
            <select id="model-select">
                <option value="gemini-1.5-flash-latest">AEGIS HIZLI (Flash) - Önerilen</option>
                <option value="gemini-1.5-pro-latest">AEGIS DERİN (Pro)</option>
            </select>
            <button class="modal-btn" onclick="saveSettings()" type="button">BAĞLANTI KUR</button>
            <button class="modal-btn cancel" onclick="closeSettings()" type="button">KAPAT</button>
        </div>
    </div>

    <script>
        // --- 1. ÇÖKME ÖNLEYİCİ GÜVENLİ HAFIZA (SAFE STORAGE) ---
        // Telefon hafızaya erişimi reddetse bile sistem hata verip çökmez, çalışmaya devam eder!
        const SafeStorage = {
            memory: {},
            get: function(key) { 
                try { return localStorage.getItem(key); } 
                catch(e) { return this.memory[key] || null; } 
            },
            set: function(key, value) { 
                try { localStorage.setItem(key, value); } 
                catch(e) { this.memory[key] = value; } 
            },
            remove: function(key) { 
                try { localStorage.removeItem(key); } 
                catch(e) { delete this.memory[key]; } 
            }
        };

        // --- DEĞİŞKENLER VE SİSTEM ---
        const messagesDiv = document.getElementById('messages');
        const inputField = document.getElementById('userInput');
        const inputForm = document.getElementById('input-form');
        
        let chatHistory = [];
        let isVoiceEnabled = true; 
        let selectedImageBase64 = null;
        
        const systemContext = `Sen Bilişim Teknolojileri projesi için 'AEGIS' kod adıyla geliştirilmiş, lüks, asil ve son derece yetenekli bir yapay zekasın. Kullanıcıya saygılı ama samimi ('kanka' vb.) hitap edebilirsin. Bilişim hocasını etkileyecek derinlikte ve profesyonellikte cevaplar ver.`;

        // --- 2. UYGULAMA BAŞLATICI ---
        document.addEventListener("DOMContentLoaded", () => {
            try {
                // Hafızayı Güvenli Çekme
                const savedData = SafeStorage.get('aegisHafiza_v12');
                if(savedData) chatHistory = JSON.parse(savedData);

                // Ayarları Çekme
                let key = SafeStorage.get('aegisApiKey');
                let model = SafeStorage.get('aegisModel');
                if(model) document.getElementById('model-select').value = model;
                
                // Şifre yoksa hemen ekranı aç
                if(!key) setTimeout(() => openSettings(), 600);

                // İlk Karşılama
                if (chatHistory.length === 0) {
                    addMsg("SİSTEM ÇEVRİMİÇİ. Bilişim projesi modülleri yüklendi. Komut bekliyorum...", "bot", "AEGIS_CORE");
                } else {
                    chatHistory.forEach(msg => { 
                        if(msg.parts && msg.parts[0] && msg.parts[0].text) {
                            addMsg(msg.parts[0].text, msg.role === 'user' ? 'user' : 'bot', msg.role === 'user' ? 'MİSAFİR' : 'AEGIS'); 
                        }
                    });
                }
            } catch (error) {
                console.error("Başlatma hatası:", error);
                addMsg("Sistem başlatılırken bir hata oluştu ama düzeltildi. Lütfen şifrenizi girin.", "system", "SYSTEM");
            }
        });

        // --- GÜVENLİK AYARLARI ---
        function openSettings() { 
            document.getElementById('settings-modal').style.display = 'flex'; 
            document.getElementById('api-key-input').value = SafeStorage.get('aegisApiKey') || ""; 
        }
        function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }
        
        function saveSettings() {
            const key = document.getElementById('api-key-input').value.trim();
            const model = document.getElementById('model-select').value;
            if(key) { 
                SafeStorage.set('aegisApiKey', key); 
                SafeStorage.set('aegisModel', model); 
                closeSettings(); 
                addMsg(`Sistem güncellendi. Model: ${model === 'gemini-1.5-flash-latest' ? 'AEGIS HIZLI' : 'AEGIS DERİN'}`, "system", "SİSTEM"); 
            }
        }

        // --- GÖRSEL VE SES ---
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                selectedImageBase64 = e.target.result.split(',')[1]; 
                addMsg("[GÖRSEL EKLENDİ] Lütfen bana bu resimle ne yapmam gerektiğini yazın.", "system", "BELLEK");
            };
            reader.readAsDataURL(file);
        }

        function toggleVoice() { 
            isVoiceEnabled = !isVoiceEnabled; 
            document.getElementById('voice-btn').innerText = isVoiceEnabled ? "🔊 Ses" : "🔇 Sessiz"; 
            if(!isVoiceEnabled) window.speechSynthesis.cancel(); 
        }
        
        function speakText(text) {
            if (!isVoiceEnabled || !window.speechSynthesis) return;
            const utterance = new SpeechSynthesisUtterance(text.replace(/[*#`_]/g, '')); 
            utterance.lang = 'tr-TR'; utterance.pitch = 0.9; utterance.rate = 1.05; 
            window.speechSynthesis.speak(utterance);
        }

        function startDictation() {
            if ('webkitSpeechRecognition' in window) {
                const micBtn = document.getElementById('mic-btn'); 
                const recognition = new webkitSpeechRecognition(); 
                recognition.lang = "tr-TR"; 
                recognition.onstart = () => { micBtn.classList.add('mic-active'); inputField.placeholder = "Dinleniyor..."; };
                recognition.onresult = (e) => { 
                    inputField.value = e.results[0][0].transcript; 
                    micBtn.classList.remove('mic-active'); 
                    inputField.placeholder = "Yapay zekaya yazın..."; 
                    handleFormSubmit(); // Sesi alınca otomatik gönder
                };
                recognition.onerror = () => { micBtn.classList.remove('mic-active'); inputField.placeholder = "Anlaşılamadı..."; };
                recognition.start();
            } else { alert("Tarayıcınız ses sistemini desteklemiyor."); }
        }

        // --- 3. KOPYALAMA ÖZELLİĞİ EKLENDİ ---
        function copyToClipboard(text) {
            // Sadece HTML taglerini temizleyip düz metni alır
            const cleanText = text.replace(/<br>/g, '\n').replace(/<[^>]+>/g, '');
            navigator.clipboard.writeText(cleanText).then(() => {
                alert("Mesaj kopyalandı!");
            }).catch(err => console.log('Kopyalama hatası:', err));
        }

        function sanitizeHistory(newMsgPart) {
            let validContents = []; let rawContents = [...chatHistory, { role: "user", parts: newMsgPart }];
            for(let msg of rawContents) {
                let cleanMsg = { role: msg.role, parts: msg.parts };
                if (validContents.length === 0 || validContents[validContents.length - 1].role !== cleanMsg.role) {
                    validContents.push(cleanMsg);
                } else { validContents[validContents.length - 1].parts.push(...cleanMsg.parts); }
            }
            return validContents;
        }

        // --- API İLETİŞİMİ ---
        async function handleFormSubmit(event) {
            if(event) event.preventDefault(); // Sayfa yenilenmesini bloklar

            let apiKey = SafeStorage.get('aegisApiKey');
            let selectedModel = SafeStorage.get('aegisModel') || 'gemini-1.5-flash-latest';
            if(!apiKey) { openSettings(); return; }

            const text = inputField.value.trim();
            if(!text && !selectedImageBase64) return;

            // Puan Kapan Easter Egg
            if(text.toLowerCase() === "hocam_geldi()") {
                inputField.value = '';
                addMsg("⚠️ SAYIN BİLİŞİM ÖĞRETMENİ TESPİT EDİLDİ! <br><br>Sistem Analizi: Proje mimarisi profesyonel düzeyde, çökme önleyici zırh aktif. Mobil uyumluluk %100.<br>ÖNERİLEN NOT: 100", "bot", "AEGIS");
                speakText("Sayın Bilişim Öğretmeni tespit edildi. Proje kusursuz. Önerilen not yüz.");
                return;
            }

            let userDisplay = text;
            if (selectedImageBase64) userDisplay += "<br><i style='color:#64ffda;'>(Görsel Eklendi)</i>";
            
            addMsg(userDisplay, 'user', "SEN");
            inputField.value = '';
            
            let userPart = [];
            if (text) userPart.push({ text: text }); else userPart.push({ text: "Bu resmi incele." });
            if (selectedImageBase64) { userPart.push({ inlineData: { mimeType: "image/jpeg", data: selectedImageBase64 } }); selectedImageBase64 = null; }

            const typingId = "typing-" + Date.now();
            addMsg("<div class='typing-indicator'>AEGIS düşünüyor <div class='dot'></div><div class='dot'></div><div class='dot'></div></div>", 'bot', 'AEGIS', false, typingId);

            try {
                const safeContents = sanitizeHistory(userPart);
                const requestBody = { systemInstruction: { parts: [{ text: systemContext }] }, contents: safeContents.slice(-10) };

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
