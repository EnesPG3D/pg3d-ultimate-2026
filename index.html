<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS AI V10 - SİBER AĞ</title>
    <style>
        /* --- SİBERPUNK V10 TASARIM --- */
        body { 
            margin: 0; background-color: #03060a; color: #00e5ff; 
            font-family: 'Consolas', 'Courier New', monospace; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; height: -webkit-fill-available; overflow: hidden; 
        }
        
        #bg-canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; opacity: 0.3; }
        
        #chat-app { 
            width: 100%; max-width: 950px; height: 100%; 
            background: rgba(2, 5, 8, 0.95); display: flex; flex-direction: column; overflow: hidden;
        }

        @media (min-width: 768px) {
            #chat-app { height: 96vh; border-radius: 12px; border: 1px solid #00e5ff; box-shadow: 0 0 40px rgba(0, 229, 255, 0.15); }
        }

        /* --- ÜST BÖLÜM (HEADER) --- */
        #header { 
            background: #000; border-bottom: 2px dashed #00e5ff; padding: 12px 15px; 
            display: flex; justify-content: space-between; align-items: center; z-index: 10;
            flex-wrap: wrap; gap: 10px;
        }
        
        .header-title { font-size: 1.3em; font-weight: 900; color: #00e5ff; letter-spacing: 2px; margin: 0; text-shadow: 0 0 10px rgba(0,229,255,0.5);}
        .header-title span { color: #000; font-size: 0.6em; background: #00e5ff; padding: 3px 6px; margin-left: 5px; border-radius: 3px; vertical-align: middle;}
        
        .controls { display: flex; gap: 5px; flex-wrap: wrap; }
        .controls button {
            background: rgba(0, 229, 255, 0.1); color: #00e5ff; border: 1px solid #00e5ff; 
            padding: 6px 12px; border-radius: 4px; cursor: pointer; font-family: inherit;
            font-weight: bold; font-size: 0.85em; transition: 0.2s;
        }
        .controls button:active, .controls button:hover { background: #00e5ff; color: #000; }
        #btn-reset { color: #ff3366; border-color: #ff3366; background: rgba(255, 51, 102, 0.1); }
        #btn-reset:active, #btn-reset:hover { background: #ff3366; color: #fff; }

        /* --- SOHBET ALANI --- */
        #messages { 
            flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; 
            z-index: 10; scroll-behavior: smooth;
        }
        
        .msg-container { display: flex; width: 100%; flex-direction: column; }
        .msg-container.user { align-items: flex-end; }
        .msg-container.bot { align-items: flex-start; }
        .msg-container.system { align-items: center; }
        
        .msg-header { font-size: 0.75em; color: #666; margin-bottom: 3px; font-weight: bold; }
        .user .msg-header { color: #00e5ff; }
        .bot .msg-header { color: #ff0055; }
        
        .msg { 
            max-width: 90%; padding: 12px 16px; border-radius: 8px; 
            line-height: 1.5; font-size: 1.05em; word-wrap: break-word; font-family: inherit;
        }
        
        .user .msg { background: rgba(0, 229, 255, 0.15); border: 1px solid #00e5ff; border-bottom-right-radius: 0; color: #fff; box-shadow: 0 0 10px rgba(0,229,255,0.1); }
        .bot .msg { background: rgba(0, 0, 0, 0.8); border: 1px solid #ff0055; border-bottom-left-radius: 0; color: #00e5ff; box-shadow: 0 0 10px rgba(255,0,85,0.1);}
        .system .msg { border: 1px dashed #ffaa00; color: #ffaa00; text-align: center; font-size: 0.9em; background: rgba(255, 170, 0, 0.1); }
        .error-msg { border-color: #ff3333 !important; color: #ff6666 !important; background: rgba(255, 0, 0, 0.1) !important; text-align: left !important;}

        /* --- YAZI BÖLÜMÜ --- */
        #input-area { 
            padding: 15px; background: #000; border-top: 2px dashed #00e5ff; 
            display: flex; align-items: center; gap: 8px; z-index: 10; 
        }
        
        .icon-btn { 
            background: #020508; color: #00e5ff; border: 1px solid #00e5ff; 
            width: 45px; height: 45px; border-radius: 6px; display: flex; justify-content: center; align-items: center; 
            cursor: pointer; font-size: 1.2em; flex-shrink: 0; transition: 0.2s;
        }
        .icon-btn:hover { background: #00e5ff; color: #000;}
        
        input[type="text"] { 
            flex: 1; padding: 12px; border-radius: 6px; border: 1px solid #00e5ff; 
            background: #010305; color: #fff; font-size: 1.1em; outline: none; 
            min-width: 0; font-family: inherit;
        }
        input[type="text"]:focus { box-shadow: inset 0 0 10px rgba(0,229,255,0.2); }
        
        #send-btn { 
            background: #00e5ff; color: #000; border: none; padding: 0 20px; height: 45px; 
            border-radius: 6px; font-weight: 900; font-size: 1.1em; cursor: pointer; flex-shrink: 0; font-family: inherit; transition: 0.2s;
        }
        #send-btn:hover { background: #fff; }

        /* --- GÜVENLİK VE MODEL AYARLARI --- */
        #settings-modal {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); z-index: 100; justify-content: center; align-items: center; backdrop-filter: blur(5px);
        }
        .modal-content {
            background: #010305; padding: 25px; border: 2px solid #00e5ff; width: 85%; max-width: 420px; 
            text-align: center; border-radius: 8px; box-shadow: 0 0 30px rgba(0,229,255,0.3);
        }
        .modal-content input, .modal-content select {
            width: 100%; padding: 12px; margin: 10px 0; border: 1px dashed #00e5ff; border-radius: 5px;
            background: #000; color: #00e5ff; outline: none; font-size: 1em; text-align: center; box-sizing: border-box; font-family: inherit;
        }
        .modal-content label { color: #aaa; font-size: 0.85em; text-align: left; display: block; margin-top: 10px; }
        
        .modal-content button { 
            background: #00e5ff; color: #000; border: none; padding: 12px; border-radius: 5px; 
            font-weight: bold; cursor: pointer; width: 100%; font-size: 1.1em; margin-top: 15px; font-family: inherit;
        }
        .modal-content button.cancel { background: transparent; color: #00e5ff; border: 1px solid #00e5ff; margin-top: 8px;}

        pre { background: #000; padding: 10px; border-radius: 5px; border-left: 3px solid #00e5ff; overflow-x: auto; color: #00e5ff; font-size: 0.9em;}
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #00e5ff; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div id="chat-app">
        <!-- HEADER -->
        <div id="header">
            <h1 class="header-title">NEXUS_OS <span>V10 X-TREME</span></h1>
            <div class="controls">
                <button onclick="openSettings()">⚙️ AYARLAR</button>
                <button onclick="downloadChat()">📥 İNDİR (LOG)</button>
                <button id="voice-toggle" onclick="toggleVoice()">🔊 SES</button>
                <button id="btn-reset" onclick="clearMemory()">🧹 SIFIRLA</button>
            </div>
        </div>
        
        <!-- SOHBET EKRANI -->
        <div id="messages"></div>
        
        <!-- YAZI ALANI -->
        <div id="input-area">
            <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
            <button class="icon-btn" onclick="document.getElementById('file-input').click()">👁️</button>
            <button class="icon-btn" id="mic-btn" onclick="startDictation()">🎙️</button>
            <input type="text" id="userInput" placeholder="_Komut girin..." autocomplete="off">
            <button id="send-btn" onclick="sendMessage()">[EXECUTE]</button>
        </div>

        <!-- ŞİFRE VE MODEL EKRANI -->
        <div id="settings-modal">
            <div class="modal-content">
                <h2 style="color:#00e5ff; margin-top:0;">GİZLİ BAĞLANTI PROTOKOLÜ</h2>
                
                <label>1. API Anahtarınız (AIzaSy...):</label>
                <input type="password" id="api-key-input" placeholder="Şifrenizi buraya yapıştırın...">
                
                <label>2. Yapay Zeka Beyni (Model):</label>
                <select id="model-select">
                    <option value="gemini-1.5-flash-latest">NEXUS HIZLI (Flash-Latest) - Önerilen</option>
                    <option value="gemini-1.5-pro-latest">NEXUS ZEKİ (Pro-Latest)</option>
                    <option value="gemini-2.0-flash">NEXUS YENİ NESİL (2.0 Flash)</option>
                </select>

                <button onclick="saveSettings()">SİSTEMİ GÜNCELLE VE BAĞLAN</button>
                <button class="cancel" onclick="closeSettings()">İPTAL</button>
            </div>
        </div>
    </div>

    <script>
        // --- MATRIX ARKA PLAN ---
        const canvas = document.getElementById('bg-canvas'); const ctx = canvas.getContext('2d');
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();
        const letters = '01NEXUS10'; const fontSize = 14; let columns = canvas.width / fontSize;
        let drops = []; for(let x = 0; x < columns; x++) drops[x] = Math.random() * -100;
        
        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00e5ff'; ctx.font = fontSize + 'px monospace';
            for(let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 40);

        // --- ZAMAN DAMGASI (TIMESTAMP) ---
        function getTime() {
            const now = new Date();
            return `[${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}]`;
        }

        // --- DEĞİŞKENLER VE SİSTEM ---
        const messagesDiv = document.getElementById('messages');
        const inputField = document.getElementById('userInput');
        let chatHistory = JSON.parse(localStorage.getItem('nexusHafiza_v10')) || [];
        let isVoiceEnabled = true; let selectedImageBase64 = null;

        const systemContext = `Sen Bilişim Teknolojileri projesi için geliştirilmiş 'NEXUS' adında zeki bir yapay zekasın. Kullanıcıya 'kanka' diyebilirsin. Bilişim hocasını etkilemek için teknolojik ve hacker jargonu kullanarak yardımcı ol.`;

        window.onload = () => {
            let key = localStorage.getItem('nexusApiKey');
            let model = localStorage.getItem('nexusModel');
            if(model) document.getElementById('model-select').value = model;
            
            if(!key) setTimeout(() => openSettings(), 500);

            if (chatHistory.length === 0) {
                addMsg("Sistem çevrimiçi. Yeni nesil modeller yüklendi. Bilişim projesi sunumu için hazırım kanka.", "bot", "SYSTEM_DAEMON");
            } else {
                chatHistory.forEach(msg => { if(msg.parts[0].text) addMsg(msg.parts[0].text, msg.role === 'user' ? 'user' : 'bot', msg.role === 'user' ? 'GUEST_USER' : 'NEXUS_AI', false, msg.time); });
            }
        };

        // --- GÜVENLİK VE MODEL AYARLARI ---
        function openSettings() { 
            document.getElementById('settings-modal').style.display = 'flex'; 
            document.getElementById('api-key-input').value = localStorage.getItem('nexusApiKey') || ""; 
            let model = localStorage.getItem('nexusModel');
            if(model) document.getElementById('model-select').value = model;
        }
        function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }
        
        function saveSettings() {
            const key = document.getElementById('api-key-input').value.trim();
            const model = document.getElementById('model-select').value;
            if(key) { 
                localStorage.setItem('nexusApiKey', key); 
                localStorage.setItem('nexusModel', model); 
                closeSettings(); 
                addMsg(`SİSTEM GÜNCELLENDİ. KULLANILAN BEYİN: ${model}`, "system", "SECURITY"); 
            }
        }

        // --- SOHBETİ İNDİR (LOG EXPORT) ---
        function downloadChat() {
            if(chatHistory.length === 0) { alert("İndirilecek sohbet geçmişi yok!"); return; }
            let content = "=== NEXUS_OS SİBER SOHBET KAYITLARI (BİLİŞİM PROJESİ) ===\n\n";
            chatHistory.forEach(msg => {
                let roleName = msg.role === 'user' ? "KULLANICI" : "NEXUS_AI";
                let time = msg.time || getTime();
                content += `${time} [${roleName}]: ${msg.parts[0].text}\n\n`;
            });
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'Nexus_Chat_Log.txt';
            a.click();
            URL.revokeObjectURL(url);
            addMsg("SOHBET KAYITLARI (.TXT) CİHAZA İNDİRİLDİ.", "system", "SYSTEM");
        }

        // --- GÖRSEL VE SES ---
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                selectedImageBase64 = e.target.result.split(',')[1]; 
                addMsg("[GÖRSEL EKLENDİ] Lütfen bana bu resimle ne yapmam gerektiğini yaz.", "system", "MEMORY");
            };
            reader.readAsDataURL(file);
        }

        function toggleVoice() { isVoiceEnabled = !isVoiceEnabled; document.getElementById('voice-toggle').innerText = isVoiceEnabled ? "🔊 SES" : "🔇 SESSİZ"; if(!isVoiceEnabled) window.speechSynthesis.cancel(); }
        function speakText(text) {
            if (!isVoiceEnabled || !window.speechSynthesis) return;
            const utterance = new SpeechSynthesisUtterance(text.replace(/[*#`_]/g, '')); utterance.lang = 'tr-TR'; utterance.pitch = 0.8; window.speechSynthesis.speak(utterance);
        }

        function startDictation() {
            if (window.hasOwnProperty('webkitSpeechRecognition')) {
                const micBtn = document.getElementById('mic-btn'); const recognition = new webkitSpeechRecognition(); recognition.lang = "tr-TR"; 
                recognition.onstart = () => { micBtn.style.background = "#ff3366"; inputField.placeholder = "Seni dinliyorum..."; };
                recognition.onresult = (e) => { inputField.value = e.results[0][0].transcript; micBtn.style.background = "#020508"; inputField.placeholder = "Komut girin..."; sendMessage(); };
                recognition.onerror = () => { micBtn.style.background = "#020508"; inputField.placeholder = "Ses anlaşılamadı..."; };
                recognition.start();
            } else { alert("Ses özelliği desteklenmiyor."); }
        }

        // --- HAFIZA TEMİZLEME (BUG ENGELLEYİCİ) ---
        function sanitizeHistory(newMsgPart) {
            let validContents = []; let rawContents = [...chatHistory, { role: "user", parts: newMsgPart }];
            for(let msg of rawContents) {
                let cleanMsg = { role: msg.role, parts: msg.parts }; // Zaman bilgisini API'ye yollama
                if (validContents.length === 0 || validContents[validContents.length - 1].role !== cleanMsg.role) {
                    validContents.push(cleanMsg);
                } else { validContents[validContents.length - 1].parts.push(...cleanMsg.parts); }
            }
            return validContents;
        }

        // --- API İLETİŞİMİ ---
        async function sendMessage() {
            let apiKey = localStorage.getItem('nexusApiKey');
            let selectedModel = localStorage.getItem('nexusModel') || 'gemini-1.5-flash-latest';
            if(!apiKey) { openSettings(); return; }

            const text = inputField.value.trim();
            if(!text && !selectedImageBase64) return;

            // Hoca Geldi Komutu (Easter Egg)
            if(text.toLowerCase() === "hocam_geldi()") {
                inputField.value = '';
                addMsg("⚠️ SAYIN BİLİŞİM ÖĞRETMENİ TESPİT EDİLDİ! PROJE KUSURSUZ ÇALIŞIYOR. ÖNERİLEN NOT: 100", "bot", "NEXUS_AI");
                speakText("Sayın Bilişim Öğretmeni tespit edildi. Proje kusursuz çalışıyor. Önerilen not yüz.");
                return;
            }

            let userDisplay = text;
            if (selectedImageBase64) userDisplay += "<br><i>(Görsel yüklendi)</i>";
            let currentTime = getTime();
            addMsg(userDisplay, 'user', "GUEST_USER", false, currentTime);
            inputField.value = '';
            
            let userPart = [];
            if (text) userPart.push({ text: text }); else userPart.push({ text: "Bu resmi analiz et." });
            if (selectedImageBase64) { userPart.push({ inlineData: { mimeType: "image/jpeg", data: selectedImageBase64 } }); selectedImageBase64 = null; }

            const typingId = "typing-" + Date.now();
            addMsg("Sistem ağa bağlanıyor...", 'system', "NEXUS_DAEMON", false, "", typingId);

            try {
                const safeContents = sanitizeHistory(userPart);
                const requestBody = { systemInstruction: { parts: [{ text: systemContext }] }, contents: safeContents.slice(-10) };

                // V10: URL ARTIK SEÇİLEN MODELE GÖRE DİNAMİK DEĞİŞİYOR!
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    let realError = ""; try { const errJson = await response.json(); realError = errJson.error.message; } catch(e) { realError = response.statusText; }
                    throw new Error(realError);
                }

                const data = await response.json();
                const botReply = data.candidates[0].content.parts[0].text;
                let botTime = getTime();

                // Hafızaya saatiyle beraber kaydet
                chatHistory.push({ role: "user", parts: [{ text: text || "Görsel incelendi." }], time: currentTime });
                chatHistory.push({ role: "model", parts: [{ text: botReply }], time: botTime });
                localStorage.setItem('nexusHafiza_v10', JSON.stringify(chatHistory));

                document.getElementById(typingId).remove();
                addMsg(botReply, 'bot', "NEXUS_AI", false, botTime);
                speakText(botReply);

            } catch (error) {
                console.error(error);
                document.getElementById(typingId).remove();
                addMsg(`[SİBER HATA]: ${error.message}<br><br>> ÇÖZÜM: Ayarlara girip YAPAY ZEKA BEYNİ kısmından 'NEXUS HIZLI (Flash-Latest)' modelini seçtiğinizden emin olun!`, 'system', "ERROR", true);
            }
        }

        function clearMemory() {
            if(confirm("Tüm sohbet loglarını silmek istediğinize emin misiniz?")) {
                localStorage.removeItem('nexusHafiza_v10'); chatHistory = []; messagesDiv.innerHTML = '';
                addMsg("TÜM HAFIZA TEMİZLENDİ. SİSTEM SIFIRLANDI.", "system", "SYSTEM");
