<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My AI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/motion/10.16.4/motion.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .message-bubble {
            max-width: 85%;
            word-wrap: break-word;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #fff 0%, #e0e7ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .neural-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.15;
        }
        
        .pulse-ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        
        .floating {
            animation: floating 3s ease-in-out infinite;
        }
        
        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body class="text-white">

    <!-- Animated Background -->
    <canvas id="neuralCanvas" class="neural-bg"></canvas>

    <!-- Main Container -->
    <div class="container mx-auto px-4 py-6 max-w-4xl relative z-10">
        
        <!-- Header -->
        <header class="text-center mb-8" id="header">
            <div class="glass rounded-3xl p-6 mb-4 inline-block relative overflow-hidden">
                <div class="pulse-ring absolute top-1/2 left-1/2 w-20 h-20 -translate-x-1/2 -translate-y-1/2"></div>
                <h1 class="text-4xl md:text-6xl font-bold mb-2 gradient-text tracking-tight floating">
                    AI Assistant
                </h1>
                <p class="text-lg text-gray-200 font-light">
                    Ask me anything • Powered by Groq
                </p>
            </div>
            
            <!-- Feature Tags -->
            <div class="flex flex-wrap justify-center gap-2 mt-4" id="features">
                <span class="glass px-3 py-1 rounded-full text-xs font-medium">🚀 Fast</span>
                <span class="glass px-3 py-1 rounded-full text-xs font-medium">🧠 Smart</span>
                <span class="glass px-3 py-1 rounded-full text-xs font-medium">💯 Free</span>
            </div>
        </header>

        <!-- Chat Container -->
        <div class="glass rounded-3xl p-4 md:p-6 min-h-[400px] flex flex-col" id="chatContainer">
            
            <!-- Messages Area -->
            <div id="messages" class="flex-1 overflow-y-auto mb-4 space-y-3 max-h-[500px] pr-2">
                <!-- Welcome Message -->
                <div class="flex items-start space-x-3 message-bubble">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-br from-purple-400 to-pink-400 flex items-center justify-center text-sm flex-shrink-0">
                        🤖
                    </div>
                    <div class="glass rounded-2xl rounded-tl-none p-3 flex-1">
                        <p class="text-sm">
                            Hello! I'm your AI assistant powered by Llama 3. I can help with coding, writing, analysis, math, and general questions. What would you like to know?
                        </p>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="relative">
                <div class="glass rounded-2xl p-2 flex items-end space-x-2">
                    <textarea 
                        id="userInput" 
                        rows="1"
                        class="flex-1 bg-transparent border-none outline-none text-white placeholder-gray-300 resize-none px-3 py-2 text-sm max-h-24"
                        placeholder="Type your message..."
                        oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"
                        onkeypress="handleKeyPress(event)"
                    ></textarea>
                    <button 
                        onclick="sendMessage()"
                        class="bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white rounded-xl px-4 py-2 text-sm font-medium transition-all transform hover:scale-105 active:scale-95"
                        id="sendBtn"
                    >
                        Send
                    </button>
                </div>
                <p class="text-xs text-gray-300 mt-2 text-center">
                    Enter to send • Shift+Enter for new line
                </p>
            </div>
        </div>

        <!-- Tips Section -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mt-6" id="tips">
            <button onclick="quickAsk('Explain quantum computing simply')" class="glass rounded-xl p-3 text-xs hover:bg-white/20 transition-all text-left">
                💡 Quantum Computing?
            </button>
            <button onclick="quickAsk('Write a Python function to calculate fibonacci')" class="glass rounded-xl p-3 text-xs hover:bg-white/20 transition-all text-left">
                🐍 Python Code
            </button>
            <button onclick="quickAsk('Give me productivity tips')" class="glass rounded-xl p-3 text-xs hover:bg-white/20 transition-all text-left">
                ⚡ Productivity
            </button>
            <button onclick="quickAsk('Explain how neural networks work')" class="glass rounded-xl p-3 text-xs hover:bg-white/20 transition-all text-left">
                🧠 Neural Nets
            </button>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURATION - REPLACE WITH YOUR API KEY
        // ==========================================
        const GROQ_API_KEY = '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'; // ← REPLACE THIS!
        
        // ==========================================
        // NEURAL NETWORK BACKGROUND ANIMATION
        // ==========================================
        const canvas = document.getElementById('neuralCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let particles = [];
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        
        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.3;
                this.vy = (Math.random() - 0.5) * 0.3;
                this.radius = Math.random() * 2 + 1;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.fill();
            }
        }
        
        function initParticles() {
            particles = [];
            const count = Math.min(window.innerWidth / 15, 50);
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
        }
        
        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            particles.forEach((p, i) => {
                p.update();
                p.draw();
                
                // Draw connections
                for (let j = i + 1; j < particles.length; j++) {
                    const p2 = particles[j];
                    const dx = p.x - p2.x;
                    const dy = p.y - p2.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < 120) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = `rgba(255, 255, 255, ${0.15 * (1 - dist/120)})`;
                        ctx.stroke();
                    }
                }
            });
            
            requestAnimationFrame(animate);
        }
        
        resize();
        initParticles();
        animate();
        window.addEventListener('resize', () => {
            resize();
            initParticles();
        });

        // ==========================================
        // MOTION ANIMATIONS
        // ==========================================
        const { animate, stagger } = Motion;
        
        // Header animation
        animate("#header", {
            opacity: [0, 1],
            y: [30, 0]
        }, { duration: 0.8, ease: "easeOut" });
        
        // Feature tags
        animate("#features span", {
            opacity: [0, 1],
            scale: [0.8, 1]
        }, { 
            delay: stagger(0.1, { start: 0.3 }),
            duration: 0.4 
        });
        
        // Chat container
        animate("#chatContainer", {
            opacity: [0, 1],
            y: [20, 0]
        }, { duration: 0.6, delay: 0.2 });
        
        // Tips
        animate("#tips button", {
            opacity: [0, 1],
            y: [10, 0]
        }, { 
            delay: stagger(0.05, { start: 0.5 }),
            duration: 0.3 
        });

        // ==========================================
        // CHAT FUNCTIONALITY
        // ==========================================
        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('userInput');
        
        let conversationHistory = [
            {
                role: "system",
                content: "You are a helpful, friendly AI assistant. Provide concise, accurate responses. Be conversational but professional. Keep responses under 3 paragraphs when possible."
            }
        ];
        
        function handleKeyPress(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }
        
        function quickAsk(question) {
            userInput.value = question;
            sendMessage();
        }
        
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;
            
            // Check if API key is set
            if (GROQ_API_KEY === 'gsk_YOUR_API_KEY_HERE') {
                addMessage("⚠️ Please add your Groq API key in the code. Get one free at console.groq.com", 'error');
                return;
            }
            
            // Add user message
            addMessage(text, 'user');
            userInput.value = '';
            userInput.style.height = 'auto';
            
            // Show typing
            showTyping();
            
            // Get AI response
            await getAIResponse(text);
        }
        
        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = 'flex items-start space-x-3 message-bubble';
            
            if (sender === 'user') {
                div.className += ' flex-row-reverse space-x-reverse';
                div.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-400 to-cyan-400 flex items-center justify-center text-sm flex-shrink-0">
                        👤
                    </div>
                    <div class="bg-white/20 rounded-2xl rounded-tr-none p-3 text-right flex-1">
                        <p class="text-sm">${escapeHtml(text)}</p>
                    </div>
                `;
            } else if (sender === 'error') {
                div.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-red-500 flex items-center justify-center text-sm flex-shrink-0">
                        ⚠️
                    </div>
                    <div class="bg-red-500/20 border border-red-400 rounded-2xl rounded-tl-none p-3 flex-1">
                        <p class="text-sm text-red-100">${text}</p>
                    </div>
                `;
            } else {
                div.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-gradient-to-br from-purple-400 to-pink-400 flex items-center justify-center text-sm flex-shrink-0">
                        🤖
                    </div>
                    <div class="glass rounded-2xl rounded-tl-none p-3 flex-1">
                        <p class="text-sm">${formatResponse(text)}</p>
                    </div>
                `;
            }
            
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            // Animate
            animate(div, {
                opacity: [0, 1],
                y: [10, 0],
                scale: [0.95, 1]
            }, { duration: 0.25 });
        }
        
        function showTyping() {
            const div = document.createElement('div');
            div.id = 'typing';
            div.className = 'flex items-start space-x-3';
            div.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-gradient-to-br from-purple-400 to-pink-400 flex items-center justify-center text-sm flex-shrink-0">
                    🤖
                </div>
                <div class="glass rounded-2xl rounded-tl-none p-3">
                    <div class="typing-indicator">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            `;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function removeTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }
        
        async function getAIResponse(userMessage) {
            conversationHistory.push({
                role: "user",
                content: userMessage
            });
            
            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${GROQ_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",  // Free model, fast and smart
                        messages: conversationHistory,
                        max_tokens: 1024,
                        temperature: 0.7
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                const aiResponse = data.choices[0].message.content;
                
                removeTyping();
                addMessage(aiResponse, 'assistant');
                
                // Add to history
                conversationHistory.push({
                    role: "assistant",
                    content: aiResponse
                });
                
                // Keep history manageable (last 10 exchanges)
                if (conversationHistory.length > 20) {
                    conversationHistory = [
                        conversationHistory[0], // Keep system message
                        ...conversationHistory.slice(-19)
                    ];
                }
                
            } catch (error) {
                removeTyping();
                let errorMsg = "Sorry, I encountered an error. ";
                if (error.message.includes('401')) {
                    errorMsg += "Please check your API key.";
                } else if (error.message.includes('429')) {
                    errorMsg += "Rate limit hit. Please wait a moment.";
                } else {
                    errorMsg += "Please check your internet connection.";
                }
                addMessage(errorMsg, 'error');
                console.error('Error:', error);
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function formatResponse(text) {
            // Convert newlines to <br> and handle code blocks simply
            return text
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\n/g, '<br>')
                .replace(/```([\s\S]*?)```/g, '<pre class="bg-black/30 p-2 rounded mt-2 overflow-x-auto"><code>$1</code></pre>')
                .replace(/`([^`]+)`/g, '<code class="bg-white/20 px-1 rounded">$1</code>');
        }
        
        // Hover effects for tips
        document.querySelectorAll('#tips button').forEach(btn => {
            btn.addEventListener('mouseenter', () => {
                animate(btn, { scale: 1.05, y: -2 }, { duration: 0.2 });
            });
            btn.addEventListener('mouseleave', () => {
                animate(btn, { scale: 1, y: 0 }, { duration: 0.2 });
            });
        });
    </script>
</body>
            </html>
