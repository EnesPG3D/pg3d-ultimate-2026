<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS AI V7 - GOD MODE</title>
    <style>
        /* --- CRT EKRAN VE MATRIX TASARIMI --- */
        body { 
            margin: 0; background-color: #020406; color: #00ffcc; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; justify-content: center; align-items: center; height: 100vh;
            overflow: hidden; user-select: none;
        }
        #bg-canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; opacity: 0.6; }
        
        #chat-app { 
            width: 95%; max-width: 1000px; height: 90vh; 
            background: rgba(2, 6, 10, 0.85); border-radius: 8px; 
            box-shadow: 0 0 40px rgba(0, 255, 200, 0.15), inset 0 0 20px rgba(0, 255, 200, 0.1); 
            display: flex; flex-direction: column; overflow: hidden;
            border: 1px solid #009966; backdrop-filter: blur(8px);
            z-index: 10; position: relative;
        }
        
        /* CRT Tarama Efekti (Scanline) */
        #chat-app::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 100; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        #header { 
            background: rgba(0, 20, 10, 0.9); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid #00ffcc; z-index: 101;
        }
        
        .header-title { font-size: 1.5em; font-weight: 900; color: #00ffcc; text-shadow: 0 0 10px rgba(0,255,200,0.8); }
        .header-title span { color: #000; font-size: 0.5em; background: #00ffcc; padding: 4px 10px; border-radius: 5px; margin-left: 10px; font-weight: bold; vertical-align: middle; }
        
        .controls button {
            background: transparent; color: #00ffcc; border: 1px solid #00ffcc; 
            padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-left: 10px; font-weight: bold; transition: 0.3s; font-family: inherit;
        }
        .controls button:hover { background: #00ffcc; color: #000; box-shadow: 0 0 15px #00ffcc; }

        #messages { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; z-index: 101; scroll-behavior: smooth;}
        .msg-container { display: flex; width: 100%; }
        .msg-container.user { justify-content: flex-end; }
        .msg-container.bot { justify-content: flex-start; }
        .msg-container.system { justify-content: center; width: 100%; }
        
        .msg { 
            max-width: 85%; padding: 15px 20px; border-radius: 5px; 
            line-height: 1.6; font-size: 1.05em; word-wrap: break-word;
        }
        .user .msg { background: rgba(0, 153, 102, 0.2); border: 1px solid #00ffcc; border-bottom-right-radius: 0; color: #fff; box-shadow: 0 0 10px rgba(0,255,200,0.2);}
        .bot .msg { background: rgba(0, 0, 0, 0.7); border: 1px solid #009966; border-bottom-left-radius: 0; color: #00ffcc; box-shadow: 0 0 10px rgba(0,153,102,0.2);}
        
        /* HATA MESAJI (Daha detaylı) */
        .system .msg { background: rgba(255, 0, 0, 0.15); border: 1px solid #ff3333; color: #ff6666; text-align: left; font-size: 0.95em; box-shadow: 0 0 15px rgba(255, 0, 0, 0.3); font-family: monospace; width: 90%;}
        
        #input-area { padding: 20px; background: rgba(0, 10, 5, 0.95); border-top: 1px solid #00ffcc; display: flex; align-items: center; gap: 12px; z-index: 101; }
        
        .icon-btn { background: #000; color: #00ffcc; border: 1px solid #00ffcc; width: 50px; height: 50px; border-radius: 5px; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 1.2em; transition: 0.3s; }
        .icon-btn:hover { background: #00ffcc; color: #000; box-shadow: 0 0 10px #00ffcc; }
        
        input[type="text"] { flex: 1; padding: 15px 20px; border-radius: 5px; border: 1px solid #00ffcc; background: #000; color: #00ffcc; font-size: 1.1em; outline: none; transition: 0.3s; font-family: inherit;}
        input[type="text"]:focus { box-shadow: inset 0 0 10px rgba(0,255,200,0.2), 0 0 10px rgba(0,255,200,0.2); }
        
        #send-btn { background: #00ffcc; color: #000; border: none; padding: 0 30px; height: 50px; border-radius: 5px; font-weight: 900; font-size: 1.1em; cursor: pointer; transition: 0.3s; font-family: inherit;}
        #send-btn:hover { background: #fff; box-shadow: 0 0 20px #00ffcc; }

        /* GÜVENLİK AYARLARI */
        #settings-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.85); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px);
        }
        .modal-content {
            background: #000; padding: 30px; border-radius: 8px; border: 2px solid #00ffcc;
            width: 90%; max-width: 450px; text-align: center; box-shadow: 0 0 30px rgba(0,255,200,0.4);
        }
        .modal-content input {
            width: 85%; padding: 15px; margin: 20px 0; border-radius: 5px; border: 1px dashed #00ffcc;
            background: #05100a; color: #00ffcc; font-family: monospace; outline: none; font-size: 1.1em; text-align: center;
        }
        .modal-content button { background: #00ffcc; color: #000; border: none; padding: 12px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; width: 90%; font-size: 1.1em; font-family: inherit;}
        .modal-content button:hover { background: #fff; box-shadow: 0 0 15px #00ffcc;}

        pre { background: #000; padding: 15px; border-radius: 5px; border: 1px solid #00ffcc; overflow-x: auto; color: #00ff00;}
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #00ffcc; border-radius: 3px; }
        
        .typing-cursor { display: inline-block; width: 8px; height: 1.2em; background-color: #00ffcc; animation: blink 1s step-end infinite; vertical-align: bottom; margin-left: 2px; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div id="settings-modal">
        <div class="modal-content">
            <h2 style="color:#00ffcc; margin-top:0;">GİZLİ ERİŞİM PROTOKOLÜ</h2>
            <p style="color:#aaa; font-size:0.95em;">Lütfen V7 Geçerli API Anahtarınızı girin.</p>
            <input type="password" id="api-key-input" placeholder="AIzaSy...">
            <button onclick="saveApiKey()">BAĞLANTIYI ONAYLA</button>
            <button onclick="closeSettings()" style="background:transparent; color:#00ffcc; border:1px solid #00ffcc; margin-top:10px;">İptal</button>
        </div>
    </div>

    <div id="chat-app">
        <div id="header">
            <div class="header-title">NEXUS AI <span>V7 OMNISCIENT</span></div>
            <div class="controls">
                <button onclick="openSettings()">⚙️ GÜVENLİK</button>
                <button id="voice-toggle" onclick="toggleVoice()">🔊 SES</button>
                <button onclick="clearMemory()">🧹 SIFIRLA (ÖNEMLİ)</button>
            </div>
        </div>
        
        <div id="messages"></div>
        
        <div id="input-area">
            <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
            <button class="icon-btn" onclick="document.getElementById('file-input').click()" title="Görsel Analizi">👁️</button>
            <button class="icon-btn" id="mic-btn" onclick="startDictation()" title="Sesli Komut">🎙️</button>
            <input type="text" id="userInput" placeholder="Sisteme komut girin..." autocomplete="off">
            <button id="send-btn" onclick="sendMessage()">İLET</button>
        </div>
    </div>

    <script>
        // --- SES EFEKTLERİ ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if(type === 'click') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            }
        }

        // --- MATRIX ARKA PLAN ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*';
        const fontSize = 14; const columns = canvas.width / fontSize;
        const drops = []; for(let x = 0; x < columns; x++) drops[x] = Math.random() * -100;

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff44'; ctx.font = fontSize + 'px monospace';
            for(let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        // --- SİSTEM ---
        const messagesDiv = document.getElementById('messages');
        const inputField = document.getElementById('userInput');
        let chatHistory = JSON.parse(localStorage.getItem('nexusHafiza_v7')) || [];
        let isVoiceEnabled = true; let selectedImageBase64 = null;

        const systemContext = `Sen Bilişim Teknolojileri projesi için geliştirilmiş 'NEXUS' adında siberpunk temalı, üst düzey bir yapay zekasın. Kullanıcıya kanka diyebilirsin. Akademik, kodlama ve hacker jargonuyla havalı cevaplar ver.`;

        window.onload = () => {
            let key = localStorage.getItem('nexusApiKey');
            if(!key) setTimeout(() => openSettings(), 500);

            if (chatHistory.length === 0) {
                addMsg("Sistem çevrimiçi. V7 OMNISCIENT aktif. Kanka hafızanı temizlemen gerekiyorsa sağ üstten 'SIFIRLA' butonuna basmayı unutma!", "bot");
            } else {
                chatHistory.forEach(msg => { if(msg.parts[0].text) addMsg(msg.parts[0].text, msg.role === 'user' ? 'user' : 'bot', null, false); });
            }
        };

        function openSettings() { playSound('click'); document.getElementById('settings-modal').style.display = 'flex'; document.getElementById('api-key-input').value = localStorage.getItem('nexusApiKey') || ""; }
        function closeSettings() { playSound('click'); document.getElementById('settings-modal').style.display = 'none'; }
        function saveApiKey() {
            const key = document.getElementById('api-key-input').value.trim();
            if(key) { localStorage.setItem('nexusApiKey', key); closeSettings(); addMsg("✅ GİZLİ ERİŞİM PROTOKOLÜ ONAYLANDI.", "system", null, false); }
        }

        // --- GÖRSEL VE SES ---
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                selectedImageBase64 = e.target.result.split(',')[1]; 
                addMsg("👁️ Görsel sisteme tarandı. Analiz için komut bekliyorum...", "system", null, false);
            };
            reader.readAsDataURL(file);
        }

        function toggleVoice() { playSound('click'); isVoiceEnabled = !isVoiceEnabled; document.getElementById('voice-toggle').innerText = isVoiceEnabled ? "🔊 SES" : "🔇 SESSİZ"; if(!isVoiceEnabled) window.speechSynthesis.cancel(); }
        function speakText(text) {
            if (!isVoiceEnabled || !window.speechSynthesis) return;
            const utterance = new SpeechSynthesisUtterance(text.replace(/[*#`]/g, '')); utterance.lang = 'tr-TR'; utterance.pitch = 0.8; utterance.rate = 1.1; window.speechSynthesis.speak(utterance);
        }

        // --- YENİLİK 1: AKILLI HAFIZA ONARIMI (Auto-Fix) ---
        function sanitizeHistory(newMsgPart) {
            let validContents = [];
            let rawContents = [...chatHistory, { role: "user", parts: newMsgPart }];
            
            // Eğer aynı rolden iki mesaj üst üste gelirse onları birleştir (Gemini API Çökmesini Engeller)
            for(let msg of rawContents) {
                if (validContents.length === 0 || validContents[validContents.length - 1].role !== msg.role) {
                    validContents.push(JSON.parse(JSON.stringify(msg))); // Derin kopya
                } else {
                    validContents[validContents.length - 1].parts.push(...msg.parts);
                }
            }
            return validContents;
        }

        // --- API İLETİŞİMİ VE GERÇEK HATA OKUYUCU ---
        async function sendMessage() {
            let apiKey = localStorage.getItem('nexusApiKey');
            if(!apiKey) { openSettings(); return; }

            const text = inputField.value.trim();
            if(!text && !selectedImageBase64) return;

            playSound('click');
            let userDisplay = text;
            if (selectedImageBase64) userDisplay += "<br><i style='color:#00ffcc;'>(Görsel Ekli)</i>";
            addMsg(userDisplay, 'user', null, false);
            inputField.value = '';
            
            let userPart = [];
            if (text) userPart.push({ text: text }); else userPart.push({ text: "Veritabanındaki bu görseli analiz et." });
            if (selectedImageBase64) { userPart.push({ inlineData: { mimeType: "image/jpeg", data: selectedImageBase64 } }); selectedImageBase64 = null; }

            const typingId = "typing-" + Date.now();
            addMsg("SİSTEM AĞA BAĞLANIYOR... [██████░░░]", 'bot', typingId, false);

            try {
                // V7: Hafızayı tamamen onararak Google'a gönderir
                const safeContents = sanitizeHistory(userPart);
                
                const requestBody = {
                    systemInstruction: { parts: [{ text: systemContext }] },
                    contents: safeContents.slice(-15) // Son 15 mesajı al
                };

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(requestBody)
                });

                // V7 YENİLİK 2: GERÇEK HATA OKUYUCU (Diagnostic Engine)
                if (!response.ok) {
                    let realError = "";
                    try {
                        const errJson = await response.json();
                        realError = errJson.error ? errJson.error.message : JSON.stringify(errJson);
                    } catch(e) { realError = response.statusText; }
                    throw new Error(realError); // Google'ın asıl hatasını ekrana yansıt
                }

                const data = await response.json();
                const botReply = data.candidates[0].content.parts[0].text;

                chatHistory.push({ role: "user", parts: [{ text: text || "Görsel incelendi." }] });
                chatHistory.push({ role: "model", parts: [{ text: botReply }] });
                localStorage.setItem('nexusHafiza_v7', JSON.stringify(chatHistory));

                document.getElementById(typingId).remove();
                
                // V7 YENİLİK 3: DAKTİLO EFEKTİ İLE YAZDIR
                addMsg(botReply, 'bot', null, true);
                speakText(botReply);

            } catch (error) {
                console.error(error);
                document.getElementById(typingId).remove();
                addMsg(`🚨 <b>SİBER HATA (GOOGLE SUNUCUSU):</b><br><span style='color:#fff;'>${error.message}</span><br><br><i>> Lütfen yeni bir API şifresi alın veya 'SIFIRLA' butonuna basarak bozuk hafızayı temizleyin.</i>`, 'system', null, false);
            }
        }

        function clearMemory() {
            if(confirm("Tüm veri tabanını silmek istediğine emin misin? (Hataları düzeltir)")) {
                playSound('click'); localStorage.removeItem('nexusHafiza_v7'); chatHistory = []; messagesDiv.innerHTML = '';
                addMsg("Hafıza temizlendi. Matrix kodu yeniden başlatıldı.", "system", null, false);
            }
        }

        // --- DAKTİLO (TYPING) EFEKTİ DESTEKLİ MESAJ EKLEME ---
        function addMsg(text, type, id = null, useTypingEffect = false) {
            const wrapper = document.createElement('div'); wrapper.className = `msg-container ${type}`; if(id) wrapper.id = id;
            const div = document.createElement('div'); div.className = 'msg';
            
            let formattedText = text.replace(/\*\*(.*?)\*\*/g, '<b style="color:#00ffcc;">$1</b>').replace(/\*(.*?)\*/g, '<i>$1</i>').replace(/```(.*?)```/gs, '<pre><code>$1</code></pre>').replace(/\n/g, '<br>'); 
            
            if (useTypingEffect && type === 'bot') {
                div.innerHTML = "<span class='typing-cursor'></span>";
                wrapper.appendChild(div); messagesDiv.appendChild(wrapper);
                
                let i = 0;
                // HTML etiketlerini bozmadan hızlı yazma efekti (Basit versiyon)
                div.innerHTML = formattedText; 
                div.style.opacity = 0;
                
                let fade = 0;
                let fadeTimer = setInterval(() => {
                    if(fade >= 1) clearInterval(fadeTimer);
                    div.style.opacity = fade;
                    fade += 0.1;
                }, 30);

            } else {
                div.innerHTML = formattedText; 
                wrapper.appendChild(div); messagesDiv.appendChild(wrapper);
            }
            
            setTimeout(() => { messagesDiv.scrollTop = messagesDiv.scrollHeight; }, 50);
        }
        inputField.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
