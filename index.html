<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MagicRampage Fan Page - Gizli Arşiv</title>
    <style>
        /* --- SIFIR GECİKME & GELİŞMİŞ CSS MİMARİSİ --- */
        :root {
            --primary-color: #00e5ff; /* Neon Mavi */
            --secondary-color: #ff007f; /* Neon Pembe (Vurgular için) */
            --bg-color: #030308;
            --glass-bg: rgba(15, 15, 30, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f0f0f0;
            --text-muted: #aaaaaa;
        }

        /* Yıldızlı Kasmayan Arka Plan */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px; 
            animation: starMovement 120s linear infinite; /* Kasmaması için yavaşlatıldı */
            scroll-behavior: smooth;
        }

        @keyframes starMovement {
            0% { background-position: 0 0, 40px 60px, 130px 270px; }
            100% { background-position: 550px 550px, 390px 410px, 380px 520px; }
        }

        /* Giriş Animasyonu */
        @keyframes entrance {
            0% { opacity: 0; transform: translateY(40px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .container {
            max-width: 1250px;
            margin: 0 auto;
            padding: 20px;
            animation: entrance 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        /* --- CAM TASARIM (GLASSMORPHISM) HEADER --- */
        header {
            text-align: center;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        /* Header İçi Işık Efekti */
        header::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(0,229,255,0.1) 0%, transparent 60%);
            z-index: -1;
        }

        header h1 {
            margin: 0;
            font-size: 2.8em;
            color: var(--primary-color);
            text-shadow: 0 0 15px rgba(0, 229, 255, 0.6);
            letter-spacing: 2px;
        }

        /* --- ARAMA ÇUBUĞU (V2.0 Entegrasyonu) --- */
        .search-box {
            margin: 25px auto;
            max-width: 650px;
            position: relative;
        }

        .search-box input {
            width: 90%;
            padding: 16px 20px;
            border-radius: 50px;
            border: 1px solid rgba(0, 229, 255, 0.3);
            background: rgba(0, 0, 0, 0.6);
            color: white;
            font-size: 1.1em;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .search-box input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.4), inset 0 0 10px rgba(0,0,0,0.5);
        }

        /* --- KATEGORİ BUTONLARI --- */
        .nav-tabs {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 25px;
        }

        .nav-tabs button {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 12px 30px;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .nav-tabs button:hover {
            background: rgba(0, 229, 255, 0.1);
            border-color: var(--primary-color);
            transform: translateY(-3px);
        }

        .nav-tabs button.active {
            background: var(--primary-color);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.6);
            border-color: var(--primary-color);
            transform: translateY(-3px);
        }

        /* Sayaç */
        .item-count {
            margin-top: 15px;
            font-size: 0.9em;
            color: var(--text-muted);
        }

        /* --- İÇERİK KARTLARI (GRID SİSTEMİ) --- */
        .content-area {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            padding-bottom: 50px;
        }

        .item-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 25px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            opacity: 0; /* JS ile animasyonlu gelecek */
            transform: translateY(20px);
        }

        /* Kart İçi Işık Efekti */
        .item-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.05), transparent);
            transform: skewX(-25deg);
            transition: 0.5s;
        }

        .item-card:hover::before {
            left: 150%;
        }

        .item-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0, 229, 255, 0.15);
            border-color: rgba(0, 229, 255, 0.4);
        }

        .item-card h2 {
            margin-top: 0;
            color: #fff;
            border-bottom: 2px solid rgba(0, 229, 255, 0.3);
            padding-bottom: 12px;
            font-size: 1.5em;
            letter-spacing: 1px;
        }

        .item-card .type {
            font-size: 0.85em;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .item-card .stats {
            color: #ffcc00; /* Altın Rengi */
            font-weight: 700;
            margin: 15px 0;
            font-size: 1.05em;
            background: rgba(255, 204, 0, 0.1);
            padding: 8px;
            border-radius: 6px;
            border-left: 3px solid #ffcc00;
        }

        .item-card p {
            line-height: 1.6;
            color: #dcdcdc;
            font-size: 0.95em;
            margin-bottom: 0;
        }

        /* Bulunamadı Mesajı */
        .no-results {
            text-align: center;
            grid-column: 1 / -1;
            font-size: 1.5em;
            color: var(--text-muted);
            padding: 60px;
            background: var(--glass-bg);
            border-radius: 15px;
            border: 1px dashed var(--glass-border);
        }

        /* Yukarı Çık Butonu */
        #scrollTopBtn {
            display: none;
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 99;
            font-size: 24px;
            border: none;
            outline: none;
            background-color: var(--primary-color);
            color: #000;
            cursor: pointer;
            padding: 15px;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
            transition: 0.3s;
        }

        #scrollTopBtn:hover {
            background-color: #fff;
            transform: scale(1.1);
        }

        /* JS Animasyon Sınıfı */
        .show-card {
            opacity: 1 !important;
            transform: translateY(0) !important;
        }
    </style>
</head>

        let currentCategory = 'weapons'; 
        const container = document.getElementById('data-container');
        const countDisplay = document.getElementById('itemCountDisplay');

        // Sayfa Yüklendiğinde
        window.onload = () => {
            renderData(magicRampageDB[currentCategory]);
        };

        // Kategori Değiştirme
        function loadCategory(category) {
            currentCategory = category;
            
            // Buton Stillerini Güncelle
            document.querySelectorAll('.nav-tabs button').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + category).classList.add('active');
            
            // Arama Kutusunu Sıfırla
            document.getElementById('searchInput').value = '';
            
            renderData(magicRampageDB[currentCategory]);
        }

        // Arama (Filtreleme) Motoru
        function filterItems() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const allItems = magicRampageDB[currentCategory];
            
            const filteredItems = allItems.filter(item => 
                item.name.toLowerCase().includes(searchTerm) || 
                item.stats.toLowerCase().includes(searchTerm) ||
                item.desc.toLowerCase().includes(searchTerm) ||
                item.type.toLowerCase().includes(searchTerm)
            );
            
            renderData(filteredItems);
        }

        // DOM Render Motoru (Gecikmesiz & Animasyonlu)
        function renderData(itemsArray) {
            container.innerHTML = ''; // Temizle
            
            // Sayacı Güncelle
            countDisplay.innerText = `Gösterilen Eşya Say
