<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yapay Zeka Asistanı Projesi</title>
    <style>
        /* --- HAREKETLİ VE PROFESYONEL TASARIM --- */
        body { 
            margin: 0; background-color: #030508; color: #fff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; justify-content: center; align-items: center; height: 100vh;
            /* YENİ: HAREKETLİ SİBER ARKA PLAN ANIMASYONU */
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 153, 255, 0.12), transparent 30%),
                radial-gradient(circle at 85% 30%, rgba(0, 204, 255, 0.12), transparent 30%);
            background-size: 150% 150%;
            animation: backgroundPulse 12s ease-in-out infinite alternate;
        }

        @keyframes backgroundPulse {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        #chat-app { 
            width: 95%; max-width: 1000px; height: 90vh; 
            background: rgba(10, 15, 22, 0.85); border-radius: 15px; 
            box-shadow: 0 0 50px rgba(0, 153, 255, 0.2); 
            display: flex; flex-direction: column; overflow: hidden;
            border: 1px solid #1a2a3a;
            backdrop-filter: blur(10px); /* Cam efekti */
        }
        
        #header { 
            background: linear-gradient(90deg, #060a10, #101a24); 
            padding: 15px 25px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid #0099ff; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            position: relative; overflow: hidden;
        }
        
        /* Başlık Işık Efekti */
        #header::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 153, 255, 0.2), transparent);
            animation: shine 4s infinite;
        }
        @keyframes shine { 100% { left: 200%; } }

        .header-title { font-size: 1.4em; font-weight: 900; color: #00ccff; letter-spacing: 1.5px; text-shadow: 0 0 10px rgba(0,204,255,0.5); }
        .header-title span { color: #fff; font-size: 0.55em; background: #0055ff; padding: 4px 10px; border-radius: 8px; margin-left: 10px; vertical-align: middle; box-shadow: 0 0 10px #0055ff;}
        
        .controls button {
            background: rgba(0, 153, 255, 0.1); color: #00ccff; border: 1px solid #0099ff; 
            padding: 8px 15px; border-radius: 8px; cursor: pointer; margin-left: 10px;
            font-weight: bold; transition: all 0.3s;
        }
        .controls button:hover { background: #0099ff; color: #fff; box-shadow: 0 0 15px #0099ff; }

        #messages { 
            flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth;
        }
        .msg-container { display: flex; width: 100%; }
        .msg-container.user { justify-content: flex-end; }
        .msg-container.bot { justify-content: flex-start; }
        
        /* YENİ: Mesajların Ekrana Kayarak Gelme Efekti */
        .msg { 
            max-width: 80%; padding: 15px 20px; border-radius: 15px; 
            line-height: 1.6; font-size: 1.05em; word-wrap: break-word;
            animation: slideUp 0.4s ease-out forwards;
            opacity: 0; transform: translateY(20px);
        }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

        .user .msg { 
            background: linear-gradient(135deg, #004d99, #007acc); 
            border-bottom-right-radius: 2px; box-shadow: 0 5px 15px rgba(0,122,204,0.3);
        }
        .bot .msg { 
            background: #121822; border: 1px solid #1e2d3d; 
            border-bottom-left-radius: 2px; color: #e0e0e0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        
        /* YENİ: Düşünüyor Animasyonu */
        .typing-indicator { font-style: italic; color: #00ccff; opacity: 0.8; font-weight: bold; animation: pulseText 1.5s infinite; }
        @keyframes pulseText { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        #input-area { 
            padding: 20px; background: rgba(10, 17, 24, 0.9); border-top: 1px solid #1a2a3a;
            display: flex; align-items: center; gap: 12px; position: relative;
        }
        
        .icon-btn {
            background: #15222e; color: #00ccff; border: 1px solid #233547;
            width: 50px; height: 50px; border-radius: 50%; display: flex;
            justify-content: center; align-items: center; cursor: pointer;
            font-size: 1.2em; transition: all 0.3s;
        }
        .icon-btn:hover { background: #00ccff; color: #000; transform: scale(1.1); box-shadow: 0 0 15px #00ccff; }
        .icon-btn.recording { background: #ff3333; color: white; border-color: #ff3333; animation: pulseRed 1.5s infinite; }
        @keyframes pulseRed { 0% { box-shadow: 0 0 0 0 rgba(255, 51, 51, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(255, 51, 51, 0); } }

        input[type="text"] { 
            flex: 1; padding: 15px 22px; border-radius: 25px; border: 1px solid #233547; 
            background: #0d131a; color: white; font-size: 1.1em; outline: none; 
            transition: all 0.3s; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }
        input[type="text"]:focus { border-color: #00ccff; box-shadow: 0 0 20px rgba(0,204,255,0.2), inset 0 2px 5px rgba(0,0,0,0.5); }
        
        #send-btn {
            background: #00ccff; color: #000; border: none; padding: 0 35px; height: 50px;
            border-radius: 25px; font-weight: 900; font-size: 1.1em; cursor: pointer; transition: all 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        #send-btn:hover { background: #fff; box-shadow: 0 0 25px #00ccff; transform: scale(1.05); }

        #image-preview {
            display: none; position: absolute; bottom: 85px; left: 80px;
            background: #151a22; padding: 10px; border-radius: 10px; border: 1px solid #00ccff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6); z-index: 10;
        }
        #image-preview img { max-height: 100px; border-radius: 5px; }
        #remove-img { position: absolute; top: -10px; right: -10px; background: #ff3333; color: white; border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.5);}

        pre { background: #050505; padding: 15px; border-radius: 8px; border: 1px solid #333; overflow-x: auto; color: #00ff00; font-family: 'Courier New', Courier, monospace;}
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0a1118; border-radius: 10px;}
        ::-webkit-scrollbar-thumb { background: #0099ff; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #00ccff; }
    </style>
</head>
<body>

    <div id="chat-app">
        <div id="header">
            <div class="header-title">NEXUS AI <span>V4 ULTIMATE</span></div>
            <div class="controls">
                <button id="voice-toggle" onclick="toggleVoice()">🔊 Ses: Açık</button>
                <button onclick="clearMemory()">🧹 Temizle</button>
            </div>
        </div>
        
        <div id="messages"></div>
        
        <div id="image-preview">
            <button id="remove-img" onclick="removeImage()">X</button>
            <img id="preview-img" src="" alt="Yüklenen Görsel">
        </div>

        <div id="input-area">
            <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
            <button class="icon-btn" onclick="document.getElementById('file-input').click()" title="Resim Yükle">📎</button>
            <button class="icon-btn" id="mic-btn" onclick="startDictation()" title="Sesli Soru Sor">🎙️</button>
            
            <input type="text" id="userInput" placeholder="Mesaj yaz veya resim yükleyip sor..." autocomplete="off">
            <button id="send-btn" onclick="sendMessage()">Gönder</button>
        </div>
    </div>

    <script>
        // --- API ANAHTARI VE DEĞİŞKENLER ---
        const API_KEY = "AIzaSyDqEStWBmfyWIco4As4J2OjkIh6FXsTXTg"; 
        const messagesDiv = document.getElementById('messages');
        const inputField = document.getElementById('userInput');
        
        let chatHistory = JSON.parse(localStorage.getItem('nexusHafiza')) || [];
        let isVoiceEnabled = true;
        let selectedImageBase64 = null;

        const systemContext = `Sen okul Bilişim Teknolojileri projesi için bu kullanıcı tarafından geliştirilmiş, 'NEXUS' adında ultra gelişmiş bir yapay zekasın. 
        Kullanıcının adı yok, ona 'kanka' diyebilirsin. Bilişim hocası bu projeyi inceliyor olabilir, bu yüzden kodlama, teknoloji, yapay zeka ve bilim konularında aşırı yetkin, akademik ama aynı zamanda cana yakın cevaplar ver. 
        Kullanıcı sana resim yüklerse o resmi mükemmel analiz et. Markdown kullanarak cevaplarını şıklaştır.`;

        // --- SAYFA YÜKLENDİĞİNDE (HAFIZA TAMİRİ EKLENDİ) ---
        window.onload = () => {
            // FIX: Eğer hafıza yarım kalmışsa (Sadece user varsa), son mesajı silerek sistemi çöküşten kurtar!
            if (chatHistory.length > 0 && chatHistory[chatHistory.length - 1].role === 'user') {
                chatHistory.pop();
                saveMemory();
            }

            if (chatHistory.length === 0) {
                addMsg("Sistem çevrimiçi. Merhaba kanka! Ben Nexus V4. Hafıza hatalarım giderildi, fütüristik arayüzüm aktif. Bilişim hocana bu projeyi sunmaya hazır mıyız?", "bot");
            } else {
                chatHistory.forEach(msg => {
                    if(msg.parts[0].text) addMsg(msg.parts[0].text, msg.role === 'user' ? 'user' : 'bot');
                });
                addMsg("Sistem yeniden başlatıldı. Hafıza senkronizasyonu tamlandı. Hazırım kanka! 🚀", "bot");
            }
        };

        // --- GÖRSEL YÜKLEME ---
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('preview-img').src = e.target.result;
                document.getElementById('image-preview').style.display = 'block';
                selectedImageBase64 = e.target.result.split(',')[1]; 
            };
            reader.readAsDataURL(file);
        }

        function removeImage() {
            selectedImageBase64 = null;
            document.getElementById('image-preview').style.display = 'none';
            document.getElementById('file-input').value = "";
        }

        // --- SESLE YAZMA (MİKROFON) ---
        function startDictation() {
            if (window.hasOwnProperty('webkitSpeechRecognition')) {
                const micBtn = document.getElementById('mic-btn');
                const recognition = new webkitSpeechRecognition();
                recognition.continuous = false;
                recognition.interimResults = false;
                recognition.lang = "tr-TR"; 
                
                recognition.onstart = function() {
                    micBtn.classList.add('recording');
                    inputField.placeholder = "Seni dinliyorum, konuş...";
                };

                recognition.onresult = function(e) {
                    inputField.value = e.results[0][0].transcript;
                    micBtn.classList.remove('recording');
                    inputField.placeholder = "Mesaj yaz veya resim yükleyip sor...";
                    sendMessage(); 
                };

                recognition.onerror = function(e) {
                    micBtn.classList.remove('recording');
                    inputField.placeholder = "Ses anlaşılamadı...";
                };

                recognition.start();
            } else {
                alert("Tarayıcın ses tanımayı desteklemiyor. (Google Chrome önerilir)");
            }
        }

        // --- SESLİ OKUMA ---
        function toggleVoice() {
            isVoiceEnabled = !isVoiceEnabled;
            document.getElementById('voice-toggle').innerText = isVoiceEnabled ? "🔊 Ses: Açık" : "🔇 Ses: Kapalı";
            if(!isVoiceEnabled) window.speechSynthesis.cancel(); 
        }

        function speakText(text) {
            if (!isVoiceEnabled || !window.speechSynthesis) return;
            let cleanText = text.replace(/[*#`]/g, '').replace(/```[\s\S]*?```/g, "Burada bir kod bloğu var."); 
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'tr-TR';
            utterance.rate = 1.0; 
            utterance.pitch = 1.1; 
            window.speechSynthesis.speak(utterance);
        }

        // --- KUSURSUZ API BAĞLANTISI (BUG FIXLENDİ) ---
        async function sendMessage() {
            const text = inputField.value.trim();
            if(!text && !selectedImageBase64) return;

            let userDisplay = text;
            if (selectedImageBase64) userDisplay += "<br><i style='color:#00ccff;'>(📎 Görsel Yüklendi)</i>";
            addMsg(userDisplay, 'user');
            
            inputField.value = '';
            
            let userPart = [];
            if (text) userPart.push({ text: text });
            else userPart.push({ text: "Bu görselde ne görüyorsun detaylıca anlatır mısın?" });

            if (selectedImageBase64) {
                userPart.push({ inlineData: { mimeType: "image/jpeg", data: selectedImageBase64 } });
            }

            removeImage(); 

            const typingId = "typing-" + Date.now();
            addMsg("<span class='typing-indicator'>Sistem analiz ediyor...</span>", 'bot', typingId);

            try {
                // SADECE GÖNDERMEDEN ÖNCEKİ GEÇMİŞİ ALIYORUZ, BÖYLECE HATA VERİRSE HAFIZA BOZULMUYOR!
                let safeHistory = chatHistory.slice(-10); 
                let currentUserMsg = { role: "user", parts: userPart };

                const requestBody = {
                    contents: [
                        { role: "user", parts: [{ text: systemContext }] },
                        { role: "model", parts: [{ text: "Anlaşıldı. Nexus V4 aktif." }] },
                        ...safeHistory, 
                        currentUserMsg // Yeni sorumuz
                    ]
                };

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) throw new Error("API Bağlantı Hatası veya Hatalı İstek!");

                const data = await response.json();
                const botReply = data.candidates[0].content.parts[0].text;

                // FIX: İŞLEM BAŞARILIYSA HAFIZAYA KAYDET (Eskiden başarısız olsa da kaydedip sistemi kilitliyordu)
                chatHistory.push({ role: "user", parts: [{ text: text || "Görsel incelendi." }] });
                chatHistory.push({ role: "model", parts: [{ text: botReply }] });
                saveMemory();

                document.getElementById(typingId).remove();
                addMsg(botReply, 'bot');
                speakText(botReply);

            } catch (error) {
                console.error(error);
                document.getElementById(typingId).remove();
                // Hata mesajı hafızaya işlenmez, sistem sağlığını korur!
                addMsg("⚠️ Kanka ağ bağlantısında sorun var veya API yanıt vermiyor. İnternetini kontrol et.", 'bot');
            }
        }

        // --- YARDIMCI FONKSİYONLAR ---
        function saveMemory() {
            localStorage.setItem('nexusHafiza', JSON.stringify(chatHistory));
        }

        function clearMemory() {
            if(confirm("Tüm veri tabanını ve hafızayı sıfırlamak istediğine emin misin? (Hataları düzeltir)")) {
                localStorage.removeItem('nexusHafiza');
                chatHistory = [];
                messagesDiv.innerHTML = '';
                addMsg("Hafıza tamamen temizlendi. Sistem ilk günkü gibi temiz. Ne istersin kanka?", "bot");
            }
        }

        function addMsg(text, type, id = null) {
            const wrapper = document.createElement('div');
            wrapper.className = `msg-container ${type}`;
            if(id) wrapper.id = id;
            
            const div = document.createElement('div');
            div.className = 'msg';
            
            let formattedText = text
                .replace(/\*\*(.*?)\*\*/g, '<b style="color:#00ccff;">$1</b>') 
                .replace(/\*(.*?)\*/g, '<i>$1</i>')     
                .replace(/```(.*?)```/gs, '<pre><code>$1</code></pre>') 
                .replace(/\n/g, '<br>'); 
                
            div.innerHTML = formattedText;
            wrapper.appendChild(div);
            messagesDiv.appendChild(wrapper);
            
            // Otomatik en alta kaydırma
            setTimeout(() => {
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }, 50);
        }

        inputField.addEventListener('keypress', (e) => { 
            if(e.key === 'Enter') sendMessage(); 
        });
    </script>
</body>
</html>
