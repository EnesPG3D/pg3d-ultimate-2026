<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Galaktik Veritabanı | Kompakt Mod</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ================= KOMPAKT TEMA DEĞİŞKENLERİ ================= */
        :root {
            --bg-color: #08090a;
            --text-color: #d1d1d1;
            --primary-color: #66fcf1;
            --secondary-color: #45a29e;
            --glass-bg: rgba(20, 25, 30, 0.8);
            --glass-border: rgba(102, 252, 241, 0.15);
            --card-gap: 12px; /* Boşluklar daraltıldı */
            --rarity-yaygin: #808080; --rarity-nadir: #3498db; --rarity-destansi: #8e44ad;
            --rarity-efsanevi: #f39c12; --rarity-mitik: #e74c3c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            line-height: 1.2;
        }

        /* Arka Plan Yıldızları - Daha Az Belirgin */
        .stars-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; opacity: 0.5; }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 3s infinite alternate; }
        @keyframes twinkle { from { opacity: 0.1; } to { opacity: 0.6; } }

        /* Navbar - Daha İnce */
        nav {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(11, 12, 16, 0.95); backdrop-filter: blur(5px);
            border-bottom: 1px solid var(--glass-border);
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 15px;
        }
        .logo { font-family: 'Orbitron'; font-size: 18px; color: var(--primary-color); }
        .nav-links { display: flex; gap: 10px; }
        .nav-links button {
            background: none; border: 1px solid var(--glass-border); color: var(--text-color);
            padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 13px;
        }

        /* Ana Yapı - Kenar Boşlukları Sıfıra Yakın */
        .container {
            display: flex; width: 100%; max-width: 100%; /* Boşlukları yok etmek için 100% */
            margin: 0 auto; padding: 10px; gap: var(--card-gap);
        }

        /* Sidebar - Daraltılmış */
        .sidebar {
            flex: 0 0 240px; background: var(--glass-bg); padding: 12px;
            border-radius: 8px; border: 1px solid var(--glass-border);
            height: fit-content; position: sticky; top: 60px;
        }
        .filter-group { margin-bottom: 12px; }
        .filter-group label { font-size: 13px; color: var(--primary-color); display: block; margin-bottom: 4px; text-transform: uppercase; }
        .filter-group select, .filter-group input {
            width: 100%; padding: 6px; background: #000; border: 1px solid var(--glass-border);
            color: #fff; font-size: 14px; border-radius: 3px;
        }

        /* Grid Sistemi - Daha Yoğun */
        .main-content { flex: 1; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); /* Daha küçük kartlar */
            gap: var(--card-gap);
        }

        /* Kart Tasarımı - Kompakt */
        .card {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: 8px; padding: 10px; position: relative;
            transition: 0.2s; overflow: hidden;
        }
        .card:hover { border-color: var(--primary-color); transform: translateY(-3px); }
        
        .rarity-line { position: absolute; top: 0; left: 0; width: 100%; height: 3px; }
        
        .card-image {
            width: 100%; height: 90px; background: rgba(0,0,0,0.4);
            display: flex; justify-content: center; align-items: center;
            font-size: 30px; border-radius: 4px; margin-bottom: 8px;
        }
        
        .card-title { font-family: 'Orbitron'; font-size: 14px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-cat { font-size: 11px; color: var(--secondary-color); margin-bottom: 8px; }
        
        .stat-mini { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 2px; }
        .bar-mini { height: 4px; background: #333; border-radius: 2px; margin-bottom: 6px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--primary-color); }

        .card-footer { display: flex; justify-content: space-between; margin-top: 5px; padding-top: 5px; border-top: 1px solid rgba(255,255,255,0.05); }
        .btn-card { background: none; border: none; color: #555; cursor: pointer; font-size: 14px; }
        .btn-card.active-fav { color: #ff4757; }

        /* Mobil Uyumluluk */
        @media (max-width: 768px) {
            .container { flex-direction: column; padding: 8px; }
            .sidebar { flex: none; width: 100%; position: static; margin-bottom: 10px; padding: 10px; }
            .grid { grid-template-columns: repeat(2, 1fr); gap: 8px; } /* Mobilde yan yana 2 kart */
            .card-image { height: 70px; font-size: 24px; }
            .card-title { font-size: 13px; }
        }

        /* Detay Modalı */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; z-index: 2000; padding: 20px; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: #111; border: 1px solid var(--primary-color); width: 100%; max-width: 500px; padding: 20px; border-radius: 10px; position: relative; }
        .close { position: absolute; top: 10px; right: 15px; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><i class="fa-solid fa-bolt"></i> WIKI.IO</div>
        <div class="nav-links">
            <button onclick="filterFavs()"><i class="fa-solid fa-heart"></i> <span class="hide-mob">Favoriler</span></button>
            <button onclick="toggleTheme()"><i class="fa-solid fa-circle-half-stroke"></i></button>
        </div>
    </nav>

    <div class="stars-container" id="stars"></div>

    <div class="container">
        <aside class="sidebar">
            <div class="filter-group">
                <label>Hızlı Arama</label>
                <input type="text" id="q" placeholder="İsim..." oninput="update()">
            </div>
            <div class="filter-group">
                <label>Kategori</label>
                <select id="c" onchange="update()">
                    <option value="all">Tümü</option>
                    <option value="Silah">Silahlar</option>
                    <option value="Zırh">Zırhlar</option>
                    <option value="Aksesuar">Aksesuarlar</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Nadirlik</label>
                <select id="r" onchange="update()">
                    <option value="all">Tümü</option>
                    <option value="Yaygın">Yaygın</option>
                    <option value="Mitik">Mitik</option>
                </select>
            </div>
            <button style="width:100%; padding:8px; background:var(--primary-color); border:none; border-radius:4px; font-weight:bold; cursor:pointer;" onclick="reset()">Sıfırla</button>
        </aside>

        <main class="main-content">
            <div style="margin-bottom:10px; font-size:14px; opacity:0.7;">Bulunan Öğeler: <span id="count">0</span></div>
            <div class="grid" id="g"></div>
        </main>
    </div>

    <!-- Detay Modalı -->
    <div class="modal" id="m" onclick="if(event.target==this)this.classList.remove('active')">
        <div class="modal-content" id="mc"></div>
    </div>

    <script>
        // Örnek Veri (Kompakt yapıda 50+ öğe için otomatik üretim)
        const categories = ["Silah", "Zırh", "Aksesuar"];
        const rarities = ["Yaygın", "Nadir", "Destansı", "Efsanevi", "Mitik"];
        const icons = ["fa-gun", "fa-shield-halved", "fa-hat-wizard", "fa-bolt", "fa-fire"];
        
        let data = [];
        for(let i=1; i<=60; i++) {
            let r = rarities[Math.floor(Math.random()*rarities.length)];
            data.push({
                id: i,
                n: "Öğe #" + i,
                c: categories[Math.floor(Math.random()*categories.length)],
                r: r,
                p: Math.floor(Math.random()*100),
                m: Math.floor(Math.random()*100),
                i: icons[Math.floor(Math.random()*icons.length)]
            });
        }

        let favs = JSON.parse(localStorage.getItem('favs')) || [];

        function update() {
            const q = document.getElementById('q').value.toLowerCase();
            const c = document.getElementById('c').value;
            const r = document.getElementById('r').value;
            
            let filtered = data.filter(x => 
                (x.n.toLowerCase().includes(q)) &&
                (c === 'all' || x.c === c) &&
                (r === 'all' || x.r === r)
            );

            const g = document.getElementById('g');
            g.innerHTML = '';
            document.getElementById('count').innerText = filtered.length;

            filtered.forEach(x => {
                const isFav = favs.includes(x.id);
                g.innerHTML += `
                    <div class="card" onclick="openDetail(${x.id})">
                        <div class="rarity-line" style="background:var(--rarity-${x.r.toLowerCase().replace('ı','i')})"></div>
                        <div class="card-image"><i class="fa-solid ${x.i}"></i></div>
                        <div class="card-title">${x.n}</div>
                        <div class="card-cat">${x.c} | ${x.r}</div>
                        
                        <div class="stat-mini">Güç <span>${x.p}</span></div>
                        <div class="bar-mini"><div class="bar-fill" style="width:${x.p}%"></div></div>
                        
                        <div class="card-footer">
                            <span style="font-size:10px; opacity:0.5">ID: ${x.id}</span>
                            <button class="btn-card ${isFav?'active-fav':''}" onclick="toggleF(event, ${x.id})">
                                <i class="fa-solid fa-heart"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function toggleF(e, id) {
            e.stopPropagation();
            if(favs.includes(id)) favs = favs.filter(i => i!==id);
            else favs.push(id);
            localStorage.setItem('favs', JSON.stringify(favs));
            update();
        }

        function openDetail(id) {
            const x = data.find(item => item.id === id);
            document.getElementById('mc').innerHTML = `
                <span class="close" onclick="document.getElementById('m').classList.remove('active')">&times;</span>
                <h2 style="font-family:Orbitron; color:var(--primary-color)">${x.n}</h2>
                <hr style="margin:10px 0; opacity:0.2">
                <p>Kategori: ${x.c}</p>
                <p>Nadirlik: ${x.r}</p>
                <p>Güç Değeri: ${x.p}</p>
                <p>Hareketlilik: ${x.m}</p>
                <p style="margin-top:10px; font-size:14px; opacity:0.7">Bu öğe veritabanındaki teknik verilere göre simüle edilmiştir.</p>
            `;
            document.getElementById('m').classList.add('active');
        }

        function reset() {
            document.getElementById('q').value = '';
            document.getElementById('c').value = 'all';
            document.getElementById('r').value = 'all';
            update();
        }

        function createStars() {
            const container = document.getElementById('stars');
            for(let i=0; i<30; i++) {
                let star = document.createElement('div');
                star.className = 'star';
                star.style.width = star.style.height = Math.random()*2+1+'px';
                star.style.left = Math.random()*100+'vw';
                star.style.top = Math.random()*100+'vh';
                star.style.animationDelay = Math.random()*5+'s';
                container.appendChild(star);
            }
        }

        window.onload = () => { createStars(); update(); };
    </script>
</body>
                        </html>
